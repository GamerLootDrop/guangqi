<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0c0906; color: #f7ede2;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            overflow: hidden; user-select: none;
        }

        /* 深邃玄色大殿背景 */
        #temple-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: 
                radial-gradient(circle at 50% 35%, #241c14 0%, #0c0906 85%),
                repeating-linear-gradient(rgba(197, 160, 89, 0.01) 0px, rgba(197, 160, 89, 0.01) 1px, transparent 1px, transparent 12px);
            opacity: 0; transition: opacity 1.2s ease;
        }

        /* 大殿悬空匾额 */
        .temple-tablet {
            position: absolute; top: 6%; text-align: center; width: 100%; z-index: 10; pointer-events: none;
        }
        .temple-tablet h1 { margin: 0; font-size: 26px; color: #d4b26f; letter-spacing: 10px; font-weight: bold; text-shadow: 0 4px 15px rgba(0,0,0,0.9); }
        .temple-tablet p { margin: 10px 0 0 0; font-size: 13px; color: #a69580; letter-spacing: 2px; opacity: 0.8; }

        /* 特效画布（上香青烟、常明微尘） */
        #incense-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }

        /* 居中浮空混元太极法盘 */
        #taiji-altar {
            position: absolute; top: 38%; left: 50%;
            transform: translate(-50%, -50%); z-index: 3;
            cursor: pointer;
        }
        .taiji-disc {
            width: 160px; height: 160px;
            background: linear-gradient(135deg, #ebe6da 50%, #181310 50%);
            border-radius: 50%; border: 4px solid #c5a059;
            box-shadow: 0 0 50px rgba(197,160,89,0.4), inset 0 0 15px rgba(255,255,255,0.1);
            position: relative; animation: cosmicRotation 60s linear infinite;
        }
        @keyframes cosmicRotation { 100% { transform: rotate(360deg); } }
        
        .taiji-disc::before { content: ''; position: absolute; width: 80px; height: 80px; background: #ebe6da; border-radius: 50%; top: 0; left: 40px; }
        .taiji-disc::after { content: ''; position: absolute; width: 80px; height: 80px; background: #181310; border-radius: 50%; bottom: 0; left: 40px; }
        .t-eye-black { position: absolute; width: 20px; height: 20px; background: #181310; border-radius: 50%; top: 30px; left: 70px; z-index: 5; }
        .t-eye-white { position: absolute; width: 20px; height: 20px; background: #ebe6da; border-radius: 50%; bottom: 30px; left: 70px; z-index: 5; }
        
        /* 吐纳状态提示圈 */
        .breath-ring {
            position: absolute; width: 180px; height: 180px; top: -10px; left: -10px;
            border: 2px solid rgba(197, 160, 89, 0.3); border-radius: 50%;
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.15); animation: haloPulse 3s infinite alternate; pointer-events: none;
        }
        @keyframes haloPulse { 0% { transform: scale(0.96); opacity: 0.4; } 100% { transform: scale(1.04); opacity: 1; } }

        /* ==================== 📜 沉浸式一体化香案与实体宣德炉 ==================== */
        .altar-station {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; z-index: 8;
            background: linear-gradient(to top, #14100d 0%, #241c17 100%);
            border: 1px solid rgba(197, 160, 89, 0.3); border-top: 3px solid #c5a059;
            border-radius: 12px; padding: 24px 20px 20px 20px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center;
        }

        /* 实体双耳宣德炉（完美破位悬浮于香案上方缘口） */
        .classical-burner {
            width: 130px; height: 60px;
            background: linear-gradient(135deg, #3d2c1f 0%, #1a110a 100%);
            border-top: 2px solid #d4b26f; border-radius: 0 0 45px 45px;
            position: relative; box-shadow: inset 0 5px 12px rgba(0,0,0,0.8), 0 8px 20px rgba(0,0,0,0.7);
            cursor: pointer; transition: transform 0.2s; 
            margin-top: -55px; margin-bottom: 20px; z-index: 9;
        }
        .classical-burner:active { transform: scale(0.97); }
        /* 左炉耳 */
        .classical-burner::before { content: ''; position: absolute; left: -12px; top: 8px; width: 12px; height: 26px; border: 2.5px solid #c5a059; border-right: none; border-radius: 10px 0 0 10px; }
        /* 右炉耳 */
        .classical-burner::after { content: ''; position: absolute; right: -12px; top: 8px; width: 12px; height: 26px; border: 2.5px solid #c5a059; border-left: none; border-radius: 0 10px 10px 0; }
        .burner-rim { position: absolute; top: -8px; left: -8px; width: 146px; height: 10px; background: linear-gradient(to bottom, #d4b26f, #a17f43); border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        /* 案前真线香 */
        .joss-sticks { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .stick {
            width: 3px; height: 32px; background: #5c3023; opacity: 0.2; transition: all 0.6s ease;
            position: relative; transform-origin: bottom center;
        }
        .stick.burning { opacity: 1; background: #824736; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .stick.burning::after { content: ''; position: absolute; top: 0; left: -1.5px; width: 6px; height: 6px; background: #ff6600; border-radius: 50%; box-shadow: 0 0 10px #ff3300, 0 0 4px #ffaa00; animation: stickGlow 1s infinite alternate; }
        @keyframes stickGlow { 0% { transform: scale(0.85); opacity: 0.8; } 100% { transform: scale(1.15); opacity: 1; } }

        /* 功能控制选项卡 */
        .altar-tabs { width: 100%; display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-item {
            flex: 1; background: rgba(12, 9, 7, 0.8); border: 1px solid #423429;
            color: #9c8c7a; padding: 11px 0; font-size: 13px; font-weight: bold;
            cursor: pointer; border-radius: 6px; transition: all 0.2s ease;
        }
        .tab-item.active {
            background: linear-gradient(135deg, #7c221a, #a83128);
            color: #fcf9f2; border-color: #d4b26f; box-shadow: 0 0 15px rgba(124, 34, 26, 0.4);
        }
        
        .altar-content { width: 100%; min-height: 60px; display: none; }
        .altar-content.active { display: block; }

        .gold-action-btn {
            background: linear-gradient(135deg, #a17f43, #d4b26f); color: #17110a;
            border: none; width: 100%; padding: 13px; font-size: 15px; font-weight: bold;
            border-radius: 6px; cursor: pointer; box-shadow: 0 5px 12px rgba(0,0,0,0.4);
            transition: opacity 0.2s;
        }
        .gold-action-btn:active { transform: scale(0.99); opacity: 0.9; }
        
        .wish-input {
            width: 100%; padding: 11px; background: rgba(10, 8, 7, 0.9);
            border: 1px solid #4a3c31; color: #fff; text-align: center;
            font-size: 13px; border-radius: 6px; margin-bottom: 10px; outline: none;
        }
        .wish-input:focus { border-color: #d4b26f; }

        /* 功德文字空中浮现 */
        .merit-float {
            position: absolute; color: #d4b26f; font-size: 18px; font-weight: bold;
            pointer-events: none; animation: meritRise 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9), 0 0 8px rgba(212,178,111,0.4); z-index: 15;
        }
        @keyframes meritRise {
            0% { transform: translateY(0) scale(0.9); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-110px) scale(1.05); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="temple-viewport">
        
        <div class="temple-tablet">
            <h1>三清大殿 · 乾坤灵境</h1>
            <p>☯ 叩击混元法盘 · 听磬荡涤内耗 ☯</p>
        </div>

        <div id="taiji-altar" onclick="hitAltarGong()">
            <div class="breath-ring"></div>
            <div class="taiji-disc">
                <div class="t-eye-black"></div><div class="t-eye-white"></div>
            </div>
        </div>

        <canvas id="incense-canvas"></canvas>

        <div class="altar-station">
            
            <div class="classical-burner" onclick="burnIncense()">
                <div class="burner-rim"></div>
                <div class="joss-sticks">
                    <div class="stick" id="stick1"></div>
                    <div class="stick" id="stick2"></div>
                    <div class="stick" id="stick3"></div>
                </div>
            </div>

            <div class="altar-tabs">
                <button class="tab-item active" onclick="switchAisle('aisle-incense', 0)">敬奉心香</button>
                <button class="tab-item" onclick="switchAisle('aisle-breath', 1)">功态吐纳</button>
                <button class="tab-item" onclick="switchAisle('aisle-wish', 2)">文疏祈愿</button>
            </div>

            <div id="aisle-incense" class="altar-content active">
                <button class="gold-action-btn" onclick="burnIncense()">虔诚上香 · 鸣磬静心</button>
            </div>
            <div id="aisle-breath" class="altar-content">
                <button class="gold-action-btn" id="breath-toggle-btn" onclick="toggleBreathMode()">随大殿磁场引导开始吐纳</button>
            </div>
            <div id="aisle-wish" class="altar-content">
                <input type="text" id="wish-box" class="wish-input" placeholder="在案前静心写下所求疏文（如：断绝内耗）" maxlength="16">
                <button class="gold-action-btn" onclick="submitWishAltar()">化疏文归于烟霞</button>
            </div>

        </div>
    </div>

    <script>
        const viewport = document.getElementById('temple-viewport');
        const canvas = document.getElementById('incense-canvas');
        const ctx = canvas.getContext('2d');

        // 彻底修复：严格声明所有全局动力学变量
        let breathMode = false; 
        let breathTicker = 0;
        let smokeParticles = []; 
        let floatingDust = [];

        // 初始化全屏环境 Canvas
        function initCanvas() {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            floatingDust = [];
            // 布置殿内常明虚空金尘微粒
            for(let i=0; i<35; i++) {
                floatingDust.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height * 0.75),
                    r: Math.random() * 1.2 + 0.4,
                    alpha: Math.random() * 0.3 + 0.1,
                    vx: (Math.random() - 0.5) * 0.08,
                    vy: Math.random() * 0.06 + 0.02
                });
            }
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();
        setTimeout(() => viewport.style.opacity = "1", 100);

        // ==================== 🔊 纯净 Web Audio 铜磬共鸣引擎 ====================
        let audioCtx = null;
        function setupAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playGongSound(freq, mode="磬") {
            setupAudio(); if (!audioCtx) return;
            let time = audioCtx.currentTime;
            
            if(mode === "磬") {
                // 多谐振波形合成：完美还原古刹铜磬的空灵和多层次尾音
                let freqs = [freq, freq * 1.52, freq * 1.99, freq * 2.42];
                let gains = [0.25, 0.12, 0.05, 0.02];
                freqs.forEach((f, i) => {
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, time);
                    osc.frequency.exponentialRampToValueAtTime(f * 0.99, time + 4.0);
                    gain.gain.setValueAtTime(gains[i], time); gain.gain.exponentialRampToValueAtTime(0.0001, time + 4.0);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(time); osc.stop(time + 4.0);
                });
            } else {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, time);
                gain.gain.setValueAtTime(0.05, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 0.2);
            }
        }

        // ==================== 核心交互逻辑 ====================
        function hitAltarGong() {
            playGongSound(210, "磬"); 
            spawnFloatText("清静无为 ☯️");
            triggerSmokeBlast();
        }

        function burnIncense() {
            playGongSound(210, "磬");
            document.getElementById('stick1').classList.add('burning');
            document.getElementById('stick2').classList.add('burning');
            document.getElementById('stick3').classList.add('burning');
            spawnFloatText("心香氤氲 荡涤杂念");
            triggerSmokeBlast();
        }

        function triggerSmokeBlast() {
            let bRect = document.querySelector('.classical-burner').getBoundingClientRect();
            // 精确计算香炉口坐标抛出青烟粒子
            generateSmoke(bRect.left + bRect.width / 2, bRect.top + 8, 20, 'templeSmoke');
        }

        function spawnFloatText(txt) {
            let el = document.createElement('div');
            el.className = 'merit-float'; el.innerText = txt;
            el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
            el.style.top = (window.innerHeight * 0.38) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        // 功态吐纳控制
        function toggleBreathMode() {
            const btn = document.getElementById('breath-toggle-btn');
            const ring = document.querySelector('.breath-ring');
            breathMode = !breathMode;
            if (breathMode) {
                btn.innerText = "结束吐纳调理 · 平复气场";
                btn.style.background = "linear-gradient(135deg, #1c364d, #278ea5)"; btn.style.color = "#FFF";
                ring.style.animation = "haloPulse 2s infinite alternate, breathGongState 4s ease-in-out infinite";
                breathTicker = 0;
            } else {
                btn.innerText = "随大殿磁场引导开始吐纳";
                btn.style.background = "linear-gradient(135deg, #a17f43, #d4b26f)"; btn.style.color = "#17110a";
                ring.style.animation = "haloPulse 3s infinite alternate";
            }
        }

        // 动态注入平稳的吐纳动画帧
        let styleSheet = document.createElement("style");
        styleSheet.innerText = "@keyframes breathGongState { 0%, 100% { transform: scale(1) } 50% { transform: scale(1.18) } }";
        document.head.appendChild(styleSheet);

        function switchAisle(aisleId, idx) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.altar-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item')[idx].classList.add('active');
            document.getElementById(aisleId).classList.add('active');
            playGongSound(0, "click");
        }

        function submitWishAltar() {
            let field = document.getElementById('wish-box');
            let txt = field.value.trim();
            if (!txt) { alert("在案前写下心中所求疏文"); return; }
            playGongSound(320, "磬");
            spawnFloatText("疏文呈递 🏮");
            // 横向流动的金色烟霞文疏
            generateSmoke(canvas.width + 10, canvas.innerHeight * 0.25 + Math.random() * 50, 1, 'shuwenScroll', txt);
            field.value = '';
        }

        // ==================== ✨ 动力学粒子无缝渲染循环 ====================
        function generateSmoke(x, y, count, type, text="") {
            for(let i=0; i<count; i++) {
                smokeParticles.push({
                    x: x, y: y,
                    vx: type === 'shuwenScroll' ? -1.2 : (Math.random() - 0.5) * 1.8,
                    vy: type === 'shuwenScroll' ? 0 : -Math.random() * 1.2 - 0.6,
                    alpha: 1,
                    decay: type === 'shuwenScroll' ? 0.002 : Math.random() * 0.01 + 0.006,
                    size: Math.random() * 2.2 + 1.2,
                    type: type,
                    text: `🏮 缘主疏文：${text}`
                });
            }
        }

        function altarRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 渲染环境常明金尘
            for(let i=0; i<floatingDust.length; i++) {
                let dust = floatingDust[i];
                dust.y -= dust.vy;
                if(dust.y < -10) dust.y = canvas.height * 0.75;
                ctx.save();
                ctx.globalAlpha = dust.alpha;
                ctx.fillStyle = '#d4b26f';
                ctx.beginPath(); ctx.arc(dust.x, dust.y, dust.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // 2. 彻底修复：正确的变量检查，驱动吐纳文案动态渐变
            if (breathMode) {
                breathTicker += 0.025;
                const btn = document.getElementById('breath-toggle-btn');
                if (Math.sin(breathTicker) > 0) { 
                    btn.innerText = "✨ 吸气... 汲取灵境纯净磁场"; 
                } else { 
                    btn.innerText = "💨 呼气... 卸下胸中积压焦虑"; 
                }
            }

            // 3. 渲染袅袅香烟与文疏横幅
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                let p = smokeParticles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if(p.alpha <= 0) { smokeParticles.splice(i, 1); continue; }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                if(p.type === 'shuwenScroll') {
                    ctx.fillStyle = '#d4b26f';
                    ctx.font = '14px "Noto Serif CJK SC", "SimSun"';
                    ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    ctx.fillStyle = '#c5a059';
                    ctx.shadowColor = '#c5a059'; ctx.shadowBlur = 4;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
            requestAnimationFrame(altarRenderLoop);
        }
        
        // 启动主渲染循环
        requestAnimationFrame(altarRenderLoop);
    </script>
</body>
</html>
