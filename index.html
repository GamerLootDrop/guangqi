<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星海微茫 · 灵魂级治愈音效版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at 50% 40%, #1c0926 0%, #0d0414 45%, #020104 100%);
            font-family: "Noto Serif SC", serif; color: #fff;
            user-select: none; -webkit-user-select: none;
        }
        .nebula-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(ellipse at 80% 20%, rgba(139, 0, 0, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 20% 80%, rgba(75, 0, 130, 0.15) 0%, transparent 50%);
            mix-blend-mode: screen; pointer-events: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 20px 15px; 
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }
        .user-hub { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #ff4081, #d500f9); border: 1px solid rgba(255,255,255,0.5); }
        .user-info { font-size: 0.75rem; letter-spacing: 1px;}
        .user-id { font-weight: bold; color: #eee; }

        .headphone-tip {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5; pointer-events: none; width: 90%;
            animation: fadeOut 8s forwards;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
        .headphone-tip h1 { font-size: 1.2rem; font-weight: 200; letter-spacing: 4px; margin-bottom: 10px; }
        .headphone-tip p { font-size: 0.8rem; color: rgba(255,255,255,0.6); }

        .bottom-action-area {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10;
            padding: 0 20px calc(env(safe-area-inset-bottom, 20px) + 15px);
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex; flex-direction: column; align-items: center; pointer-events: auto;
        }
        .send-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            width: 80%; max-width: 320px; padding: 14px; border-radius: 30px; font-size: 0.9rem; color: #fff; 
            border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255,255,255,0.1); margin-bottom: 20px; letter-spacing: 2px; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

        /* 灵魂共鸣气泡 */
        .resonance-bubble {
            position: absolute; z-index: 50; padding: 15px 20px; background: rgba(10,5,16,0.85);
            border: 1px solid rgba(213,0,249,0.3); border-radius: 8px; color: #eee;
            width: 280px; opacity: 0; pointer-events: none; transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(213,0,249,0.1);
            transform: translate(-50%, 20px); text-align: center; backdrop-filter: blur(10px);
        }
        .resonance-bubble.active { opacity: 1; transform: translate(-50%, -50%); }
        .rb-text { font-style: italic; font-size: 0.9rem; line-height: 1.6; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="nebula-overlay"></div>
    <canvas id="spaceCanvas"></canvas>

    <div class="top-bar">
        <div class="user-hub">
            <div class="avatar"></div>
            <div class="user-info">
                <div class="user-id">天鹅座 · 暗物质</div>
            </div>
        </div>
    </div>

    <div class="headphone-tip">
        <h1>请务必戴上耳机</h1>
        <p>点击任意星辰 · 聆听宇宙的呼吸</p>
    </div>

    <div class="bottom-action-area">
        <button class="send-btn" onclick="triggerSupernova()">释放执念</button>
    </div>

    <div class="resonance-bubble" id="resBox"></div>

    <script>
        // ==========================================
        // 核心一：直击灵魂的 Web Audio 引擎 (水晶颂钵混响)
        // ==========================================
        let audioCtx = null;
        let masterGain = null;
        let convolver = null; // 灵魂核心：巨大的空间混响

        // 五声治愈音阶 (C, D, E, G, A) - 无论怎么点都不会有违和感
        const pentatonicScale = [523.25, 587.33, 659.25, 783.99, 880.00];

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;
            masterGain.connect(audioCtx.destination);

            // 1. 生成深空混响 (Impulse Response)
            // 这是让声音从“脑电波”变成“大教堂水晶”的魔法
            const reverbTime = 4.0; // 4秒的超长混响
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * reverbTime;
            const impulse = audioCtx.createBuffer(2, length, sampleRate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);
            
            for (let i = 0; i < length; i++) {
                // 指数衰减的白噪音，模拟巨大的真空空间反射
                const decay = Math.exp(-i / (sampleRate * 0.8)); 
                left[i] = (Math.random() * 2 - 1) * decay;
                right[i] = (Math.random() * 2 - 1) * decay;
            }
            
            convolver = audioCtx.createConvolver();
            convolver.buffer = impulse;
            
            // 混响连入主通道
            convolver.connect(masterGain);

            // 启动极微弱的宇宙底噪 (星风)
            startStellarWind();
        }

        // 极微弱的“星际风声”，替代原来的低频嗡鸣
        function startStellarWind() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            // 用低通滤波器把噪音变成柔和的风声
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400; // 只保留极低的呼啸声

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.015; // 声音极低，潜意识级别

            noise.connect(filter);
            filter.connect(convolver); // 风声也加入混响
            noise.start();
        }

        // 核心：敲击水晶颂钵的声音
        function playCrystalChime() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 随机选取五声音阶中的一个音
            const baseFreq = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)];
            const now = audioCtx.currentTime;

            // 制造水晶音的函数 (基频 + 多个高音泛音)
            function createPartial(freq, vol, attack, decay, type='sine') {
                const osc = audioCtx.createOscillator();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, now);
                // 柔和的起音 (Attack)，不是立刻敲击
                gain.gain.linearRampToValueAtTime(vol, now + attack);
                // 极长的尾音缓慢消失 (Decay)
                gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
                
                osc.connect(gain);
                // 直接接入混响器！
                gain.connect(convolver);
                
                osc.start(now);
                osc.stop(now + decay);
            }

            // 合成颂钵音效：1个基音 + 2个泛音
            createPartial(baseFreq, 0.4, 0.05, 3.5);           // 温暖的基音
            createPartial(baseFreq * 2.01, 0.15, 0.02, 2.5);   // 微弱的八度泛音 (稍微失谐一点点 2.01 增加真实感)
            createPartial(baseFreq * 2.99, 0.05, 0.01, 1.5, 'triangle'); // 清脆的玻璃敲击感
        }


        // ==========================================
        // 核心二：第一视角视觉引擎 (不变，保持深空坠落感)
        // ==========================================
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let cx = width / 2, cy = height / 2;
        let rotX = 0, rotY = 0, targetRotX = 0, targetRotY = 0;
        let warpSpeed = 1.0; 
        
        const dummyTexts = [
            "今天很累，但看到了很美的夕阳。", 
            "其实没什么过不去的，宇宙这么大。", 
            "如果重来一次，我不会推开你。",
            "就让所有的执念，留在这个真空里吧。"
        ];

        class Star {
            constructor() { this.reset(true); }
            reset(randomZ = false) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const r = 100 + Math.random() * 800; 
                this.x = r * Math.sin(phi) * Math.cos(theta);
                this.y = r * Math.sin(phi) * Math.sin(theta);
                this.z = randomZ ? (Math.random() * 1000) : (800 + Math.random() * 200);
                this.baseSize = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.3;
                
                // 赋予部分星星文本内容
                this.text = Math.random() > 0.9 ? dummyTexts[Math.floor(Math.random()*dummyTexts.length)] : null;
                // 带有文字的星星颜色稍微偏紫偏亮
                this.color = this.text ? 'rgba(213, 0, 249, ' : 'rgba(255, 255, 255, ';
            }

            draw() {
                this.z -= warpSpeed;
                if (this.z < -50) this.reset(false);

                const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                
                let x1 = this.x * cosY - this.z * sinY, z1 = this.x * sinY + this.z * cosY;
                let y2 = this.y * cosX - z1 * sinX, z2 = this.y * sinX + z1 * cosX;

                const fov = 400; 
                if (z2 + fov > 0) {
                    const scale = fov / (fov + z2);
                    this.screenX = cx + x1 * scale; 
                    this.screenY = cy + y2 * scale;
                    let size = this.baseSize * scale;
                    let currentAlpha = this.alpha;
                    if(z2 < 100) currentAlpha *= (z2 / 100);

                    ctx.beginPath();
                    ctx.arc(this.screenX, this.screenY, this.text ? size * 1.5 : size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + currentAlpha + ')';
                    if (this.text) {
                        ctx.shadowBlur = 15 * scale;
                        ctx.shadowColor = 'rgba(213,0,249,0.8)';
                    }
                    ctx.fill(); ctx.shadowBlur = 0;
                }
            }
        }

        const stars = [];
        for(let i=0; i<300; i++) stars.push(new Star());

        function render() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            if (warpSpeed > 1.0) warpSpeed -= 0.5; else warpSpeed = 1.0;
            rotX += (targetRotX - rotX) * 0.1; rotY += (targetRotY - rotY) * 0.1;
            if(warpSpeed === 1.0) { targetRotY += 0.001; targetRotX += 0.0005; }
            stars.forEach(s => s.draw());
            requestAnimationFrame(render);
        }
        render();

        // ==========================================
        // 交互逻辑：点击触发颂钵治愈音
        // ==========================================
        let isDragging = false, prevX, prevY, moveDist = 0;
        
        canvas.addEventListener('touchstart', e => { 
            initAudio(); // 第一次触摸解锁音频
            isDragging=true; moveDist=0; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; 
        }, {passive:true});
        
        canvas.addEventListener('touchmove', e => {
            if(!isDragging) return;
            const dx = e.touches[0].clientX - prevX; const dy = e.touches[0].clientY - prevY;
            targetRotY += dx * 0.005; targetRotX += dy * 0.005;
            prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; moveDist += Math.abs(dx)+Math.abs(dy);
        }, {passive:true});
        
        canvas.addEventListener('touchend', e => {
            if(isDragging && moveDist < 10) checkClick(prevX, prevY);
            isDragging = false;
        });

        // 兼容 PC 测试
        canvas.addEventListener('mousedown', e => { initAudio(); isDragging=true; moveDist=0; prevX=e.clientX; prevY=e.clientY; });
        canvas.addEventListener('mousemove', e => {
            if(!isDragging) return;
            targetRotY += (e.clientX - prevX) * 0.005; targetRotX += (e.clientY - prevY) * 0.005;
            prevX = e.clientX; prevY = e.clientY; moveDist += 1;
        });
        canvas.addEventListener('mouseup', e => {
            if(isDragging && moveDist < 10) checkClick(prevX, prevY);
            isDragging = false;
        });

        const resBox = document.getElementById('resBox');
        function checkClick(mx, my) {
            let hit = null;
            stars.forEach(s => {
                if(s.screenX && s.text) {
                    const d = Math.hypot(s.screenX - mx, s.screenY - my);
                    if(d < 40) hit = s; // 增大点击判定区域
                }
            });
            
            if(hit) {
                playCrystalChime(); // 触发神仙治愈音效
                resBox.innerHTML = `<div class="rb-text">“${hit.text}”</div>`;
                resBox.style.left = '50%'; resBox.style.top = '40%';
                resBox.classList.add('active');
                warpSpeed = 0.1; // 停下来感受
                setTimeout(() => { resBox.classList.remove('active'); warpSpeed = 1.0; }, 4000);
            } else {
                resBox.classList.remove('active');
                warpSpeed = 1.0;
            }
        }

        function triggerSupernova() {
            initAudio();
            playCrystalChime(); 
            warpSpeed = 40.0; // 模拟释放时的急速跃迁
            setTimeout(() => { playCrystalChime(); }, 200); // 连响两声
        }
    </script>
</body>
</html>
