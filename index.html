<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        /* ==================== 🪐 全局沉浸式空间 ==================== */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050302;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            user-select: none;
        }

        /* 🌌 核心：把真实的道观图片作为全屏背景 */
        .temple-photo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            /* 画面暗化滤镜，增强神秘感和深邃度，同时让控制台文字更清晰 */
            filter: brightness(0.75) contrast(1.1);
            z-index: 1;
        }

        /* 🌫️ 氛围营造：大殿香炉内动态飘散的半透明烟雾 */
        .incense-smoke-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 65%, rgba(255,255,255,0.04), transparent 55%);
            mix-blend-mode: screen; pointer-events: none; z-index: 2;
            animation: smokeDrift 10s ease-in-out infinite alternate;
        }
        @keyframes smokeDrift {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.15) translate(-15px, -25px); opacity: 0.7; }
        }

        /* ==================== ☯️ 页面上方悬浮的动态太极发光盘 ==================== */
        .floating-taichi-aura {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; z-index: 10; pointer-events: none;
        }
        .taichi-disk-svg {
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.1) 75%), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="none" stroke="%23bda16a" stroke-width="2"/><path d="M50 2A48 48 0 0 1 50 98A24 24 0 0 1 50 50A24 24 0 0 0 50 2" fill="%23110c0a"/><path d="M50 2A48 48 0 0 0 50 98A24 24 0 0 0 50 50A24 24 0 0 1 50 2" fill="%23faf6ee"/><circle cx="50" cy="26" r="6" fill="%23faf6ee"/><circle cx="50" cy="74" r="6" fill="%23110c0a"/></svg>') no-repeat center center;
            background-size: contain; border-radius: 50%;
            box-shadow: 0 0 35px rgba(254, 235, 191, 0.5);
            animation: slowSpin 25s linear infinite;
        }
        @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ==================== 🎛️ 磨砂玻璃效果的半透明控制台（对应图二） ==================== */
        .glass-console-panel {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            width: 85vw; max-width: 420px; z-index: 20;
            /* 极度关键：半透明底色 + 磨砂玻璃滤镜，透出背后的精美木纹 */
            background: rgba(18, 13, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(189, 161, 106, 0.35); border-top: 3px solid #bda16a;
            border-radius: 8px; padding: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* 控制台标题古风设计 */
        .panel-header { text-align: center; margin-bottom: 12px; }
        .panel-header h2 { margin: 0; font-size: 19px; color: #f3e1b9; letter-spacing: 6px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .panel-header p { margin: 4px 0 0 0; font-size: 11px; color: #a69580; letter-spacing: 2px; opacity: 0.6; }

        /* 功能卡片页签 */
        .tab-menu-row { width: 100%; display: flex; gap: 6px; margin-bottom: 12px; }
        .tab-item-btn {
            flex: 1; background: rgba(5, 4, 3, 0.6); border: 1px solid rgba(189, 161, 106, 0.25);
            color: #bfae9c; padding: 8px 0; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 3px; transition: all 0.2s;
        }
        .tab-item-btn.active {
            background: linear-gradient(135deg, #7c1f17, #a62d22); color: #fff; border-color: #bda16a;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.2);
        }
        
        .tab-content-pane { width: 100%; display: none; }
        .tab-content-pane.active { display: block; }

        /* 金色宽扁的主操作按钮 */
        .gold-action-btn {
            background: linear-gradient(135deg, #a67f3c, #f7e4be); color: #1c130e;
            border: none; width: 100%; padding: 12px; font-size: 13px; font-weight: bold;
            border-radius: 3px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            letter-spacing: 3px; font-family: inherit;
        }
        .gold-action-btn:active { transform: scale(0.98); }
        
        /* 愿望文本框 */
        .wish-input-element {
            width: 100%; padding: 9px; background: rgba(5, 4, 3, 0.8);
            border: 1px solid #4a3b2c; color: #fff; text-align: center;
            font-size: 12px; border-radius: 3px; margin-bottom: 10px; outline: none;
        }

        /* 祈愿文字在空中飘过的特效 */
        .ethereal-toast {
            position: absolute; color: #f7e4be; font-size: 14px; font-weight: bold;
            pointer-events: none; left: 50%; top: 22%; transform: translateX(-50%);
            animation: riseAndFade 2.5s ease-out forwards;
            text-shadow: 0 2px 8px #000, 0 0 10px rgba(254, 235, 191, 0.6); z-index: 100;
        }
        @keyframes riseAndFade {
            0% { transform: translate(-50%, 30px); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(-50%, -40px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="temple-photo-bg"></div>
    <div class="incense-smoke-layer"></div>

    <div class="floating-taichi-aura">
        <div class="taichi-disk-svg"></div>
    </div>

    <div class="glass-console-panel">
        <div class="panel-header">
            <h2>三清大殿 · 乾坤灵境</h2>
            <p>☯ 虔诚敬奉 · 鸣磬修心 ☯</p>
        </div>

        <div class="tab-menu-row">
            <button class="tab-item-btn active" onclick="switchConsoleTab('p-incense', 0)">敬奉心香</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-breath', 1)">功态吐纳</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-wish', 2)">文疏祈愿</button>
        </div>

        <div id="p-incense" class="tab-content-pane active">
            <button class="gold-action-btn" onclick="ringTempleBell()">叩击混元法盘 · 鸣磬静心</button>
        </div>
        <div id="p-breath" class="tab-content-pane">
            <button class="gold-action-btn" id="breath-btn" onclick="triggerBreathExercise()">开始跟随法盘磁场吐纳</button>
        </div>
        <div id="p-wish" class="tab-content-pane">
            <input type="text" id="wish-box" class="wish-input-element" placeholder="在案前至诚书写心中所求（如：远离内耗）" maxlength="16">
            <button class="gold-action-btn" onclick="sendWish疏文()">化文疏归于烟霞</button>
        </div>
    </div>

    <script>
        let breathTimer = null;
        let breathState = 0; 
        let audioCtx = null;

        // 🔊 生成道观中空灵沉静的铜磬音频
        function playBellSound(frequency) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let now = audioCtx.currentTime;
                let components = [frequency, frequency * 1.52, frequency * 1.95];
                let volumes = [0.2, 0.07, 0.02];
                
                components.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    gainNode.gain.setValueAtTime(volumes[i], now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 4.5);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 4.5);
                });
            } catch(e) {}
        }

        function ringTempleBell() {
            playBellSound(215);
            showEtherealToast("鸣磬一下 · 内耗消散 ☯️");
        }

        function sendWish疏文() {
            let input = document.getElementById('wish-box');
            let text = input.value.trim();
            if(!text) return;
            playBellSound(270);
            showEtherealToast(`文疏已化，随风化煞：${text} 🏮`);
            input.value = '';
        }

        function triggerBreathExercise() {
            const btn = document.getElementById('breath-btn');
            if (breathTimer) {
                clearInterval(breathTimer); breathTimer = null;
                btn.innerText = "开始跟随法盘磁场吐纳"; return;
            }
            breathState = 0;
            btn.innerText = "✨ 吸气... 汲取大殿纯阳之气";
            breathTimer = setInterval(() => {
                breathState = 1 - breathState;
                btn.innerText = breathState === 0 ? "✨ 吸气... 汲取大殿纯阳之气" : "💨 呼气... 排出体内焦虑烦杂";
            }, 4000);
        }

        function showEtherealToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'ethereal-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 解锁 Web Audio
        document.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        function switchConsoleTab(paneId, index) {
            document.querySelectorAll('.tab-item-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item-btn')[index].classList.add('active');
            document.getElementById(paneId).classList.add('active');
        }
    </script>
</body>
</html>
