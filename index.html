<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云上道观 · 沉浸式修仙</title>
    <style>
        /* 全局高级感重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Noto Serif SC", "SimSun", serif;
            background-color: #050b14;
            color: #e0d5c1;
        }

        /* 核心背景：巨幅沉浸式视觉 */
        .scenery-container {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('bg1.jpg'); /* 这里放你最喜欢的那张大殿照片 */
            background-size: cover;
            background-position: center;
            transition: transform 0.1s ease-out, filter 1s ease-in-out;
            filter: brightness(0.85) contrast(1.05);
        }

        /* 赛博动态青烟特效 */
        .smoke-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05), transparent 60%);
            pointer-events: none;
            mix-blend-mode: screen;
            animation: smokeMove 8s infinite alternate ease-in-out;
        }

        @keyframes smokeMove {
            0% { transform: scale(1) translate(0, 0); filter: blur(4px); }
            100% { transform: scale(1.1) translate(2%, -3%); filter: blur(8px); }
        }

        /* 遮罩：营造深邃的寺庙氛围 */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(3, 7, 15, 0.8) 100%);
            pointer-events: none;
        }

        /* 顶部庄严匾额标题 */
        .header-title {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }
        .header-title h1 {
            font-size: 2.5rem;
            letter-spacing: 0.8rem;
            color: #eddba4;
            text-shadow: 0 0 15px rgba(237, 219, 164, 0.4);
            margin-bottom: 5px;
        }
        .header-title p {
            font-size: 0.9rem;
            letter-spacing: 0.3rem;
            color: #8c96a0;
        }

        /* 右侧移步换景书卷菜单 */
        .nav-menu {
            position: absolute;
            right: 4%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: rgba(12, 22, 36, 0.75);
            padding: 30px 20px;
            border-radius: 5px;
            border: 1px solid rgba(237, 219, 164, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .nav-item {
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 6px;
            font-size: 1.1rem;
            color: #a3b0c2;
            transition: all 0.3s ease;
            padding: 10px 5px;
            border-left: 2px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            color: #eddba4;
            text-shadow: 0 0 10px rgba(237, 219, 164, 0.6);
            border-left: 2px solid #eddba4;
        }

        /* 中央核心交互区：赛博功德箱 */
        .interaction-zone {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 炫酷的古典渐变发光按钮 */
        .temple-btn {
            background: linear-gradient(135deg, #8c2525 0%, #4a1212 100%);
            border: 1px solid #eddba4;
            color: #eddba4;
            padding: 15px 40px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(140, 37, 37, 0.4);
            transition: all 0.3s ease;
        }
        .temple-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(237, 219, 164, 0.6);
            background: linear-gradient(135deg, #a62e2e 0%, #5c1818 100%);
        }

        /* 功德弹窗文字 */
        .gongde-text {
            position: absolute;
            color: #eddba4;
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transform: translateY(0);
            animation: floatUp 1.2s ease-out forwards;
            text-shadow: 0 0 8px #eddba4;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        /* 底部功德计数器 */
        .counter-panel {
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .counter-panel span {
            color: #eddba4;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="scenery-container" id="bgLayer"></div>
    
    <div class="smoke-overlay"></div>
    <div class="vignette"></div>

    <div class="header-title">
        <h1 id="mainTitle">玉 虚 殿</h1>
        <p id="subTitle">意念通天 · 福泽万物</p>
    </div>

    <div class="nav-menu">
        <div class="nav-item active" onclick="switchScene('玉虚殿', '意念通天 · 福泽万物', 'bg1.jpg', this)">正殿供奉</div>
        <div class="nav-item" onclick="switchScene('祖师殿', '玄风永振 · 青烟袅袅', 'bg2.jpg', this)">祖师祈福</div>
        <div class="nav-item" onclick="switchScene('玄帝殿', '太乙寻祥 · 俯瞰群山', 'bg3.jpg', this)">后山许愿</div>
    </div>

    <div class="interaction-zone">
        <div id="floatContainer"></div>
        <button class="temple-btn" onclick="addGongde()">敲击木鱼 · 虔诚供奉</button>
        <div class="counter-panel">当前功德：<span id="gongdeCount">0</span></div>
    </div>

    <script>
        let count = 0;

        // 功能一：实现震撼的鼠标动态视差效果（让静态照片有立体感）
        const bgLayer = document.getElementById('bgLayer');
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;
            bgLayer.style.transform = `translate(${x}px, ${y}px) scale(1.02)`;
        });

        // 功能二：点击增加功德，并在屏幕上飘出金色文字
        function addGongde() {
            count++;
            document.getElementById('gongdeCount').innerText = count;

            // 创建飘字特效
            const container = document.getElementById('floatContainer');
            const text = document.createElement('div');
            text.className = 'gongde-text';
            text.innerText = '功德 +1';
            
            // 随机给飘字加一点点左右偏移，看起来更灵动
            const randomX = Math.random() * 40 - 20;
            text.style.left = `calc(50% + ${randomX}px)`;
            
            container.appendChild(text);

            // 播放自带的系统提示音（假装是木鱼声，后期可以换成真木鱼音频）
            if(window.AudioContext || window.webkitAudioContext) {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, ctx.currentTime); // 低沉的木鱼质感
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            }

            // 动画结束后自动销毁文字，不占内存
            setTimeout(() => {
                text.remove();
            }, 1200);
        }

        // 功能三：移步换景核心逻辑
        function switchScene(title, subtitle, bgImage, element) {
            // 切换菜单激活状态
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // 触发淡出淡入切换背景
            bgLayer.style.filter = 'brightness(0) contrast(1)';
            
            setTimeout(() => {
                // 现实开发中，用户需要把自己的照片改名为 bg1.jpg, bg2.jpg, bg3.jpg 放在同目录下
                bgLayer.style.backgroundImage = `url('${bgImage}')`;
                document.getElementById('mainTitle').innerText = title;
                document.getElementById('subTitle').innerText = subtitle;
                bgLayer.style.filter = 'brightness(0.85) contrast(1.05)';
            }, 500);
        }
    </script>
</body>
</html>
