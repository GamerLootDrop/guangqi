<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静心 · 空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #04080e;
            font-family: "Noto Serif SC", "SimSun", serif;
        }
        
        /* Canvas 铺满全屏，作为 3D 粒子空间的载体 */
        #spaceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #spaceCanvas:active {
            cursor: grabbing;
        }

        /* 氛围光晕遮罩：加强空间的深邃与包裹感 */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), transparent 20%, rgba(3, 6, 11, 0.9) 80%);
            pointer-events: none;
            z-index: 2;
        }

        /* 极简精神容器（文案提示） */
        .soul-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 80%;
            max-width: 600px;
        }

        .soul-text {
            color: #c5bba4;
            font-size: 1.3rem;
            letter-spacing: 6px;
            line-height: 2.5rem;
            opacity: 0;
            filter: blur(5px);
            animation: textBreath 12s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(197, 187, 164, 0.3);
        }

        /* 极简呼吸感动画：文案缓缓浮现、隐去，不给用户任何心理压力 */
        @keyframes textBreath {
            0% { opacity: 0; filter: blur(5px); transform: scale(0.98); }
            30% { opacity: 0.85; filter: blur(0px); transform: scale(1); }
            70% { opacity: 0.85; filter: blur(0px); transform: scale(1); }
            100% { opacity: 0; filter: blur(5px); transform: scale(1.02); }
        }

        /* 控制器：声音开关 */
        .audio-trigger {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: transparent;
            border: 1px solid rgba(197, 187, 164, 0.25);
            color: #a49b85;
            padding: 8px 24px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s;
            outline: none;
        }
        .audio-trigger:hover {
            border-color: #c5bba4;
            color: #c5bba4;
            box-shadow: 0 0 15px rgba(197, 187, 164, 0.15);
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>
    
    <div class="ambient-glow" id="glowLayer"></div>

    <div class="soul-container">
        <p class="soul-text" id="breathingText">闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。</p>
    </div>

    <button class="audio-trigger" onclick="toggleSpaceAudio()" id="audioBtn">开启深山听泉</button>

    <script>
        // --- 核心模块一：纯代码从零勾勒的 3D 旋转星系/粒子空间 ---
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const glowLayer = document.getElementById('glowLayer');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 视角旋转核心参数（通过拖拽或鼠标移动改变，实现全景 3D 环顾）
        let rotationX = 0;
        let rotationY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;

        // 空间内的粒子总数（构成无边界的空灵空间）
        const particleCount = 400;
        const particles = [];

        class Particle {
            constructor() {
                // 在 3D 球体空间内随机散落粒子
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const distance = 400 + Math.random() * 800; // 空间深度

                this.x = distance * Math.sin(phi) * Math.cos(theta);
                this.y = distance * Math.sin(phi) * Math.sin(theta);
                this.z = distance * Math.cos(phi);
                
                this.size = Math.random() * 1.5 + 0.5;
                // 温柔细腻的中式古风配色：瓦灰、月白、微金
                const colors = ['rgba(197, 187, 164, 0.4)', 'rgba(220, 211, 190, 0.3)', 'rgba(146, 159, 174, 0.2)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            draw(rotX, rotY) {
                // 3D 矩阵旋转数学公式（处理 X 轴与 Y 轴旋转）
                let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                let cosY = Math.cos(rotY), sinY = Math.sin(rotY);

                // 旋转 Y 轴
                let x1 = this.x * cosY - this.z * sinY;
                let z1 = this.x * sinY + this.z * cosY;

                // 旋转 X 轴
                let y2 = this.y * cosX - z1 * sinX;
                let z2 = this.y * sinX + z1 * cosX;

                // 3D 透视投影（焦距 600，算出屏幕上的 2D 坐标）
                const fov = 600;
                if (z2 + fov > 0) {
                    const scale = fov / (fov + z2);
                    const screenX = width / 2 + x1 * scale;
                    const screenY = height / 2 + y2 * scale;

                    // 渲染粒子
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, this.size * scale, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }
        }

        // 初始化空间粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 鼠标/手指交互逻辑：拖拽或者移动，带动 3D 空间缓缓旋转
        window.addEventListener('mousemove', (e) => {
            // 实时更新背景遮罩的光晕圆心位置
            glowLayer.style.setProperty('--mx', `${e.clientX}px`);
            glowLayer.style.setProperty('--my', `${e.clientY}px`);

            if (!isDragging) {
                // 鼠标轻微晃动时，视角有 2% 的温柔跟随效果
                targetRotationY = (e.clientX - width / 2) * 0.0003;
                targetRotationX = (e.clientY - height / 2) * 0.0003;
            }
        });

        // 鼠标按住拖拽：实现 360 度环顾空间
        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMouseX;
                const deltaY = e.clientY - previousMouseY;
                targetRotationY += deltaX * 0.003;
                targetRotationX += deltaY * 0.003;
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);
        
        // 兼容手机端触摸环顾
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMouseX = e.touches[0].clientX;
            previousMouseY = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaX = e.touches[0].clientX - previousMouseX;
                const deltaY = e.touches[0].clientY - previousMouseY;
                targetRotationY += deltaX * 0.005;
                targetRotationX += deltaY * 0.005;
                previousMouseX = e.touches[0].clientX;
                previousMouseY = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', () => isDragging = false);

        // 持续渲染循环
        function render() {
            ctx.clearRect(0, 0, width, 0);
            // 营造尾迹/渐暗效果，让粒子旋转带有一丝丝空灵的流动感
            ctx.fillStyle = 'rgba(4, 8, 14, 0.15)'; 
            ctx.fillRect(0, 0, width, height);

            // 缓动函数（让视角的停止具有惯性和丝滑感）
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            // 空间即使静止，粒子也在极其微弱地自转，仿佛时光流动
            targetRotationY += 0.0001; 

            for (let p of particles) {
                p.draw(rotationX, rotationY);
            }

            requestAnimationFrame(render);
        }
        render();

        // 窗口大小缩放自适应
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });


        // --- 核心模块二：心理学文字轮播设计 ---
        const texts = [
            "闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。",
            "红尘滚滚，总有来路。<br>停下歇歇，本就无需向任何人交代。",
            "风撩屋檐，雨润青苔。<br>心里积攒的那些委屈，就在这里散了吧。",
            "万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。"
        ];
        let textIndex = 0;
        const textEl = document.getElementById('breathingText');
        
        // 配合 CSS 动画周期（12秒），每 12 秒温柔切换一句直击心灵的话
        setInterval(() => {
            textIndex = (textIndex + 1) % texts.length;
            textEl.innerHTML = texts[textIndex];
        }, 12000);


        // --- 核心模块三：纯数学音频合成（雨声、风铃声） ---
        let audioCtx = null;
        let rainInterval = null;

        function toggleSpaceAudio() {
            const btn = document.getElementById('audioBtn');
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
                clearInterval(rainInterval);
                btn.innerText = "开启深山听泉";
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            btn.innerText = "断开世俗喧嚣";

            // 1. 纯数学噪音公式生成持续的温润雨声
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime); // 过滤尖锐声，变成极其舒适的深夜大雨

            const rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(0.1, audioCtx.currentTime);

            whiteNoise.connect(filter);
            filter.connect(rainGain);
            rainGain.connect(audioCtx.destination);
            whiteNoise.start();

            // 2. 模拟偶有微风掠过时的远山古庙铜铃声
            rainInterval = setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let bellGain = audioCtx.createGain();
                
                osc.type = 'sine';
                // 880Hz到1000Hz之间的清脆声，带有一丝空灵沉静
                osc.frequency.setValueAtTime(800 + Math.random() * 150, audioCtx.currentTime); 
                
                bellGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
                bellGain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.1);
                bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.5); // 悠长的空灵余音
                
                osc.connect(bellGain);
                bellGain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 4.5);
            }, 8000); // 约每 8 秒铜铃一响
        }
    </script>
</body>
</html>
