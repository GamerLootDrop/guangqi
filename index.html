<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云上道观 · 见心知性</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Noto Serif SC", "SimSun", serif;
            background-color: #03060a;
            color: #dcd3be;
        }

        /* 沉浸式巨幅背景（支持细腻鼠标视差） */
        .scenery-container {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('bg3.jpg'); /* 默认用你部署的三清殿 */
            background-size: cover;
            background-position: center;
            transition: transform 0.15s ease-out, filter 1.5s ease-in-out;
            filter: brightness(0.75) contrast(1.05);
            z-index: 1;
        }

        /* 阴暗环境遮罩：烘托庄严神秘感 */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(3, 6, 10, 0.85) 100%);
            pointer-events: none;
            z-index: 2;
            transition: opacity 1.5s ease;
        }

        /* 所有的UI元素支持一键隐退淡出 */
        .ui-element {
            position: absolute;
            z-index: 10;
            transition: opacity 1.5s ease, transform 1.5s ease;
            opacity: 1;
        }

        /* 隐退模式下的状态 */
        .pure-mode .ui-element {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* 顶部庄严匾额 */
        .header-title {
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .header-title h1 {
            font-size: 2.2rem;
            letter-spacing: 0.8rem;
            color: #eddba4;
            text-shadow: 0 0 15px rgba(237, 219, 164, 0.3);
            margin-bottom: 8px;
        }
        .header-title p {
            font-size: 0.85rem;
            letter-spacing: 0.4rem;
            color: #7e8a96;
        }

        /* 右侧古风书卷式换景菜单 */
        .nav-menu {
            right: 4%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: rgba(10, 16, 26, 0.75);
            padding: 35px 22px;
            border-radius: 4px;
            border: 1px solid rgba(237, 219, 164, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        .nav-item {
            cursor: pointer;
            writing-mode: vertical-rl;
            letter-spacing: 6px;
            font-size: 1.05rem;
            color: #929fae;
            transition: all 0.4s ease;
            padding: 8px 4px;
            border-left: 1px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            color: #eddba4;
            text-shadow: 0 0 10px rgba(237, 219, 164, 0.5);
            border-left: 1px solid #eddba4;
        }

        /* 左下角：心理学意念树洞 */
        .tree-hole {
            bottom: 6%;
            left: 4%;
            background: rgba(10, 16, 26, 0.6);
            border: 1px solid rgba(237, 219, 164, 0.1);
            padding: 15px 20px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
            width: 280px;
        }
        .tree-hole p {
            font-size: 0.8rem;
            color: #8a95a1;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .tree-hole-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(237, 219, 164, 0.2);
            padding: 8px 12px;
            color: #e0d5c1;
            font-family: inherit;
            font-size: 0.85rem;
            border-radius: 2px;
            outline: none;
            resize: none;
            transition: border 0.3s;
        }
        .tree-hole-input:focus {
            border: 1px solid #eddba4;
        }
        .tree-hole-btn {
            margin-top: 8px;
            float: right;
            background: transparent;
            border: 1px solid rgba(237, 219, 164, 0.4);
            color: #eddba4;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .tree-hole-btn:hover {
            background: #eddba4;
            color: #0a101a;
        }

        /* 文字化为青烟的动画图层 */
        .smoke-text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .fading-smoke-text {
            position: absolute;
            color: #eddba4;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            white-space: nowrap;
            opacity: 0;
            transform: scale(1) translateY(0);
            filter: blur(0px);
            animation: smokeDissolve 5s ease-in-out forwards;
            text-shadow: 0 0 8px rgba(237, 219, 164, 0.5);
            writing-mode: vertical-rl;
        }
        @keyframes smokeDissolve {
            0% { opacity: 0; transform: scale(0.9) translateY(0); filter: blur(0px); }
            15% { opacity: 0.7; filter: blur(0.5px); }
            50% { opacity: 0.4; transform: scale(1.05) translate(15px, -80px); filter: blur(2px); }
            100% { opacity: 0; transform: scale(1.2) translate(40px, -200px); filter: blur(6px); }
        }

        /* 中央核心交互区 */
        .center-zone {
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .pray-btn {
            background: rgba(140, 37, 37, 0.85);
            border: 1px solid #eddba4;
            color: #eddba4;
            padding: 12px 35px;
            font-size: 1.05rem;
            letter-spacing: 3px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(140, 37, 37, 0.3);
            transition: all 0.3s ease;
        }
        .pray-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(237, 219, 164, 0.4);
            background: rgba(166, 46, 46, 0.95);
        }

        /* 一键放开/提示唤醒 */
        .pure-trigger-btn {
            background: transparent;
            border: 1px solid rgba(237, 219, 164, 0.3);
            color: #929fae;
        }
        .wakeup-hint {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: rgba(237, 219, 164, 0.3);
            letter-spacing: 2px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 100;
        }
        .pure-mode .wakeup-hint {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="scenery-container" id="bgLayer"></div>
    <div class="vignette" id="vignetteLayer"></div>
    <div class="smoke-text-layer" id="smokeTextLayer"></div>

    <div class="ui-element header-title">
        <h1 id="mainTitle">三 清 殿</h1>
        <p id="subTitle">虚怀若谷 · 观照内心</p>
    </div>

    <div class="ui-element tree-hole">
        <p>若有凡忧，在此写下，让它随风而去：</p>
        <textarea class="tree-hole-input" id="holeInput" rows="2" placeholder="不存痕迹，唯留清净..."></textarea>
        <button class="tree-hole-btn" onclick="releaseTrouble()">放下</button>
    </div>

    <div class="ui-element nav-menu">
        <div class="nav-item" onclick="switchScene('玉虚殿', '清心寡欲 · 复归本然', 'bg1.jpg', this)">正殿供奉</div>
        <div class="nav-item" onclick="switchScene('祖师殿', '一炷清香  · 诸神庇佑', 'bg2.jpg', this)">祖师祈福</div>
        <div class="nav-item active" onclick="switchScene('三清殿', '虚怀若谷 · 观照内心', 'bg3.jpg', this)">后山放空</div>
    </div>

    <div class="ui-element center-zone">
        <button class="pray-btn" onclick="playTempleSound()">静坐听泉</button>
        <button class="pray-btn pure-trigger-btn" onclick="togglePureMode(true)">屏退喧嚣 · 闭目放空</button>
    </div>

    <div class="wakeup-hint">点击屏幕任意位置，唤醒尘世</div>

    <script>
        // 核心功能一：细腻的鼠标视差（赋予平面照片纵深感）
        const bgLayer = document.getElementById('bgLayer');
        window.addEventListener('mousemove', (e) => {
            if (document.body.classList.contains('pure-mode')) return; // 放空模式下减少晃动
            const x = (window.innerWidth / 2 - e.clientX) / 45; // 减小幅度，更显稳重肃穆
            const y = (window.innerHeight / 2 - e.clientY) / 45;
            bgLayer.style.transform = `translate(${x}px, ${y}px) scale(1.03)`;
        });

        // 核心功能二：意念树洞 · 文字化为青烟飘散
        function releaseTrouble() {
            const input = document.getElementById('holeInput');
            const text = input.value.trim();
            if (!text) return;

            // 创建飘散的文字元素
            const layer = document.getElementById('smokeTextLayer');
            const smokeEl = document.createElement('div');
            smokeEl.className = 'fading-smoke-text';
            smokeEl.innerText = text;

            // 让它从输入框附近或者大殿香炉附近升起
            smokeEl.style.left = '15%';
            smokeEl.style.bottom = '20%';

            layer.appendChild(smokeEl);

            // 清空输入框，造成“已经放下”的心理暗示
            input.value = '';

            // 动画结束后自动移除，不占内存
            setTimeout(() => { smokeEl.remove(); }, 5000);
        }

        // 核心功能三：一键屏退喧嚣（放空模式）
        function togglePureMode(isPure) {
            if (isPure) {
                document.body.classList.add('pure-mode');
                document.getElementById('vignetteLayer').style.background = 'radial-gradient(circle, transparent 20%, rgba(2, 4, 6, 0.95) 100%)';
            } else {
                document.body.classList.remove('pure-mode');
                document.getElementById('vignetteLayer').style.background = 'radial-gradient(circle, transparent 30%, rgba(3, 6, 10, 0.85) 100%)';
            }
        }

        // 在放空模式下，点击任何地方都会温柔地唤醒界面
        window.addEventListener('click', (e) => {
            if (document.body.classList.contains('pure-mode')) {
                // 如果点的是触发按钮本身，不重复触发
                if (e.target.classList.contains('pure-trigger-btn')) return;
                togglePureMode(false);
            }
        });

        // 核心功能四：移步换景（丝滑淡入淡出）
        function switchScene(title, subtitle, bgImage, element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            bgLayer.style.filter = 'brightness(0) contrast(1)';
            setTimeout(() => {
                bgLayer.style.backgroundImage = `url('${bgImage}')`;
                document.getElementById('mainTitle').innerText = title;
                document.getElementById('subTitle').innerText = subtitle;
                bgLayer.style.filter = 'brightness(0.75) contrast(1.05)';
            }, 600);
        }

        // 核心功能五：纯代码生成“深山夜雨与微风远铃”白噪音（无需额外音频文件）
        let audioCtx = null;
        function playTempleSound() {
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
                document.querySelector('.center-zone button').innerText = "静坐听泉";
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.querySelector('.center-zone button').innerText = "断开俗世";

            // 1. 实时合成淅淅沥沥的雨声（白噪声滤掉高频）
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, audioCtx.currentTime); // 闷闷的、让人安心的雨声

            const rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(0.12, audioCtx.currentTime);

            whiteNoise.connect(filter);
            filter.connect(rainGain);
            rainGain.connect(audioCtx.destination);
            whiteNoise.start();

            // 2. 定时模拟偶尔的一声空灵远铃（微风吹动铜铃）
            setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let bellGain = audioCtx.createGain();
                
                osc.type = 'sine';
                // 铜铃的高频清脆感
                osc.frequency.setValueAtTime(880 + Math.random() * 200, audioCtx.currentTime); 
                
                bellGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
                bellGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.1);
                bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.0); // 漫长的回音
                
                osc.connect(bellGain);
                bellGain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 4.0);
            }, 7000); // 每隔7秒左右响一次远铃
        }
    </script>
</body>
</html>
