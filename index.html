<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 灵魂轨迹观测站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0d1124 0%, #03040a 100%);
            font-family: "Noto Serif SC", serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- 高级 HUD 界面 --- */
        .hud-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 10; pointer-events: none; padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .soul-badge {
            background: rgba(255,255,255,0.05); border-left: 3px solid #b8860b;
            padding: 10px 18px; border-radius: 2px 10px 10px 2px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .soul-badge .label { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 4px; }
        .soul-badge .value { font-size: 0.9rem; color: #eee; letter-spacing: 1px; }

        .currency-hub { text-align: right; }
        .currency-hub .coin-info { color: #ffd700; font-weight: bold; font-size: 1rem; margin-bottom: 8px; display: block; }
        .btn-glass {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.75rem;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-glass:hover { background: #ffd700; color: #000; border-color: #ffd700; }

        /* 中央意境文字 */
        .ambient-box { text-align: center; margin-top: -10vh; pointer-events: none; }
        .ambient-box h1 { font-size: 1.4rem; font-weight: 200; color: rgba(255,255,255,0.85); letter-spacing: 6px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .ambient-box p { font-size: 0.8rem; color: rgba(255,255,255,0.35); letter-spacing: 2px; }

        /* 底部功能区 */
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; gap: 15px; }
        .bottom-left-group { display: flex; gap: 15px; }
        
        .btn-report {
            background: transparent; border: 1px solid rgba(255,215,0,0.4);
            color: #ffd700; padding: 10px 22px; border-radius: 4px; cursor: pointer;
            font-size: 0.8rem; letter-spacing: 2px; transition: all 0.4s;
        }
        .btn-music {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 22px; border-radius: 4px; cursor: pointer;
            font-size: 0.8rem; letter-spacing: 2px; transition: all 0.4s; backdrop-filter: blur(5px);
        }
        .btn-music.active { border-color: #00e5ff; color: #00e5ff; box-shadow: 0 0 15px rgba(0,229,255,0.2); }

        .btn-main {
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 14px 32px; border-radius: 30px; cursor: pointer; font-size: 0.9rem;
            letter-spacing: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.4s;
        }

        /* --- 卡片与弹窗 --- */
        .report-overlay, .input-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .report-card, .input-content {
            background: #0d0e12; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px;
            padding: 35px 30px; position: relative; color: #fff; text-align: left;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9); border-radius: 12px;
        }
        .report-card::before { content: 'OBSERVATION'; position: absolute; top: 20px; right: 20px; font-size: 0.6rem; color: #ffd700; opacity: 0.5; }
        .report-card h2 { font-size: 1.5rem; font-weight: 200; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; letter-spacing: 2px; }
        .report-card .info-row { margin-bottom: 20px; }
        .report-card .info-row .lab { font-size: 0.7rem; color: #666; margin-bottom: 5px; }
        .report-card .info-row .val { font-size: 1rem; color: #ccc; }
        .report-card .quote { font-style: italic; color: #ffd700; line-height: 1.8; margin: 30px 0; font-size: 0.95rem; }
        .report-card .footer-msg { font-size: 0.7rem; color: #444; border-top: 1px solid #222; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .qr-mock { width: 45px; height: 45px; background: #222; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.4rem; color: #555; text-align:center; }

        .input-content textarea {
            width: 100%; height: 120px; background: rgba(0,0,0,0.4); border: 1px solid #333;
            border-radius: 8px; padding: 15px; color: #fff; font-size: 0.95rem; font-family: inherit;
            outline: none; margin-bottom: 20px; resize: none;
        }
        .input-actions { display: flex; justify-content: flex-end; gap: 15px; }

        .resonance-box {
            position: absolute; z-index: 50; padding: 25px; background: rgba(13,14,20,0.95);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; color: #eee;
            width: 320px; opacity: 0; pointer-events: none; transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .resonance-box.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -120%); }

        /* --- 专门针对手机端的优雅排版优化 --- */
        @media (max-width: 768px) {
            .hud-overlay { padding: 20px 15px; }
            .ambient-box { margin-top: -5vh; }
            .ambient-box h1 { font-size: 1.15rem; letter-spacing: 4px; }
            .ambient-box p { font-size: 0.7rem; }
            
            /* 手机端底部按钮改为紧凑的垂直居中流式布局 */
            .hud-bottom { flex-direction: column; align-items: center; gap: 20px; justify-content: flex-end; padding-bottom: 10px; }
            .bottom-left-group { flex-direction: row; gap: 10px; justify-content: center; width: 100%; }
            
            /* 调整手机端按钮尺寸，避免撑满屏幕显得蠢笨 */
            .btn-report, .btn-music { padding: 10px 12px; font-size: 0.75rem; letter-spacing: 1px; flex: 1; text-align: center; white-space: nowrap;}
            .btn-main { padding: 14px 40px; font-size: 0.85rem; width: auto; border-radius: 30px; letter-spacing: 2px;}
            
            .resonance-box { width: 88vw; left: 50% !important; top: 50% !important; transform: translate(-50%, -50%) !important; }
            .resonance-box.active { transform: translate(-50%, -50%) !important; }
        }
    </style>
</head>
<body>

    <div class="hud-overlay">
        <div class="hud-top">
            <div class="soul-badge">
                <div class="label">SOUL TRACKING</div>
                <div class="value" id="userSign">天鹅座 · 慢中子</div>
            </div>
            <div class="currency-hub">
                <span class="coin-info">💰 <span id="coinVal">190</span></span>
                <button class="btn-glass" onclick="chargeCoins()">测试充值</button>
            </div>
        </div>

        <div class="ambient-box">
            <h1 id="breathingText">闭眼，听雨。这一刻只属于你。</h1>
            <p>星河不渡杂音 · 唯有灵魂共鸣</p>
        </div>

        <div class="hud-bottom">
            <div class="bottom-left-group">
                <button class="btn-report" onclick="showReport()">生成灵魂报告</button>
                <button class="btn-music" id="musicBtn" onclick="toggleContinuousAmbient()">🎵 开启深空冥想音</button>
            </div>
            <button class="btn-main" onclick="openInput()">把执念散作星辰</button>
        </div>
    </div>

    <div class="report-overlay" id="reportOverlay" onclick="this.style.display='none'">
        <div class="report-card" onclick="event.stopPropagation()">
            <h2>宇宙灵魂轨迹观测</h2>
            <div class="info-row"><div class="lab">观测坐标 / ID</div><div class="val" id="repSign">天鹅座 · 慢中子</div></div>
            <div class="info-row"><div class="lab">最近的共鸣执念</div><div class="val" id="repLastWish">“暂无观测记录”</div></div>
            <div class="quote" id="repQuote">你不是一座孤岛，虽然在这深空里。你有 12 颗恒星共担引力。</div>
            <div class="footer-msg"><span>观测自：星海微茫研究站</span><div class="qr-mock">长按<br>保存</div></div>
        </div>
    </div>

    <div class="input-panel" id="inputPanel">
        <div class="input-content">
            <textarea id="wishText" placeholder="写下一句话，打碎揉进星河里..."></textarea>
            <div class="input-actions">
                <button class="btn-glass" onclick="closeInput()">收回思绪</button>
                <button class="btn-main" onclick="submitWish()">发射</button>
            </div>
        </div>
    </div>

    <div class="resonance-box" id="resBox"></div>
    <canvas id="spaceCanvas"></canvas>

    <script>
        // --- 初始化数据 ---
        let starCoins = parseInt(localStorage.getItem('star_coins_balance') || '190');
        let lastWish = localStorage.getItem('last_wish_text') || '暂无观测记录';
        
        function updateUI() { document.getElementById('coinVal').innerText = starCoins; }

        const prefix = ["仙女座", "猎户座", "英仙座", "天鹅座", "天琴座", "半人马", "麒麟座"];
        const suffix = ["虚粒子", "慢中子", "坍缩态", "偏振光", "红移线", "暗物质", "星流"];
        let mySign = localStorage.getItem('soul_sign') || `${prefix[Math.floor(Math.random()*prefix.length)]} · ${suffix[Math.floor(Math.random()*suffix.length)]}`;
        localStorage.setItem('soul_sign', mySign);
        document.getElementById('userSign').innerText = mySign;

        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 100% 还原原版的深空疗愈音效引擎 ---
        let audioCtx = null;
        let isAmbientPlaying = false;
        let ambientNodes = [];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function toggleContinuousAmbient() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const btn = document.getElementById('musicBtn');

            if (isAmbientPlaying) {
                // 关闭持续音乐：让声音缓慢淡出，而不是突然掐断
                ambientNodes.forEach(node => {
                    node.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3.0); // 3秒缓缓消失
                    setTimeout(() => node.source.stop(), 3000);
                });
                ambientNodes = [];
                isAmbientPlaying = false;
                btn.innerText = "🎵 开启深空冥想音";
                btn.classList.remove("active");
            } else {
                // 开启持续音乐
                // 1. 生成连续的“深空宇宙雨声”（低通粉红噪音）
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1; 
                }
                const noiseSrc = audioCtx.createBufferSource();
                noiseSrc.buffer = noiseBuffer;
                noiseSrc.loop = true;

                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = 350; // 极低频，听起来像沉闷遥远的雨声或母体心跳

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.value = 0; // 初始为0，缓慢渐入
                noiseGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 4.0); // 4秒内缓慢变大

                noiseSrc.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseSrc.start();

                // 2. 生成连续的“呼吸颂钵音”（带有 LFO 律动的 432Hz 基础共鸣）
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 108; // 极其深沉的次声波底盘 (432Hz 的四分之一)

                const oscGain = audioCtx.createGain();
                oscGain.gain.value = 0;

                // LFO (低频振荡器)：制造“呼吸感”
                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08; // 约每12秒一个完整的呼吸循环
                
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.04; // 呼吸起伏的幅度

                lfo.connect(lfoGain);
                lfoGain.connect(oscGain.gain);

                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                
                osc.start();
                lfo.start();

                // 把节点存起来，为了等下关掉它们
                ambientNodes.push({source: noiseSrc, gain: noiseGain});
                ambientNodes.push({source: osc, gain: oscGain});
                ambientNodes.push({source: lfo, gain: lfoGain});

                isAmbientPlaying = true;
                btn.innerText = "🔇 沉浸中...点击安静";
                btn.classList.add("active");
            }
        }

        function playCosmicChime() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            const pannerL = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
            const pannerR = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
            if(pannerL) pannerL.pan.value = -0.6;
            if(pannerR) pannerR.pan.value = 0.6;

            createTone(54, 0.25, 6.0, 'triangle', null); 
            createTone(432, 0.12, 5.0, 'sine', pannerL);
            createTone(435, 0.12, 5.0, 'sine', pannerR);
            createTone(540, 0.05, 3.5, 'sine', null);

            function createTone(freq, volume, duration, type, pannerNode) {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(volume, now + 0.06);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, now + duration);
                if (pannerNode) {
                    osc.connect(gainNode); gainNode.connect(pannerNode); pannerNode.connect(audioCtx.destination);
                } else {
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                }
                osc.start(now); osc.stop(now + duration);
            }
        }

        // --- 核心物理引擎 (整合了更生动的连线和拖尾视觉) ---
        let rotationX = 0, rotationY = 0;
        let targetRotX = 0, targetRotY = 0;
        let isDragging = false;
        let prevX, prevY, moveDist = 0;
        let warpSpeed = 1.0; 

        class Star {
            constructor(text, sign, isUser = false) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const dist = isUser ? 120 : (250 + Math.random() * 450);
                this.x = dist * Math.sin(phi) * Math.cos(theta);
                this.y = dist * Math.sin(phi) * Math.sin(theta);
                this.z = dist * Math.cos(phi);
                this.text = text; this.sign = sign; this.isUser = isUser;
                this.size = isUser ? 4.5 : (0.6 + Math.random() * 1.5);
                this.alpha = Math.random() * 0.5 + 0.3; this.id = Math.random();
            }
            draw(rotX, rotY) {
                if (warpSpeed > 1.0) {
                    this.z -= (15 * (warpSpeed - 0.9));
                    if (this.z < -200) this.z = 600 + Math.random() * 200;
                }
                const cosX = Math.cos(rotX), sinX = Math.sin(rotX), cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                let x1 = this.x * cosY - this.z * sinY, z1 = this.x * sinY + this.z * cosY;
                let y2 = this.y * cosX - z1 * sinX, z2 = this.y * sinX + z1 * cosX;
                const fov = isMobile ? (width * 0.8) : 600;
                
                if (z2 + fov > 0) {
                    const scale = fov / (fov + z2);
                    this.screenX = width / 2 + x1 * scale; this.screenY = height / 2 + y2 * scale;
                    this.currentScale = scale;
                    const flash = (Math.sin(this.id + Date.now() * 0.002) * 0.3) + 0.7;
                    
                    ctx.beginPath();
                    if (warpSpeed > 2.0) {
                        ctx.lineWidth = this.size * scale * 0.5;
                        ctx.strokeStyle = this.isUser ? `rgba(224, 64, 251, ${flash})` : `rgba(184, 173, 150, ${this.alpha * flash})`;
                        ctx.moveTo(this.screenX, this.screenY);
                        ctx.lineTo(this.screenX + (x1 * 0.03 * warpSpeed), this.screenY + (y2 * 0.03 * warpSpeed));
                        ctx.stroke();
                    } else {
                        ctx.arc(this.screenX, this.screenY, this.size * scale, 0, Math.PI * 2);
                        ctx.fillStyle = this.isUser ? `rgba(224, 64, 251, ${flash})` : `rgba(184, 173, 150, ${this.alpha * flash})`;
                        if(this.isUser) { ctx.shadowBlur = 15; ctx.shadowColor = "#e040fb"; }
                        ctx.fill(); ctx.shadowBlur = 0;
                    }
                }
            }
        }

        const stars = [];
        const seeds = [
            ["今年31岁被裁员了，瞒着父母每天在图书馆假装上班。", "英仙座 · 偏振光"],
            ["如果累了就睡一觉吧，这个星球上你已经坚持很久了。", "天鹅座 · 红移线"],
            ["努力了三年还是考研失败，感觉自己是个废物。", "天琴座 · 坍缩态"]
        ];
        for(let i=0; i< (isMobile?130:220); i++) {
            const s = seeds[i%seeds.length];
            stars.push(new Star(s[0], s[1]));
        }

        class Meteor {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = Math.random() * height * 0.3;
                this.len = Math.random() * 100 + 50; this.speed = 4 + Math.random() * 5;
                this.alpha = 1; this.active = Math.random() > 0.6;
            }
            update() {
                if(!this.active) return;
                this.x -= this.speed; this.y += this.speed * 0.5; this.alpha -= 0.01;
                if(this.alpha <= 0) this.reset();
                ctx.save();
                let g = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len*0.5);
                g.addColorStop(0, `rgba(255,255,255,${this.alpha})`); g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(this.x, this.y); ctx.lineTo(this.x+this.len, this.y-this.len*0.5);
                ctx.stroke(); ctx.restore();
            }
        }
        const meteors = [new Meteor(), new Meteor()];

        function render() {
            ctx.clearRect(0,0,width,height); 
            if (warpSpeed > 1.0) warpSpeed -= 0.2; else warpSpeed = 1.0;
            rotationX += (targetRotX - rotationX) * 0.05; rotationY += (targetRotY - rotationY) * 0.05;
            if(!isDragging && warpSpeed === 1.0) { targetRotY += 0.0004; targetRotX += 0.00008; }

            ctx.save(); 
            const pulse = (Math.sin(Date.now() * 0.002) + 1) / 2;
            ctx.strokeStyle = `rgba(123,31,162, ${0.1 + pulse * 0.1})`; 
            ctx.beginPath();
            const userStars = stars.filter(s => s.isUser);
            userStars.forEach(us => {
                stars.forEach(s => {
                    const d = Math.hypot(us.x-s.x, us.y-s.y, us.z-s.z);
                    if(d < 160 && us.currentScale && s.currentScale) {
                        ctx.moveTo(us.screenX, us.screenY); ctx.lineTo(s.screenX, s.screenY);
                    }
                });
            });
            ctx.stroke(); ctx.restore();

            meteors.forEach(m => m.update());
            stars.forEach(s => s.draw(rotationX, rotationY));
            requestAnimationFrame(render);
        }
        render();

        window.addEventListener('click', () => { initAudio(); }); 
        canvas.addEventListener('mousedown', e => { isDragging=true; moveDist=0; prevX=e.clientX; prevY=e.clientY; });
        window.addEventListener('mousemove', e => {
            if(!isDragging) return;
            const dx = e.clientX - prevX; const dy = e.clientY - prevY;
            targetRotY += dx * 0.002; targetRotX += dy * 0.002;
            prevX = e.clientX; prevY = e.clientY; moveDist += Math.abs(dx)+Math.abs(dy);
        });
        window.addEventListener('mouseup', e => {
            if(isDragging && moveDist < 5) checkClick(e.clientX, e.clientY);
            isDragging = false;
        });

        canvas.addEventListener('touchstart', e => { initAudio(); isDragging=true; moveDist=0; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; }, {passive:true});
        canvas.addEventListener('touchmove', e => {
            if(!isDragging) return;
            const dx = e.touches[0].clientX - prevX; const dy = e.touches[0].clientY - prevY;
            targetRotY += dx * 0.005; targetRotX += dy * 0.005;
            prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; moveDist += Math.abs(dx)+Math.abs(dy);
        }, {passive:true});
        canvas.addEventListener('touchend', e => {
            if(isDragging && moveDist < 10) checkClick(prevX, prevY);
            isDragging = false;
        });

        const resBox = document.getElementById('resBox');
        function checkClick(mx, my) {
            let hit = null;
            stars.forEach(s => { const d = Math.hypot(s.screenX - mx, s.screenY - my); if(d < (isMobile?35:18)) hit = s; });
            if(hit) {
                playCosmicChime(); 
                resBox.innerHTML = `<div style="font-size:0.7rem; color:#888; margin-bottom:10px;">${hit.sign}</div>
                                    <div style="font-style:italic; line-height:1.6; color:#fff;">"${hit.text}"</div>
                                    <div style="margin-top:15px; border-top:1px solid #222; padding-top:10px; font-size:0.7rem; color:#9c27b0;">点击星空关闭</div>`;
                resBox.style.left = isMobile ? '50%' : mx + 'px';
                resBox.style.top = isMobile ? '50%' : my + 'px';
                resBox.classList.add('active');
            } else {
                resBox.classList.remove('active');
            }
        }

        // --- UI 功能 ---
        function chargeCoins() {
            starCoins += 100; localStorage.setItem('star_coins_balance', starCoins); updateUI();
            playCosmicChime(); alert("💳 充值成功：+100 星币！");
        }

        function openInput() { document.getElementById('inputPanel').style.display = 'flex'; }
        function closeInput() { document.getElementById('inputPanel').style.display = 'none'; }

        function submitWish() {
            const val = document.getElementById('wishText').value.trim();
            if(!val) return;
            stars.push(new Star(val, mySign, true)); lastWish = val; localStorage.setItem('last_wish_text', val);
            closeInput(); document.getElementById('wishText').value = '';
            playCosmicChime(); warpSpeed = 12.0; 
        }

        function showReport() {
            playCosmicChime();
            document.getElementById('repSign').innerText = mySign; document.getElementById('repLastWish').innerText = `“${lastWish}”`;
            const quotes = [
                "你在黑夜中坍缩，但有无数恒星正在分担你的重力。你不是孤岛。",
                "宇宙的广袤，恰好能包容你所有的不知所措。",
                "每一粒星尘，都曾是某个灵魂不熄的执念。"
            ];
            document.getElementById('repQuote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
            document.getElementById('reportOverlay').style.display = 'flex';
        }

        const bTexts = ["万物自有其时。", "闭眼，听雨。这一刻只属于你。", "你已经很棒了，不必步步紧逼。"];
        let bIdx = 0;
        setInterval(() => {
            bIdx = (bIdx + 1) % bTexts.length;
            document.getElementById('breathingText').innerHTML = bTexts[bIdx];
        }, 15000);

        updateUI();
    </script>
</body>
</html>
