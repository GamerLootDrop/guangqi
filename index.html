<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 3.0 宇宙深空沉浸版</title>
    <style>
        /* 基础样式复位 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #040814;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #e4edff; user-select: none; -webkit-user-select: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 顶部状态外壳 */
        .top-shell {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; padding: 12px 20px;
            background: rgba(10, 16, 32, 0.65); border: 1px solid rgba(152, 194, 255, 0.15);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 12px; font-size: 14px;
        }
        .user-meta span { margin-right: 15px; color: #a2b7e2; }
        .user-meta strong { color: #ffd48e; text-shadow: 0 0 8px rgba(255, 212, 142, 0.4); }
        .ambient-box { color: #8fa7d1; font-style: italic; transition: opacity 0.5s; }

        /* 侧边功能面板公用样式 */
        .side-panel {
            position: absolute; top: 90px; bottom: 100px; width: 360px;
            background: rgba(8, 14, 28, 0.8); border: 1px solid rgba(152, 194, 255, 0.12);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 16px; z-index: 12; padding: 20px;
            display: flex; flex-direction: column;
            transform: translateX(-390px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .side-panel.active { transform: translateX(0); }
        #logPanel { right: 20px; transform: translateX(390px); }
        #logPanel.active { transform: translateX(0); }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(152, 194, 255, 0.1); padding-bottom: 10px; }
        .panel-header h2 { font-size: 18px; color: #b6cfff; font-weight: 500; }
        .close-btn { background: none; border: none; color: #768ebf; cursor: pointer; font-size: 18px; }
        .close-btn:hover { color: #e4edff; }

        /* 任务条目样式 */
        .mission-card { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .mission-card h3 { font-size: 14px; margin-bottom: 8px; color: #d0deff; }
        .progress-box { background: rgba(0,0,0,0.3); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #6cd6ff, #b6cfff); transition: width 0.4s; }
        .progress-txt { font-size: 12px; color: #768ebf; text-align: right; }
        .reward-note { font-size: 12px; color: #ffd48e; margin-top: 15px; text-align: center; line-height: 1.5; }

        /* 日志墙样式 */
        .log-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
        .log-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(152,194,255,0.08); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .log-card-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .vip-glow { color: #ffd48e; text-shadow: 0 0 6px rgba(255,212,142,0.5); }
        .log-badge { color: #6cd6ff; background: rgba(108,214,255,0.1); padding: 2px 6px; border-radius: 4px; }
        .log-card p { font-size: 14px; line-height: 1.6; color: #d0deff; margin-bottom: 10px; word-break: break-all; }
        .log-replies { background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px; font-size: 13px; }
        .log-reply { margin-bottom: 8px; line-height: 1.4; }
        .log-reply:last-child { margin-bottom: 0; }
        .log-reply strong { color: #a2b7e2; block-size: auto; margin-right: 5px; }
        .log-reply.self strong { color: #ffd48e; }
        .empty-state { color: #566c96; font-style: italic; font-size: 12px; }

        /* 模态弹窗（发布流星） */
        .modal-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 10, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 20; display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 0.3s;
        }
        .modal-mask.hidden { opacity: 0; pointer-events: none; }
        .modal-card {
            background: #0b1224; border: 1px solid rgba(152, 194, 255, 0.18); width: 420px;
            border-radius: 16px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-card h2 { font-size: 18px; margin-bottom: 15px; color: #b6cfff; font-weight: 500; }
        .modal-card textarea {
            width: 100%; height: 120px; background: rgba(0,0,0,0.25); border: 1px solid rgba(152,194,255,0.15);
            border-radius: 8px; color: #e4edff; padding: 12px; resize: none; font-size: 14px; line-height: 1.5; outline: none; margin-bottom: 15px;
        }
        .modal-card textarea:focus { border-color: rgba(108,214,255,0.4); }
        .ctrl-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; color: #a2b7e2; }
        .ctrl-row input[type="checkbox"] { margin-right: 6px; accent-color: #ffd48e; vertical-align: middle; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; }
        
        /* 按钮通用 */
        .base-btn {
            background: rgba(152, 194, 255, 0.08); border: 1px solid rgba(152, 194, 255, 0.2);
            color: #b6cfff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .base-btn:hover { background: rgba(152, 194, 255, 0.15); color: #e4edff; border-color: rgba(152, 194, 255, 0.3); }
        .primary-btn { background: linear-gradient(135deg, #1e3a8a, #0f172a); border: 1px solid rgba(108, 214, 255, 0.3); color: #6cd6ff; }
        .primary-btn:hover { background: linear-gradient(135deg, #2549b0, #131e38); border-color: rgba(108, 214, 255, 0.5); }

        /* 流星对话互动弹窗 */
        .star-dialog {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 460px; background: rgba(8, 14, 28, 0.85); border: 1px solid rgba(152, 194, 255, 0.2);
            border-radius: 16px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; z-index: 15; display: flex; flex-direction: column; max-height: 400px;
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .star-dialog.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
        .dialog-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        #dialogBadge { font-size: 11px; background: rgba(152,194,255,0.12); padding: 2px 6px; border-radius: 4px; color: #98c2ff; }
        #dialogTitle { font-size: 15px; color: #e4edff; line-height: 1.5; margin-bottom: 6px; word-break: break-all; }
        #dialogMeta { font-size: 12px; color: #6b82ae; }
        .reply-box { flex: 1; overflow-y: auto; margin: 12px 0; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
        .reply-item { font-size: 13px; line-height: 1.4; margin-bottom: 10px; padding: 6px 10px; background: rgba(0,0,0,0.15); border-radius: 6px; }
        .reply-item strong { color: #a2b7e2; margin-right: 5px; }
        .reply-item.self { border-left: 2px solid #ffd48e; }
        .reply-item.self strong { color: #ffd48e; }
        .reply-item time { display: block; font-size: 11px; color: #566c96; text-align: right; margin-top: 2px; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(152,194,255,0.15); border-radius: 6px; color: #e4edff; padding: 8px 12px; font-size: 13px; outline: none; }
        .input-row input:focus { border-color: rgba(108,214,255,0.3); }

        /* 底部交互控制台 */
        .action-dock {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 10;
        }
        .dock-btn {
            background: rgba(12, 22, 45, 0.75); border: 1px solid rgba(152, 194, 255, 0.18);
            color: #b6cfff; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-size: 14px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .dock-btn:hover { background: rgba(18, 32, 64, 0.9); color: #e4edff; border-color: rgba(152,194,255,0.35); transform: translateY(-2px); }
        #openWhisperBtn { background: linear-gradient(135deg, #1e3a8a, #0f172a); border-color: rgba(108,214,255,0.3); color: #6cd6ff; }
        #openWhisperBtn:hover { border-color: rgba(108,214,255,0.5); box-shadow: 0 4px 20px rgba(108,214,255,0.2); }

        /* 全局轻提示堆栈 */
        .toast-stack { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        .toast { background: rgba(13, 27, 54, 0.9); border: 1px solid rgba(108,214,255,0.25); border-radius: 8px; padding: 10px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); animation: toastIn 0.3s forwards; }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); background: rgba(40, 10, 10, 0.9); }
        .toast strong { display: block; font-size: 13px; color: #6cd6ff; margin-bottom: 2px; }
        .toast.error strong { color: #ef4444; }
        .toast div { font-size: 12px; color: #cbd5e1; }
        @keyframes toastIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>

    <div class="top-shell">
        <div class="user-meta">
            <span>观测者: <strong id="aliasText">载入中..</strong></span>
            <span>量子凭证: <em id="tokenText">...</em></span>
            <span>星币余额: <strong id="coinText">0</strong></span>
            <span>未读回响: <strong id="replyAlertText" style="color:#6cd6ff">0</strong></span>
        </div>
        <div class="ambient-box" id="ambientText">闭上眼，听泉。你不必在此刻向任何人证明自己。</div>
    </div>

    <div class="side-panel" id="missionPanel">
        <div class="panel-header">
            <h2>星海恢复力任务</h2>
            <button class="close-btn" data-close-panel="missionPanel">✕</button>
        </div>
        <div class="mission-card">
            <h3>听泉冥想打卡</h3>
            <div class="progress-box"><div class="progress-bar" id="springBar"></div></div>
            <div class="progress-txt" id="springText">0 / 0 秒</div>
        </div>
        <div class="mission-card">
            <h3>阅读星海碎屑执念</h3>
            <div class="progress-box"><div class="progress-bar" id="readBar"></div></div>
            <div class="progress-txt" id="readText">0 / 0 条</div>
        </div>
        <div class="reward-note" id="missionRewardNote">奖励会在完成时自动注入星币。</div>
    </div>

    <div class="side-panel" id="logPanel">
        <div class="panel-header">
            <h2>私人观测日志</h2>
            <button class="base-btn" id="refreshLogBtn" style="padding:4px 10px; font-size:12px;">同步</button>
            <button class="close-btn" data-close-panel="logPanel">✕</button>
        </div>
        <div class="log-scroll" id="logList">
            </div>
    </div>

    <div class="star-dialog" id="starDialog">
        <div class="dialog-header">
            <span id="dialogBadge">流星碎片</span>
            <button class="close-btn" data-close-dialog>✕</button>
        </div>
        <div id="dialogTitle">正在打捞星海执念深处的内容...</div>
        <div id="dialogMeta">...</div>
        <div class="reply-box" id="replyList"></div>
        <div class="input-row">
            <input type="text" id="replyInput" placeholder="输入你的回响，轻轻呼唤..." maxlength="200">
            <button class="base-btn primary-btn" id="sendReplyBtn">发出回响</button>
        </div>
    </div>

    <div class="modal-mask hidden" id="whisperModal">
        <div class="modal-card">
            <h2>点亮一颗流星</h2>
            <textarea id="whisperInput" placeholder="写下你今晚最沉重的执念，或者最想抛给宇宙的呓语...（它将化为这片星空中的一颗闪烁实体）" maxlength="600"></textarea>
            <div class="ctrl-row">
                <label><input type="checkbox" id="vipToggle"> 消耗50星币将其“高亮璀璨化”</label>
            </div>
            <div class="btn-group">
                <button class="base-btn" data-close-panel="whisperModal">沉入心底</button>
                <button class="base-btn primary-btn" id="submitWhisperBtn">推向深空</button>
            </div>
        </div>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script>
        const state = {
          session: null,
          whispers: [],
          logs: [],
          missions: [],
          selectedWhisper: null,
          audioCtx: null,
          audioNodes: null,
          readMissionCache: new Set(),
          missionTickHandle: null,
          pollHandle: null,
          ambientIndex: 0,
          isMissionSubmitting: false // 🔐 新增：防暴击并发锁
        };

        const els = {
          canvas: document.getElementById("spaceCanvas"),
          aliasText: document.getElementById("aliasText"),
          tokenText: document.getElementById("tokenText"),
          coinText: document.getElementById("coinText"),
          replyAlertText: document.getElementById("replyAlertText"),
          ambientText: document.getElementById("ambientText"),
          audioBtn: document.getElementById("audioBtn"),
          missionBtn: document.getElementById("missionBtn"),
          logBtn: document.getElementById("logBtn"),
          openWhisperBtn: document.getElementById("openWhisperBtn"),
          refreshLogBtn: document.getElementById("refreshLogBtn"),
          missionPanel: document.getElementById("missionPanel"),
          logPanel: document.getElementById("logPanel"),
          whisperModal: document.getElementById("whisperModal"),
          whisperInput: document.getElementById("whisperInput"),
          submitWhisperBtn: document.getElementById("submitWhisperBtn"),
          vipToggle: document.getElementById("vipToggle"),
          starDialog: document.getElementById("starDialog"),
          dialogBadge: document.getElementById("dialogBadge"),
          dialogTitle: document.getElementById("dialogTitle"),
          dialogMeta: document.getElementById("dialogMeta"),
          replyList: document.getElementById("replyList"),
          replyInput: document.getElementById("replyInput"),
          sendReplyBtn: document.getElementById("sendReplyBtn"),
          springBar: document.getElementById("springBar"),
          springText: document.getElementById("springText"),
          readBar: document.getElementById("readBar"),
          readText: document.getElementById("readText"),
          missionRewardNote: document.getElementById("missionRewardNote"),
          logList: document.getElementById("logList"),
          toastStack: document.getElementById("toastStack")
        };

        const ambientTexts = [
          "闭上眼，听泉。你不必在此刻向任何人证明自己。",
          "每颗星都在远处慢慢靠近，像终于被看见的情绪。",
          "如果今晚很重，就先借这片宇宙呼吸一下。"
        ];

        let ctx = null;
        let width = 0; let height = 0;
        let rotationX = 0; let rotationY = 0;
        let targetRotationX = 0; let targetRotationY = 0;
        let isDragging = false; let dragX = 0; let dragY = 0;
        let dragDistance = 0; let tapPoint = { x: 0, y: 0 };
        let lastFrameTime = 0;

        const starNodes = [];
        const backgroundDust = [];

        class WarpStar {
          constructor(payload, index) {
            this.applyPayload(payload, index);
          }

          applyPayload(payload, index) {
            this.id = payload.id;
            this.text = payload.text;
            this.authorAlias = payload.authorAlias;
            this.createdAt = payload.createdAt;
            this.updatedAt = payload.updatedAt;
            this.isVip = !!payload.isVip;
            this.isOwn = !!payload.isOwn;
            this.replyCount = payload.replyCount || 0;
            this.hasNewReply = !!payload.hasNewReply;
            this.recentReplySnippet = payload.recentReplySnippet || "";
            this.lastReplyAt = payload.lastReplyAt || "";
            this.seed = payload.starSeed || index * 17 + 11;
            this.radial = 120 + (this.seed % 180);
            this.angle = (this.seed * 0.37) % (Math.PI * 2);
            this.vertical = ((this.seed % 21) - 10) * 17;
            this.depth = 0.08 + ((this.seed * 19) % 100) / 100;
            this.speed = 0.001 + (this.seed % 7) * 0.00022;
            this.size = this.isVip ? 5.2 : this.isOwn ? 4.2 : 2.5 + (this.seed % 5) * 0.42;
            this.screenX = 0; this.screenY = 0; this.screenRadius = 0;
            this.visible = true;
          }

          update(deltaMs) {
            this.angle += this.speed * deltaMs * 0.06;
            this.depth += deltaMs * 0.0000042 * (this.isOwn ? 1.15 : 1);
            if (this.depth > 1.08) { this.depth = 0.06; }
          }

          draw(nowMs) {
            const zTravel = Math.pow(this.depth, 1.85);
            const push = 1 + zTravel * 6.9;
            const baseX = Math.cos(this.angle + rotationY * 0.72) * this.radial * push;
            const baseY = Math.sin(this.angle * 0.7 + rotationX * 0.92) * this.vertical + Math.sin(this.angle) * 28;
            const swirlX = Math.sin(rotationY + this.angle) * 24;
            const swirlY = Math.cos(rotationX + this.angle * 0.6) * 18;
            const screenX = width * 0.5 + baseX + swirlX;
            const screenY = height * 0.5 + baseY + swirlY;
            const scale = 0.4 + zTravel * 2.4;
            const radius = this.size * scale;
            const alphaBase = this.isVip ? 0.96 : this.isOwn ? 0.9 : 0.3 + zTravel * 0.5;
            
            const pulse = this.hasNewReply
              ? 0.7 + Math.sin(nowMs * 0.012 + this.seed) * 0.2 + Math.abs(Math.sin(nowMs * 0.032 + this.seed)) * 0.4
              : 0.8 + Math.sin(nowMs * 0.0016 + this.seed) * 0.14;
            const alpha = Math.min(1, alphaBase * pulse);

            this.screenX = screenX;
            this.screenY = screenY;
            this.screenRadius = Math.max(12, radius + 10);
            this.visible = screenX > -120 && screenX < width + 120 && screenY > -120 && screenY < height + 120;

            if (!this.visible) return;

            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.rotate(this.angle + nowMs * 0.00006);
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * (1 + zTravel * 2.7), radius, 0, 0, Math.PI * 2);

            if (this.isVip) {
              ctx.fillStyle = `rgba(255, 212, 142, ${alpha})`;
              ctx.shadowBlur = 24; ctx.shadowColor = "rgba(255, 190, 120, 0.96)";
            } else if (this.hasNewReply) {
              ctx.fillStyle = `rgba(170, 233, 255, ${alpha})`;
              ctx.shadowBlur = 28; ctx.shadowColor = "rgba(108, 214, 255, 1)";
            } else if (this.isOwn) {
              ctx.fillStyle = `rgba(228, 237, 255, ${alpha})`;
              ctx.shadowBlur = 18; ctx.shadowColor = "rgba(182, 207, 255, 0.92)";
            } else {
              ctx.fillStyle = `rgba(196, 212, 255, ${alpha})`;
              ctx.shadowBlur = 8; ctx.shadowColor = "rgba(152, 194, 255, 0.45)";
            }
            ctx.fill();

            if (zTravel > 0.68) {
              ctx.beginPath();
              ctx.moveTo(-radius * 4.6, 0);
              ctx.lineTo(radius * 0.3, 0);
              ctx.lineWidth = Math.max(0.5, radius * 0.26);
              ctx.strokeStyle = `rgba(173, 218, 255, ${alpha * 0.35})`;
              ctx.stroke();
            }
            ctx.restore();
          }
        }

        function getRandomId() {
          if (window.crypto && typeof window.crypto.randomUUID === "function") {
            return window.crypto.randomUUID();
          }
          return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function formatTime(value) {
          if (!value) return "";
          return new Date(value).toLocaleString("zh-CN", {
            month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
          });
        }

        function getMissionById(id) {
          for (let i = 0; i < state.missions.length; i += 1) {
            if (state.missions[i].id === id) return state.missions[i];
          }
          return null;
        }

        function initCanvas() {
          ctx = els.canvas.getContext("2d");
          resizeCanvas();
          for (let i = 0; i < 220; i += 1) {
            backgroundDust.push({
              x: Math.random(), y: Math.random(),
              radius: Math.random() * 1.7 + 0.4,
              alpha: Math.random() * 0.5 + 0.08,
              drift: Math.random() * 0.002 + 0.0002
            });
          }
        }

        function resizeCanvas() {
          width = window.innerWidth; height = window.innerHeight;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          els.canvas.width = Math.floor(width * dpr);
          els.canvas.height = Math.floor(height * dpr);
          els.canvas.style.width = `${width}px`; els.canvas.style.height = `${height}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function syncStars() {
          const existing = {};
          for (let i = 0; i < starNodes.length; i += 1) { existing[starNodes[i].id] = starNodes[i]; }
          const next = [];
          for (let i = 0; i < state.whispers.length; i += 1) {
            const whisper = state.whispers[i];
            const star = existing[whisper.id] || new WarpStar(whisper, i);
            star.applyPayload(whisper, i);
            next.push(star);
          }
          starNodes.length = 0;
          Array.prototype.push.apply(starNodes, next);
        }

        function renderScene(nowMs) {
          if (!lastFrameTime) lastFrameTime = nowMs;
          const deltaMs = Math.min(33, nowMs - lastFrameTime || 16);
          lastFrameTime = nowMs;

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "rgba(4, 8, 20, 0.22)";
          ctx.fillRect(0, 0, width, height);

          for (let i = 0; i < backgroundDust.length; i += 1) {
            const dust = backgroundDust[i];
            dust.y += dust.drift;
            if (dust.y > 1.05) { dust.y = -0.04; dust.x = Math.random(); }
            ctx.beginPath();
            ctx.arc(dust.x * width, dust.y * height, dust.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 206, 255, ${dust.alpha})`;
            ctx.fill();
          }

          if (!isDragging) { targetRotationY += 0.00035; targetRotationX += 0.00005; }
          rotationX += (targetRotationX - rotationX) * 0.06;
          rotationY += (targetRotationY - rotationY) * 0.06;

          for (let i = 0; i < starNodes.length; i += 1) {
            starNodes[i].update(deltaMs); starNodes[i].draw(nowMs);
          }
          window.requestAnimationFrame(renderScene);
        }

        function getOrCreateDeviceId() {
          let deviceId = localStorage.getItem("starlit_device_id");
          if (!deviceId) {
            deviceId = `device_${getRandomId()}`;
            localStorage.setItem("starlit_device_id", deviceId);
          }
          return deviceId;
        }

        async function api(path, options) {
          const response = await fetch(path, {
            headers: { "Content-Type": "application/json" }, ...(options || {})
          });
          const data = await response.json();
          if (!response.ok) {
            const error = new Error(data.error || "request_failed");
            error.code = data.error || "request_failed";
            throw error;
          }
          return data;
        }

        function updateSession(session) {
          state.session = session;
          els.aliasText.textContent = session.alias;
          els.tokenText.textContent = `${session.token.slice(0, 18)}...`;
          els.coinText.textContent = String(session.coins);
          els.replyAlertText.textContent = String(session.unreadReplyCount);
        }

        function updateMissions(missions, rewardGranted) {
          state.missions = missions || [];
          const spring = getMissionById("listen_spring");
          const read = getMissionById("read_obsessions");

          if (spring) {
            els.springBar.style.width = `${Math.min(100, (spring.progress / spring.target) * 100)}%`;
            els.springText.textContent = `${spring.progress} / ${spring.target} 秒`;
          }
          if (read) {
            els.readBar.style.width = `${Math.min(100, (read.progress / read.target) * 100)}%`;
            els.readText.textContent = `${read.progress} / ${read.target} 条`;
          }

          if (rewardGranted && rewardGranted > 0) {
            els.missionRewardNote.textContent = `奖励到账 +${rewardGranted} 星币，宇宙在为你的恢复力鼓掌。`;
          } else {
            els.missionRewardNote.textContent = "奖励会在完成时自动注入星币。";
          }
        }

        function renderLogs() {
          if (!state.logs.length) {
            els.logList.innerHTML = `
              <div class="log-card">
                <strong>还没有观测记录</strong>
                <p>发出第一颗流星后，你的私人日志就会在这里生成。</p>
              </div>
            `;
            return;
          }

          let html = "";
          for (let i = 0; i < state.logs.length; i += 1) {
            const entry = state.logs[i];
            let repliesHtml = "";

            if (entry.replies.length) {
              for (let j = 0; j < entry.replies.length; j += 1) {
                const reply = entry.replies[j];
                repliesHtml += `
                  <div class="log-reply ${reply.fromSelf ? "self" : ""}">
                    <strong>${escapeHtml(reply.authorAlias)}</strong>
                    <div>${escapeHtml(reply.content)}</div>
                  </div>
                `;
              }
            } else {
              repliesHtml = `<div class="log-reply"><span class="empty-state">还没有回响抵达这颗流星。</span></div>`;
            }

            html += `
              <article class="log-card">
                <div class="log-card-header">
                  <strong>${entry.isVip ? '<span class="vip-glow">高亮流星</span>' : "普通流星"}</strong>
                  <span class="log-badge">${entry.unreadCount ? `未读 ${entry.unreadCount}` : "已读"}</span>
                </div>
                <p>${escapeHtml(entry.text)}</p>
                <div class="log-replies">${repliesHtml}</div>
              </article>
            `;
          }
          els.logList.innerHTML = html;
        }

        function setWhispers(whispers) {
          state.whispers = whispers || [];
          syncStars();
        }

        function showToast(title, message, isError) {
          const toast = document.createElement("div");
          toast.className = `toast${isError ? " error" : ""}`;
          toast.innerHTML = `<strong>${escapeHtml(title)}</strong><div>${escapeHtml(message)}</div>`;
          els.toastStack.appendChild(toast);
          window.setTimeout(() => { if (toast.parentNode) { toast.parentNode.removeChild(toast); } }, 3200);
        }

        async function bootstrap() {
          const token = localStorage.getItem("starlit_soul_token") || "";
          const deviceId = getOrCreateDeviceId();
          // 如果缺少真实后端接口，可在此处或 api 捕获中追加静态 Mock 保证不报错崩溃
          try {
              const payload = await api("/api/bootstrap", {
                method: "POST", body: JSON.stringify({ token, deviceId })
              });
              localStorage.setItem("starlit_soul_token", payload.session.token);
              updateSession(payload.session);
              updateMissions(payload.missions, 0);
              setWhispers(payload.whispers);
              state.logs = payload.logs || [];
              renderLogs();
          } catch(e) {
              console.warn("未连接到真实宇宙后端，正在启用纯前端离线体验宇宙舱模型...");
              mockBootstrap();
          }
        }

        function mockBootstrap() {
            const mockSession = { alias: "隐世观测者_" + Math.random().toString(10).slice(2,6), token: "mock_session_token_starlit_3_0_preview", coins: 280, unreadReplyCount: 1 };
            const mockMissions = [ { id: "listen_spring", progress: 15, target: 60 }, { id: "read_obsessions", progress: 2, target: 5 } ];
            const mockWhispers = [
                { id: "1", text: "今晚的风很沉，还好有一片可以避风的虚拟星海。", authorAlias: "匿名碎屑", starSeed: 42, isVip: true },
                { id: "2", text: "测试流星实体：宇宙的深处总有不期而遇的共鸣。", authorAlias: "观测站AI", starSeed: 99, isOwn: true, hasNewReply: true }
            ];
            updateSession(mockSession);
            updateMissions(mockMissions, 0);
            setWhispers(mockWhispers);
        }

        async function refreshState() {
          if (!state.session || state.session.token.startsWith("mock")) return;
          const data = await api(`/api/state?token=${encodeURIComponent(state.session.token)}`);
          updateSession(data.session);
          updateMissions(data.missions, 0);
          setWhispers(data.whispers);
        }

        async function refreshLogs(ack) {
          if (!state.session || state.session.token.startsWith("mock")) return;
          const data = await api(`/api/logs?token=${encodeURIComponent(state.session.token)}&ack=${ack ? "1" : "0"}`);
          updateSession(data.session);
          state.logs = data.logs || [];
          renderLogs();
        }

        async function submitWhisper() {
          const text = els.whisperInput.value.trim();
          if (!text) {
            showToast("还没写内容", "先让这颗流星有一句真正想说的话。", true);
            return;
          }

          if (state.session.token.startsWith("mock")) {
              // 离线 Mock 逻辑
              els.whisperInput.value = "";
              closePanel("whisperModal");
              state.session.coins -= els.vipToggle.checked ? 50 : 0;
              updateSession(state.session);
              state.whispers.push({ id: getRandomId(), text, authorAlias: state.session.alias, isOwn: true, isVip: els.vipToggle.checked, starSeed: Math.random()*100 });
              syncStars();
              playConfirmTone();
              showToast("流星已发射", "离线宇宙感知到了你的心事。");
              return;
          }

          try {
            const data = await api("/api/whispers", {
              method: "POST",
              body: JSON.stringify({
                token: state.session.token,
                text,
                isVip: els.vipToggle.checked
              })
            });

            els.whisperInput.value = "";
            els.vipToggle.checked = false;
            closePanel("whisperModal");
            
            updateSession(data.session);
            state.logs = data.logs || [];
            renderLogs();
            await refreshState();
            playConfirmTone();
            showToast("流星已发射", "它已经进入宇宙，也进入了你的个人观测日志。");
          } catch (error) {
            const messages = {
              insufficient_coins: "星币不足，先完成治愈任务再回来点亮高亮流星吧。",
              sensitive_content: "这条内容里有系统拦截词，换个表达方式试试。",
              empty_whisper: "输入为空，宇宙暂时还接不到你的心事。"
            };
            showToast("发射失败", messages[error.code] || "连接宇宙时发生波动，请稍后再试。", true);
          }
        }

        function renderStarDialog(whisper, replies) {
          els.dialogBadge.textContent = whisper.isVip ? "高亮流星" : whisper.isOwn ? "我的流星" : "流星碎片";
          els.dialogTitle.textContent = whisper.text;
          els.dialogMeta.textContent = `${whisper.authorAlias} · ${formatTime(whisper.createdAt || Date.now())}`;

          if (!replies.length) {
            els.replyList.innerHTML = `
              <div class="reply-item">
                <span class="empty-state">还没有回响抵达。你可以成为第一个回应这颗流星的人。</span>
              </div>
            `;
          } else {
            let html = "";
            for (let i = 0; i < replies.length; i += 1) {
              const reply = replies[i];
              html += `
                <div class="reply-item ${reply.fromSelf ? "self" : ""}">
                  <strong>${escapeHtml(reply.authorAlias)}</strong>
                  <div>${escapeHtml(reply.content)}</div>
                  <time>${formatTime(reply.createdAt)}</time>
                </div>
              `;
            }
            els.replyList.innerHTML = html;
          }
          els.replyInput.value = "";
        }

        async function progressMission(payload) {
          if (state.isMissionSubmitting) return;
          state.isMissionSubmitting = true;

          if (state.session.token.startsWith("mock")) {
              state.isMissionSubmitting = false;
              // 离线任务进度推进
              if (payload.type === "listen") {
                  const m = getMissionById("listen_spring");
                  if (m && m.progress < m.target) {
                      m.progress += 5; updateMissions(state.missions, m.progress >= m.target ? 30 : 0);
                      if (m.progress >= m.target) state.session.coins += 30; updateSession(state.session);
                  }
              }
              return;
          }

          try {
            const data = await api("/api/missions/progress", {
              method: "POST",
              body: JSON.stringify({
                token: state.session.token,
                ...payload
              })
            });

            updateSession(data.session);
            updateMissions(data.missions, data.rewardGranted || 0);
            if (data.rewardGranted) {
              playConfirmTone();
              showToast("任务完成", `奖励到账 +${data.rewardGranted} 星币。`, false);
            }
          } finally {
            state.isMissionSubmitting = false;
          }
        }

        async function openWhisperDialog(star) {
          if (state.session.token.startsWith("mock")) {
              state.selectedWhisper = star;
              renderStarDialog(star, [{ authorAlias: "系统回响", content: "当你凝望深空，深空也会报以温柔。", createdAt: Date.now(), fromSelf: false }]);
              els.starDialog.classList.add("active");
              return;
          }
          try {
            const data = await api(`/api/whispers/${encodeURIComponent(star.id)}/replies?token=${encodeURIComponent(state.session.token)}`);
            state.selectedWhisper = star;
            updateSession(data.session);
            renderStarDialog(data.whisper, data.replies || []);
            els.starDialog.classList.add("active");

            if (!star.isOwn && !state.readMissionCache.has(star.id)) {
              state.readMissionCache.add(star.id);
              await progressMission({ type: "readWhisper", whisperId: star.id });
            } else if (star.isOwn) {
              await refreshState();
              await refreshLogs(true);
            }
          } catch (error) {
            showToast("读取失败", "这颗星星暂时接触不到，稍后再试。", true);
          }
        }

        async function sendReply() {
          if (!state.selectedWhisper) return;
          const content = els.replyInput.value.trim();
          if (!content) {
            showToast("还没写回响", "一句轻轻的话，也会成为别人今晚的光。", true);
            return;
          }

          if (state.session.token.startsWith("mock")) {
              showToast("回响已送达", "单机星海已接收回响。", false);
              els.replyInput.value = "";
              closeDialog();
              return;
          }

          try {
            await api(`/api/whispers/${encodeURIComponent(state.selectedWhisper.id)}/replies`, {
              method: "POST", body: JSON.stringify({ token: state.session.token, content })
            });

            els.replyInput.value = "";
            playConfirmTone();
            await openWhisperDialog(state.selectedWhisper);
            await refreshState();
            await refreshLogs(false);
            showToast("回响已送达", "你的话正在穿过这片星海。", false);
          } catch (error) {
            showToast("发送失败", "这句回响没能发出去，请稍后再试。", true);
          }
        }

        function startMissionTimer() {
          if (state.missionTickHandle) return;
          state.missionTickHandle = window.setInterval(() => {
            progressMission({ type: "listen", amount: 5 }).catch(() => { clearMissionTimer(); });
          }, 5000);
        }

        function clearMissionTimer() {
          if (!state.missionTickHandle) return;
          window.clearInterval(state.missionTickHandle);
          state.missionTickHandle = null;
        }

        // 追加控制台“开启听泉”组件按钮注入
        function injectAudioBtn() {
            const dock = document.querySelector(".action-dock");
            const btn = document.createElement("button");
            btn.className = "dock-btn"; btn.id = "audioBtn"; btn.textContent = "开启听泉";
            dock.insertBefore(btn, dock.firstChild);
            els.audioBtn = btn;
        }

        function toggleAudio() {
          if (state.audioCtx) {
            try { state.audioNodes.noise.stop(); } catch (error) {}
            state.audioCtx.close(); state.audioCtx = null; state.audioNodes = null;
            els.audioBtn.textContent = "开启听泉";
            clearMissionTimer();
            return;
          }

          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) {
            showToast("当前环境不支持", "这个浏览器环境不支持声音播放。", true);
            return;
          }

          const audioCtx = new AudioCtor();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
          const channel = buffer.getChannelData(0);
          for (let i = 0; i < channel.length; i += 1) { channel[i] = Math.random() * 2 - 1; }

          const noise = audioCtx.createBufferSource();
          noise.buffer = buffer; noise.loop = true;
          const filter = audioCtx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 860;
          const gain = audioCtx.createGain(); gain.gain.value = 0.06;

          noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
          noise.start();

          state.audioCtx = audioCtx; state.audioNodes = { noise };
          els.audioBtn.textContent = "停止听泉";
          startMissionTimer();
        }

        function playConfirmTone() {
          if (!state.audioCtx) return;
          const now = state.audioCtx.currentTime;
          const freqs = [293.66, 440, 659.25];

          for (let i = 0; i < freqs.length; i += 1) {
            const osc = state.audioCtx.createOscillator();
            const gain = state.audioCtx.createGain();
            osc.type = "sine"; osc.frequency.value = freqs[i];
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.03 / (i + 1), now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.4 + i * 0.2);
            osc.connect(gain); gain.connect(state.audioCtx.destination);
            osc.start(now); osc.stop(now + 1.5 + i * 0.2);
          }
        }

        function openPanel(id) {
          const panel = document.getElementById(id);
          if (!panel) return;
          if (id === "whisperModal") { panel.classList.remove("hidden"); return; }
          panel.classList.add("active");
        }

        function closePanel(id) {
          const panel = document.getElementById(id);
          if (!panel) return;
          if (id === "whisperModal") { panel.classList.add("hidden"); return; }
          panel.classList.remove("active");
        }

        function closeDialog() {
          els.starDialog.classList.remove("active");
          state.selectedWhisper = null;
        }

        function detectStarHit(x, y) {
          for (let i = starNodes.length - 1; i >= 0; i -= 1) {
            const star = starNodes[i];
            if (!star.visible) continue;
            const distance = Math.hypot(star.screenX - x, star.screenY - y);
            if (distance <= star.screenRadius) return star;
          }
          return null;
        }

        function bindPointerEvents() {
          function isUiTarget(target) {
            return !!target.closest(".side-panel, .modal-card, .star-dialog, .action-dock, .top-shell, .toast-stack");
          }

          function startDrag(x, y) {
            isDragging = true; dragX = x; dragY = y; tapPoint = { x, y }; dragDistance = 0;
          }

          function moveDrag(x, y, factor) {
            if (!isDragging) return;
            const deltaX = x - dragX; const deltaY = y - dragY;
            dragX = x; dragY = y;
            dragDistance += Math.abs(deltaX) + Math.abs(deltaY);
            targetRotationY += deltaX * factor; targetRotationX += deltaY * factor;
          }

          async function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (dragDistance < 10) {
              const star = detectStarHit(tapPoint.x, tapPoint.y);
              if (star) await openWhisperDialog(star);
              else closeDialog();
            }
          }

          window.addEventListener("mousedown", (event) => { if (isUiTarget(event.target)) return; startDrag(event.clientX, event.clientY); });
          window.addEventListener("mousemove", (event) => { moveDrag(event.clientX, event.clientY, 0.0033); });
          window.addEventListener("mouseup", () => { endDrag(); });

          window.addEventListener("touchstart", (event) => {
            if (isUiTarget(event.target)) return;
            const touch = event.touches[0]; startDrag(touch.clientX, touch.clientY);
          }, { passive: true });
          window.addEventListener("touchmove", (event) => {
            const touch = event.touches[0]; moveDrag(touch.clientX, touch.clientY, 0.0048);
          }, { passive: true });
          window.addEventListener("touchend", () => { endDrag(); });
        }

        function bindUi() {
          els.audioBtn.addEventListener("click", toggleAudio);
          els.missionBtn.addEventListener("click", () => { openPanel("missionPanel"); });
          els.logBtn.addEventListener("click", async () => { openPanel("logPanel"); await refreshLogs(true); });
          els.openWhisperBtn.addEventListener("click", () => { openPanel("whisperModal"); });
          els.refreshLogBtn.addEventListener("click", () => {
            refreshLogs(true).catch(() => { showToast("同步失败", "日志暂时没有同步上，请稍后再试。", true); });
          });
          els.submitWhisperBtn.addEventListener("click", () => {
            submitWhisper().catch(() => { showToast("发射失败", "宇宙连接波动，请稍后再试。", true); });
          });
          els.sendReplyBtn.addEventListener("click", () => {
            sendReply().catch(() => { showToast("发送失败", "回响暂时没有发出去。", true); });
          });

          const closePanelButtons = document.querySelectorAll("[data-close-panel]");
          for (let i = 0; i < closePanelButtons.length; i += 1) {
            const button = closePanelButtons[i];
            button.addEventListener("click", () => { closePanel(button.getAttribute("data-close-panel")); });
          }

          const closeDialogButtons = document.querySelectorAll("[data-close-dialog]");
          for (let i = 0; i < closeDialogButtons.length; i += 1) { closeDialogButtons[i].addEventListener("click", closeDialog); }

          window.addEventListener("resize", resizeCanvas);
          window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") { closeDialog(); closePanel("missionPanel"); closePanel("logPanel"); closePanel("whisperModal"); }
          });
        }

        function startAmbientRotation() {
          window.setInterval(() => {
            state.ambientIndex = (state.ambientIndex + 1) % ambientTexts.length;
            els.ambientText.textContent = ambientTexts[state.ambientIndex];
          }, 9000);
        }

        function startPolling() {
          state.pollHandle = window.setInterval(async () => {
            try {
              await refreshState();
              if (els.logPanel.classList.contains("active")) { await refreshLogs(false); }
            } catch (error) {}
          }, 9000);
        }

        // 动态追加底栏骨架
        function injectDock() {
            const dock = document.createElement("div");
            dock.className = "action-dock";
            dock.innerHTML = `
                <button class="dock-btn" id="missionBtn">治愈任务</button>
                <button class="dock-btn" id="openWhisperBtn">推向深空</button>
                <button class="dock-btn" id="logBtn">观测日志</button>
            `;
            document.body.appendChild(dock);
            els.missionBtn = document.getElementById("missionBtn");
            els.openWhisperBtn = document.getElementById("openWhisperBtn");
            els.logBtn = document.getElementById("logBtn");
        }

        async function main() {
          injectDock();
          injectAudioBtn();
          initCanvas(); 
          bindPointerEvents(); 
          bindUi(); 
          startAmbientRotation();
          await bootstrap();
          window.requestAnimationFrame(renderScene);
          startPolling();
        }

        main().catch((error) => {
          console.error(error);
          showToast("初始化失败", "本地宇宙没有成功启动，请刷新页面重试。", true);
        });
    </script>
</body>
</html>
