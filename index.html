<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECHOES 星河 · 沉浸治愈版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #05020a; font-family: 'Noto Serif SC', serif; color: #fff; user-select: none; }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 增加深红/暗紫色的宇宙基底氛围 */
        .nebula-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at 50% 50%, #150524 0%, #080211 60%, #030106 100%);
        }

        /* =========================================
           入场遮罩 (解决浏览器不让自动播放声音的问题)
           ========================================= */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999;
            background: #030106; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s ease;
        }
        #intro-screen.hidden { opacity: 0; pointer-events: none; }
        .enter-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 15px 40px;
            border-radius: 30px; font-size: 1rem; letter-spacing: 4px; cursor: pointer; font-family: 'Noto Serif SC', serif;
            transition: all 0.5s; box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }
        .enter-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .intro-hint { margin-top: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

        /* =========================================
           UI 层 (复刻截图质感)
           ========================================= */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; opacity: 0; transition: opacity 2s ease 1s; }
        .ui-layer.visible { opacity: 1; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .user-badge { background: rgba(20, 20, 25, 0.4); backdrop-filter: blur(10px); border-radius: 8px; border-left: 3px solid #d4af37; padding: 12px 18px; display: flex; flex-direction: column; gap: 4px; }
        .user-badge .title { font-size: 0.65rem; color: #888; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif; }
        .user-badge .name { font-size: 0.9rem; color: #ddd; letter-spacing: 1px; }

        .asset-box { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .coin-display { font-size: 1.1rem; color: #d4af37; font-family: sans-serif; font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .recharge-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #ccc; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; backdrop-filter: blur(5px); }

        .center-text { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; transition: opacity 0.8s ease; pointer-events: none; }
        .center-text h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .center-text p { font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

        /* 灵魂文案弹窗 */
        .soul-message-box { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 85%; max-width: 400px; text-align: center; pointer-events: none; opacity: 0; transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 20; }
        .soul-message-box.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .soul-content { font-size: 1.2rem; line-height: 1.8; font-weight: 300; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.8); margin-bottom: 20px; }
        .soul-author { font-size: 0.75rem; color: rgba(212, 175, 55, 0.8); letter-spacing: 1px; }
        
        .drag-hint { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: rgba(255,255,255,0.2); letter-spacing: 2px; pointer-events: none; animation: pulse 4s infinite; }
        @keyframes pulse { 0% { opacity: 0.1; } 50% { opacity: 0.6; } 100% { opacity: 0.1; } }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .report-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px 24px; border-radius: 6px; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; }
        .cast-btn { background: linear-gradient(135deg, #7b1fa2, #4a148c); border: none; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 20px rgba(123, 31, 162, 0.5); }

    </style>
</head>
<body>

    <div class="nebula-bg"></div>
    <div id="webgl-container"></div>

    <div id="intro-screen">
        <button class="enter-btn" id="enterBtn">触碰宇宙</button>
        <div class="intro-hint">请佩戴耳机获得最佳治愈体验</div>
    </div>

    <div class="ui-layer" id="mainUI">
        <div class="top-bar">
            <div class="user-badge">
                <span class="title">Soul Tracking</span>
                <span class="name">天鹅座 · 暗物质</span>
            </div>
            <div class="asset-box">
                <div class="coin-display">💰 270</div>
                <button class="recharge-btn">测试充值</button>
            </div>
        </div>

        <div class="center-text" id="defaultText">
            <h1>你已经很棒了，不必步步紧逼。</h1>
            <p>星河不渡杂音 · 唯有灵魂共鸣</p>
        </div>

        <div class="soul-message-box" id="soulBox">
            <div class="soul-content" id="soulContent">""</div>
            <div class="soul-author" id="soulAuthor"></div>
        </div>
        
        <div class="drag-hint">滑动屏幕环顾宇宙 · 点击发光星辰聆听执念</div>

        <div class="bottom-bar">
            <button class="report-btn">生成灵魂报告</button>
            <button class="cast-btn" onclick="alert('准备发射执念...')">把执念散作星辰</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://actions.google.com/sounds/v1/ambiences/deep_space.ogg"></audio>

    <script>
        // ==========================================
        // 核心一：音频系统 (背景音 + 432Hz 颂钵交互音)
        // ==========================================
        let audioCtx;
        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 极其空灵的西藏颂钵合成音
        function playHealingChime() {
            initAudioContext();
            const time = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(432, time); // 治愈频率
            
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.8, time + 0.05); // 清脆敲击
            gain.gain.exponentialRampToValueAtTime(0.001, time + 5); // 5秒超长回响
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 5);
        }

        // 入场交互：隐藏面纱，播放背景音
        document.getElementById('enterBtn').addEventListener('click', () => {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('mainUI').classList.add('visible');
            
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log("BGM 播放被拦截"));
            initAudioContext();
        });

        // ==========================================
        // 核心二：Three.js 生成圆形发光星辰与星云光晕
        // ==========================================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0212, 0.0012); // 宇宙深空紫雾

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2500);
        camera.position.set(0, 0, 0.1); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.enableZoom = false; 
        controls.enablePan = false;
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 0.5; // 缓慢的宇宙自转

        // 独家黑科技：用代码画一个“带柔光边缘的圆形”，解决方形星星问题
        function createCircleTexture(glow) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            if(glow) {
                // 星云光晕材质
                gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
                gradient.addColorStop(0.4, 'rgba(150,100,255,0.1)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
            } else {
                // 实体星辰材质
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const starTexture = createCircleTexture(false);
        const nebulaTexture = createCircleTexture(true);

        // --- 1. 创建星云光晕 (不可点击，只提供旋转时的朦胧美感) ---
        const nebulaGeometry = new THREE.BufferGeometry();
        const nebulaCount = 300;
        const nebulaPos = new Float32Array(nebulaCount * 3);
        for(let i=0; i<nebulaCount*3; i++) {
            nebulaPos[i] = (Math.random() - 0.5) * 1500;
        }
        nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        const nebulaMaterial = new THREE.PointsMaterial({
            size: 150, map: nebulaTexture, transparent: true, opacity: 0.3, depthWrite: false, blending: THREE.AdditiveBlending, color: 0x6a0dad
        });
        const nebulaMesh = new THREE.Points(nebulaGeometry, nebulaMaterial);
        scene.add(nebulaMesh);

        // --- 2. 创建真实灵魂星辰 (可点击) ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPos = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);

        for(let i = 0; i < starCount * 3; i+=3) {
            const r = 300 + Math.random() * 600; 
            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);
            
            starPos[i] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i+2] = r * Math.cos(phi);

            // 星辰冷暖色：白、浅蓝、淡紫交织
            const mix = Math.random();
            if(mix < 0.2) { starColors[i]=0.9; starColors[i+1]=0.7; starColors[i+2]=1; } 
            else if (mix < 0.5) { starColors[i]=0.7; starColors[i+1]=0.9; starColors[i+2]=1; } 
            else { starColors[i]=1; starColors[i+1]=1; starColors[i+2]=1; } 
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMaterial = new THREE.PointsMaterial({
            size: 8, // 星星稍微大一点，看起来更圆润
            map: starTexture, // 使用圆形柔光贴图
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const starMesh = new THREE.Points(starGeometry, starMaterial);
        scene.add(starMesh);

        // ==========================================
        // 核心三：精准点击与读心交互
        // ==========================================
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 12; // 扩大点击判定范围，很容易点中
        const mouse = new THREE.Vector2();

        // 模拟真实的灵魂文案库
        const soulMessages = [
            "今天真的很累，但还好有这片星空。",
            "如果重来一次，我不会推开你。",
            "宇宙那么大，我们的烦恼那么小。",
            "我终于决定放过我自己了。",
            "好想抱抱那个在深夜哭泣的自己。",
            "晚安，陌生人，祝你做个好梦。",
            "把所有的不甘心，都留在这个黑洞里吧。"
        ];

        let msgTimeout;

        function onInteraction(event) {
            // 防止拖拽旋转时误触点击
            if (event.type === 'touchend' && event.changedTouches.length > 1) return;

            let clientX, clientY;
            if (event.changedTouches) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(starMesh);

            if (intersects.length > 0) {
                // 1. 播放极致空灵的颂钵声音
                playHealingChime();

                // 2. 随机读取一句灵魂文案
                const randomMsg = soulMessages[Math.floor(Math.random() * soulMessages.length)];
                const randomDistance = (Math.random() * 8 + 0.1).toFixed(1);

                // 3. 切换 UI 状态
                document.getElementById('defaultText').style.opacity = '0';
                const soulBox = document.getElementById('soulBox');
                document.getElementById('soulContent').innerText = `"${randomMsg}"`;
                document.getElementById('soulAuthor').innerText = `- 距离你 ${randomDistance} 光年的灵魂`;
                
                soulBox.classList.add('active');

                // 重置计时器，8秒后恢复默认 UI
                clearTimeout(msgTimeout);
                msgTimeout = setTimeout(() => {
                    soulBox.classList.remove('active');
                    document.getElementById('defaultText').style.opacity = '1';
                }, 8000);
            }
        }

        // 增加 mousedown 和 touchstart 用于点击判定，比 click 更灵敏
        window.addEventListener('mousedown', onInteraction);
        window.addEventListener('touchstart', onInteraction, {passive: true});

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // 星星呼吸闪烁效果
            const time = Date.now() * 0.001;
            starMaterial.opacity = 0.5 + Math.sin(time * 2) * 0.5;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
