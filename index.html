<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>静心 · 宇宙空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02050a;
            font-family: "Noto Serif SC", "SimSun", serif;
            user-select: none;
        }
        
        /* 3D 物理矩阵画布 */
        #spaceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 边缘暗部遮罩，增强深邃的包裹感与孤独感 */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 15%, rgba(1, 3, 6, 0.96) 85%);
            pointer-events: none;
            z-index: 2;
        }

        /* 核心精神文案容器（呼吸淡入淡出） */
        .soul-container {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 85%;
            max-width: 650px;
        }
        .soul-text {
            color: #b8ad96;
            font-size: 1.1rem;
            letter-spacing: 5px;
            line-height: 2.4rem;
            opacity: 0;
            filter: blur(4px);
            animation: textBreath 15s infinite ease-in-out;
            text-shadow: 0 0 25px rgba(184, 173, 150, 0.25);
            font-weight: 300;
        }
        @media (min-width: 768px) {
            .soul-text { font-size: 1.25rem; letter-spacing: 7px; line-height: 2.8rem; }
            .soul-container { top: 40%; }
        }
        @keyframes textBreath {
            0% { opacity: 0; filter: blur(6px); transform: scale(0.97); }
            20% { opacity: 0.75; filter: blur(0px); transform: scale(1); }
            80% { opacity: 0.75; filter: blur(0px); transform: scale(1); }
            100% { opacity: 0; filter: blur(6px); transform: scale(1.03); }
        }

        /* 悬停/点击在星辰上浮现的“他人心声”容器 */
        .resonance-box {
            position: absolute;
            z-index: 100;
            background: rgba(2, 5, 10, 0.9);
            border: 1px solid rgba(184, 173, 150, 0.25);
            padding: 14px 20px;
            border-radius: 4px;
            color: #dcd3be;
            font-size: 0.9rem;
            letter-spacing: 2px;
            line-height: 1.6rem;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -120%);
            transition: opacity 0.4s ease, filter 0.4s ease, transform 0.3s ease;
            backdrop-filter: blur(8px);
            width: 85vw;
            max-width: 280px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            filter: blur(4px);
        }
        .resonance-box.active {
            opacity: 0.95;
            filter: blur(0px);
        }
        /* 手机端触控时的特殊定位样式（居中偏上，防止被手指挡住） */
        .resonance-box.mobile-center {
            position: absolute;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            animation: mobileBoxFadeIn 0.3s ease forwards;
        }
        @keyframes mobileBoxFadeIn {
            from { opacity: 0; filter: blur(5px); transform: translate(-50%, -45%); }
            to { opacity: 0.95; filter: blur(0px); transform: translate(-50%, -50%); }
        }

        /* 右下角极简倾诉按钮 */
        .whisper-trigger {
            position: absolute;
            bottom: 5%;
            right: 6%;
            z-index: 20;
            color: rgba(184, 173, 150, 0.5);
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.3s;
            border-bottom: 1px solid rgba(184, 173, 150, 0.15);
            padding-bottom: 4px;
        }
        @media (min-width: 768px) { .whisper-trigger { right: 4%; } }
        .whisper-trigger:hover {
            color: rgba(184, 173, 150, 0.9);
        }

        /* 弹出输入面板 */
        .input-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            background: rgba(3, 7, 14, 0.97);
            border: 1px solid rgba(184, 173, 150, 0.25);
            padding: 25px;
            border-radius: 4px;
            width: 88%;
            max-width: 400px;
            display: none;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }
        .input-panel p {
            color: #b8ad96;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: center;
        }
        .input-panel textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(184, 173, 150, 0.2);
            padding: 12px;
            color: #e0d5c1;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            border-radius: 2px;
        }
        .input-panel textarea:focus {
            border-color: #b8ad96;
        }
        .panel-btns {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }
        .panel-btn {
            background: transparent;
            border: 1px solid rgba(184, 173, 150, 0.3);
            color: #8c8370;
            padding: 8px 18px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .panel-btn.submit {
            border-color: #b8ad96;
            color: #b8ad96;
        }

        /* 左下角声音开关 */
        .audio-trigger {
            position: absolute;
            bottom: 5%;
            left: 6%;
            z-index: 20;
            background: transparent;
            border: 1px solid rgba(184, 173, 150, 0.2);
            color: #8c8370;
            padding: 6px 16px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s;
            outline: none;
        }
        @media (min-width: 768px) { .audio-trigger { left: 4%; padding: 6px 20px; } }
        .audio-trigger:hover {
            border-color: #b8ad96;
            color: #b8ad96;
        }

        /* 顶部引导提示 */
        .top-hint {
            position: absolute;
            top: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(184, 173, 150, 0.25);
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>
    <div class="ambient-glow"></div>

    <div class="top-hint" id="guideHint">滑动旋转星空 · 轻触发光星辰感应心声</div>
    <div class="soul-container">
        <p class="soul-text" id="breathingText">万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。</p>
    </div>

    <div class="resonance-box" id="resonanceBox"></div>

    <button class="audio-trigger" onclick="toggleSpaceAudio(event)" id="audioBtn">轻触 · 听泉</button>
    <div class="whisper-trigger" onclick="openInputPanel(event)">把执念散作星辰</div>

    <div class="input-panel" id="inputPanel">
        <p>写下一件你此刻放不下的事：</p>
        <textarea id="whisperInput" rows="3" placeholder="写完后，它将凝聚成宇宙里的一颗星..."></textarea>
        <div class="panel-btns">
            <button class="panel-btn" onclick="closeInputPanel()">算了吧</button>
            <button class="panel-btn submit" onclick="submitWhisper()">散作星河</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 检测是否为移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if(!isMobile) {
            document.getElementById('guideHint').innerText = "拖拽可360°转动视角 · 鼠标悬停寻找发光的灵魂";
        }

        let rotationX = 0, rotationY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;
        
        // 触控/鼠标追踪物理量
        let startX = 0, startY = 0;
        let prevMouseX = 0, prevMouseY = 0;
        let totalMoveDist = 0; // 用来判定是“拖拽视角”还是“轻触点击”

        const starNodes = [];
        const poolOfThoughts = [
            "今年31岁被裁员了，瞒着父母每天在图书馆假装上班，好累。",
            "努力了三年还是考研失败，感觉自己是个废物，对不起爸妈。",
            "医生说可能转恶性，我才二十五岁，坐在路边哭了一场，不敢跟任何人说。",
            "相恋七年，今天他结婚了，新娘不是我。祝你幸福是真的，祝我们幸福也是真的。",
            "大城市房租又涨了，每天加班到深夜，不知道坚持的意义到底是什么。",
            "今天母亲查出了重病，可我手里只有两万块钱，第一次痛恨自己的无能。"
        ];

        class StarNode {
            constructor(text = null, isUserGenerated = false) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                // 手机端适当缩小编盘半径，使星辰在小屏幕上更紧凑、更有凝聚感
                const baseDist = isMobile ? 280 : 350;
                const dist = isUserGenerated ? (baseDist * 0.7) : (baseDist + Math.random() * baseDist);

                this.x = dist * Math.sin(phi) * Math.cos(theta);
                this.y = dist * Math.sin(phi) * Math.sin(theta);
                this.z = dist * Math.cos(phi);

                this.text = text || poolOfThoughts[Math.floor(Math.random() * poolOfThoughts.length)];
                this.isUser = isUserGenerated;
                
                // 移动端让星星体积稍微增大一点点，更方便用肉眼寻找
                const sizeMultiplier = isMobile ? 1.4 : 1.0;
                this.size = isUserGenerated ? (3.0 * sizeMultiplier) : ((Math.random() * 1.3 + 0.7) * sizeMultiplier);
                
                this.baseAlpha = isUserGenerated ? 0.95 : (Math.random() * 0.4 + 0.2);
                this.screenX = 0;
                this.screenY = 0;
                this.currentScale = 0;
            }

            draw(rotX, rotY, pulse) {
                let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                
                let x1 = this.x * cosY - this.z * sinY;
                let z1 = this.x * sinY + this.z * cosY;
                let y2 = this.y * cosX - z1 * sinX;
                let z2 = this.y * sinX + z1 * cosX;

                const fov = 500;
                if (z2 + fov > 0) {
                    this.currentScale = fov / (fov + z2);
                    this.screenX = width / 2 + x1 * this.currentScale;
                    this.screenY = height / 2 + y2 * this.currentScale;

                    ctx.beginPath();
                    ctx.arc(this.screenX, this.screenY, this.size * this.currentScale, 0, Math.PI * 2);
                    
                    if(this.isUser) {
                        ctx.fillStyle = `rgba(242, 226, 177, ${this.baseAlpha})`;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#eddba4";
                    } else {
                        ctx.fillStyle = `rgba(184, 173, 150, ${this.baseAlpha * pulse})`;
                        ctx.shadowBlur = 0;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        // 填充星海
        const starCount = isMobile ? 100 : 160; // 手机端稍微精简数量，保护丝滑流畅度
        for(let i=0; i<starCount; i++) starNodes.push(new StarNode());

        // --- 核心物理事件绑定（完美融合 PC 鼠标与手机触控） ---

        // 1. 电脑端鼠标逻辑
        window.addEventListener('mousedown', (e) => {
            if(checkTargetInvalid(e.target)) return;
            isDragging = true;
            totalMoveDist = 0;
            prevMouseX = e.clientX; prevMouseY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - prevMouseX;
                const deltaY = e.clientY - prevMouseY;
                targetRotationY += deltaX * 0.002;
                targetRotationX += deltaY * 0.002;
                prevMouseX = e.clientX; prevMouseY = e.clientY;
                totalMoveDist += Math.hypot(deltaX, deltaY);
            } else if (!isMobile) {
                // 只有电脑端才在移动时执行 Hover 感应
                checkStarInteraction(e.clientX, e.clientY, false);
            }
        });

        window.addEventListener('mouseup', (e) => {
            if(!isDragging) return;
            isDragging = false;
            // 如果鼠标没怎么移动，说明是单点触发
            if(totalMoveDist < 5 && !isMobile) {
                checkStarInteraction(e.clientX, e.clientY, true);
            }
        });

        // 2. 手机端触控逻辑（核心改造升级）
        window.addEventListener('touchstart', (e) => {
            if(checkTargetInvalid(e.target)) return;
            isDragging = true;
            totalMoveDist = 0;
            startX = prevMouseX = e.touches[0].clientX;
            startY = prevMouseY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - prevMouseX;
            const deltaY = e.touches[0].clientY - prevMouseY;
            targetRotationY += deltaX * 0.004;
            targetRotationX += deltaY * 0.004;
            prevMouseX = e.touches[0].clientX;
            prevMouseY = e.touches[0].clientY;
            totalMoveDist += Math.hypot(deltaX, deltaY);
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if(!isDragging) return;
            isDragging = false;
            
            // 核心判定：如果手指滑动的总距离小于 8 像素，说明用户在执行“轻触感应”
            if (totalMoveDist < 8) {
                checkStarInteraction(startX, startY, true);
            } else {
                // 如果是在拖拽视角，在手机上默认淡出已显示的心声，保证视野干净
                if(isMobile) {
                    document.getElementById('resonanceBox').classList.remove('active');
                }
            }
        });

        function checkTargetInvalid(target) {
            return target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || target.classList.contains('whisper-trigger');
        }

        // --- 核心感应模块（全平台自适应适配） ---
        const resBox = document.getElementById('resonanceBox');
        
        function checkStarInteraction(mx, my, isClickOrTouch) {
            let hoveredStar = null;
            // 物理碰撞半径：手机端手指判定范围扩大一倍(35px)，电脑端保持灵敏(16px)
            const activeRadius = isMobile ? 35 : 16; 

            for(let star of starNodes) {
                if(star.currentScale > 0) {
                    const dist = Math.hypot(star.screenX - mx, star.screenY - my);
                    if(dist < activeRadius) {
                        hoveredStar = star;
                        break;
                    }
                }
            }

            if(hoveredStar) {
                resBox.innerHTML = hoveredStar.text;
                
                if (isMobile) {
                    // 手机端：居中弹出，配合高级高斯模糊背景，防止手指遮挡且极具仪式感
                    resBox.style.left = "50%";
                    resBox.style.top = "50%";
                    resBox.classList.add('mobile-center');
                } else {
                    // 电脑端：跟随鼠标浮动
                    resBox.classList.remove('mobile-center');
                    resBox.style.left = `${mx}px`;
                    resBox.style.top = `${my}px`;
                }
                
                resBox.classList.add('active');
                hoveredStar.baseAlpha = 1;
                hoveredStar.size = isMobile ? 4.0 : 2.5;
            } else {
                // 如果点在了空无一物的虚空中，直接淡出清除心声框
                if (isClickOrTouch || !isMobile) {
                    resBox.classList.remove('active');
                    resBox.classList.remove('mobile-center');
                }
                // 恢复普通星星亮度
                starNodes.forEach(s => {
                    if(!s.isUser) { 
                        s.baseAlpha = Math.random() * 0.4 + 0.2; 
                        s.size = (Math.random() * 1.3 + 0.7) * (isMobile ? 1.4 : 1.0); 
                    }
                });
            }
        }

        // 渲染主循环
        let globalPulse = 1; let pulseDir = 1;
        function render() {
            ctx.fillStyle = 'rgba(2, 5, 10, 0.18)';
            ctx.fillRect(0, 0, width, height);

            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;
            targetRotationY += 0.00008; // 极微弱的宇宙自转

            globalPulse += 0.004 * pulseDir;
            if(globalPulse > 1.15 || globalPulse < 0.85) pulseDir *= -1;

            for (let star of starNodes) {
                star.draw(rotationX, rotationY, globalPulse);
            }

            requestAnimationFrame(render);
        }
        render();

        // 交互控制
        function openInputPanel(e) { 
            e.stopPropagation(); 
            document.getElementById('inputPanel').style.display = 'flex'; 
            document.getElementById('whisperInput').focus();
        }
        function closeInputPanel() { 
            document.getElementById('inputPanel').style.display = 'none'; 
        }
        
        function submitWhisper() {
            const input = document.getElementById('whisperInput');
            const text = input.value.trim();
            if(!text) return;

            const newStar = new StarNode(text, true);
            starNodes.push(newStar);

            input.value = '';
            closeInputPanel();
            playValleyChime();
        }

        // 心理学意境轮播
        const texts = [
            "万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。",
            "闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。",
            "红尘滚滚，总有来路。<br>停下歇歇，本就无需向任何人交代。",
            "风撩屋檐，雨润青苔。<br>心里积攒的那些委屈，就在这里散了吧。"
        ];
        let textIndex = 0;
        setInterval(() => {
            textIndex = (textIndex + 1) % texts.length;
            document.getElementById('breathingText').innerHTML = texts[textIndex];
        }, 15000);

        // 音频合成引擎（听雨 + 随机远方风铃）
        let audioCtx = null; let bellInterval = null;
        function toggleSpaceAudio(e) {
            e.stopPropagation();
            const btn = document.getElementById('audioBtn');
            if (audioCtx) {
                audioCtx.close(); audioCtx = null;
                clearInterval(bellInterval);
                btn.innerText = "轻触 · 听泉";
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            btn.innerText = "断开俗世";

            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(850, audioCtx.currentTime);

            const rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(0.06, audioCtx.currentTime);

            whiteNoise.connect(filter); filter.connect(rainGain);
            rainGain.connect(audioCtx.destination);
            whiteNoise.start();

            bellInterval = setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator(); let bellGain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800 + Math.random() * 200, audioCtx.currentTime);
                bellGain.gain.setValueAtTime(0, audioCtx.currentTime);
                bellGain.gain.linearRampToValueAtTime(0.012, audioCtx.currentTime + 0.1);
                bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5.0);
                osc.connect(bellGain); bellGain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 5.0);
            }, 8000);
        }

        // 深谷回响物理钟声（散作星河仪式感）
        function playValleyChime() {
            if (!audioCtx) return;
            const frequencies = [293.66, 440.00, 587.33, 734.16];
            const now = audioCtx.currentTime;
            frequencies.forEach((freq, index) => {
                let osc = audioCtx.createOscillator(); let gainNode = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.025 / (index + 1), now + 0.06); 
                const duration = 6.0 - (index * 0.8); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + duration);
            });
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
