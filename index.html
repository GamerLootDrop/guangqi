<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050302;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            user-select: none; color: #f3e1b9;
        }

        /* 🌌 3D 深度视图容器 */
        #vr-view-stage {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            display: flex; align-items: center; justify-content: center;
            z-index: 1;
            transition: transform 0.1s ease-out; /* 关键：用于实现鼠标跟随的平滑感 */
        }

        /* 🖼️ 高清背景图：直接调用云端高清大殿 */
        #vr-view-mirror {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.9) contrast(1.1) saturate(0.8);
        }

        /* 🚪 入场幕布 */
        #entry-curtain {
            position: fixed; inset: 0; background: #050302; z-index: 9999;
            transition: opacity 3s ease; display: flex; flex-direction: column;
            align-items: center; justify-content: center; letter-spacing: 8px;
        }

        /* ==================== 🌫️ 氛围叠加层（增加真实感） ==================== */
        
        /* 1. 动态烟雾 */
        .ambient-mist {
            position: fixed; inset: 0; pointer-events: none; z-index: 5;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 70%);
            mix-blend-mode: screen; animation: mistMove 20s infinite alternate;
        }
        @keyframes mistMove {
            from { transform: translate(-2%, -2%) scale(1); opacity: 0.3; }
            to { transform: translate(2%, 2%) scale(1.1); opacity: 0.6; }
        }

        /* 2. 烛火微光闪烁 */
        .light-flicker {
            position: fixed; inset: 0; pointer-events: none; z-index: 2;
            background: rgba(124, 31, 23, 0.02);
            animation: flicker 0.2s infinite alternate;
        }
        @keyframes flicker {
            from { opacity: 0.5; } to { opacity: 1; }
        }

        /* ==================== 🎛️ 玻璃态UI中控台 ==================== */
        .glass-console-panel {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            width: 88vw; max-width: 420px; z-index: 20;
            background: rgba(15, 11, 9, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(189, 161, 106, 0.3); border-top: 3px solid #bda16a;
            border-radius: 12px; padding: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .panel-header h2 { margin: 0; font-size: 22px; text-align: center; letter-spacing: 4px; color: #f3e1b9; }
        .panel-header p { margin: 5px 0 15px 0; font-size: 11px; text-align: center; color: #a69580; opacity: 0.7; }

        .tab-menu { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(189,161,106,0.2);
            color: #bfae9c; font-size: 12px; cursor: pointer; border-radius: 4px;
        }
        .tab-btn.active { background: #7c1f17; color: #fff; border-color: #bda16a; }

        .action-content { display: none; }
        .action-content.active { display: block; }

        .gold-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #a67f3c, #f7e4be);
            border: none; border-radius: 4px; color: #1c130e; font-weight: bold; cursor: pointer;
            letter-spacing: 2px; transition: 0.2s;
        }
        .gold-btn:active { transform: scale(0.98); }

        .wish-input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #4a3b2c;
            color: #fff; border-radius: 4px; margin-bottom: 10px; text-align: center;
        }

        /* 飘字提醒 */
        .toast {
            position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #f7e4be; font-size: 18px; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 15px #000; animation: fadeUp 2.5s forwards; z-index: 100;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -40px); }
        }
    </style>
</head>
<body>

    <div id="entry-curtain">
        <h2 style="color:#bda16a">万籁俱静 · 唯见真我</h2>
        <p style="color:#666">正在连接灵境 3D 视图...</p>
    </div>

    <div class="light-flicker"></div>
    <div class="ambient-mist"></div>

    <div id="vr-view-stage">
        <img id="vr-view-mirror" src="https://images.unsplash.com/photo-1610991148731-9705e3240212?q=80&w=2070&auto=format&fit=crop" alt="灵境视图">
    </div>

    <div class="glass-console-panel">
        <div class="panel-header">
            <h2>三清大殿 · 乾坤灵境</h2>
            <p>☯ 沉浸式 3D 深度交互 ☯</p>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab(0)">敬奉心香</button>
            <button class="tab-btn" onclick="showTab(1)">功态吐纳</button>
            <button class="tab-btn" onclick="showTab(2)">文疏祈愿</button>
        </div>

        <div class="action-content active">
            <button class="gold-btn" onclick="playBell()">鸣磬静心</button>
        </div>
        <div class="action-content">
            <button class="gold-btn" id="breath-btn" onclick="startBreath()">开始吐纳</button>
        </div>
        <div class="action-content">
            <input type="text" id="wish" class="wish-input" placeholder="输入心中所求...">
            <button class="gold-btn" onclick="sendWish()">化疏文</button>
        </div>
    </div>

    <script>
        // 🚪 入场
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('entry-curtain').style.opacity = '0';
                setTimeout(() => document.getElementById('entry-curtain').remove(), 3000);
            }, 1500);
        };

        // 🖱️ 3D 悬浮透视效果：让背景随鼠标移动
        const stage = document.getElementById('vr-view-stage');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            stage.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateZ(20px)`;
        });

        // 🔊 鸣磬
        let audioCtx = null;
        function playBell() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(215, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 4);
            toast("磬响一声 · 杂念皆消 ☯️");
        }

        // 💨 吐纳
        let breathing = false;
        function startBreath() {
            const btn = document.getElementById('breath-btn');
            if(breathing) { location.reload(); return; }
            breathing = true;
            let step = 0;
            setInterval(() => {
                btn.innerText = step % 2 === 0 ? "✨ 吸气... 纳新" : "💨 呼气... 吐故";
                step++;
            }, 4000);
        }

        function sendWish() {
            const w = document.getElementById('wish').value;
            if(!w) return;
            toast(`疏文已上达天听：${w} 🏮`);
            document.getElementById('wish').value = '';
        }

        function toast(m) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function showTab(idx) {
            const btns = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.action-content');
            btns.forEach((b, i) => b.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }
    </script>
</body>
</html>
