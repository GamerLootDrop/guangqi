<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0c0806; color: #f7ede2;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            overflow: hidden; user-select: none;
        }

        /* 稳定的古典渐变背景 */
        .temple-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #22160f 0%, #070504 80%);
            z-index: 1;
        }

        /* 环境金尘微尘画布（全屏背景层） */
        #dust-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        /* 核心内容视口 */
        .main-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 5;
        }

        /* 顶部匾额 */
        .temple-tablet {
            margin-top: 6vh; text-align: center; pointer-events: none;
        }
        .temple-tablet h1 { margin: 0; font-size: 26px; color: #f3e1b9; letter-spacing: 12px; font-weight: bold; text-shadow: 0 4px 10px #000; }
        .temple-tablet p { margin: 8px 0 0 0; font-size: 13px; color: #a69580; letter-spacing: 2px; opacity: 0.8; }

        /* ==================== ☯️ 中央自转太极法盘 ==================== */
        .taichi-wrap {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px; display: flex; align-items: center; justify-content: center;
        }
        .taichi-disc {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(to right, #14100e 50%, #f7f4eb 50%);
            border: 2px solid #d4b26f;
            box-shadow: 0 0 30px rgba(212, 178, 111, 0.3);
            position: relative;
        }
        .taichi-disc::before, .taichi-disc::after {
            content: ''; position: absolute; width: 45px; height: 45px; border-radius: 50%; left: 50%; transform: translateX(-50%);
        }
        .taichi-disc::before { top: 0; background: #14100e; }
        .taichi-disc::after { bottom: 0; background: #f7f4eb; }
        .dot-white, .dot-black {
            position: absolute; width: 12px; height: 12px; border-radius: 50%; left: 50%; transform: translateX(-50%);
        }
        .dot-white { top: 16.5px; background: #f7f4eb; }
        .dot-black { bottom: 16.5px; background: #14100e; }

        /* ==================== 🪵 底部功能面板与香炉一体化方案 ==================== */
        .bottom-zone {
            position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 440px; display: flex; flex-direction: column; align-items: center;
        }

        /* 专门渲染香炉与香烟的局部画布（绝不越界，绝不挡太极） */
        #smoke-canvas {
            width: 200px; height: 120px; pointer-events: none; margin-bottom: -10px;
        }

        /* 红木沉浸式控制台 */
        .altar-panel {
            width: 100%; background: linear-gradient(to top, #120c09 0%, #221811 100%);
            border: 1px solid rgba(84,57,19,0.5); border-top: 3px solid #d4b26f;
            border-radius: 6px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        .altar-tabs { width: 100%; display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-item {
            flex: 1; background: rgba(10, 8, 6, 0.7); border: 1px solid #4a3b2c;
            color: #9c8c7a; padding: 11px 0; font-size: 13px; font-weight: bold;
            cursor: pointer; border-radius: 4px; transition: all 0.2s;
        }
        .tab-item.active {
            background: linear-gradient(135deg, #7c221a, #a83128);
            color: #fcf9f2; border-color: #f3e1b9;
        }
        
        .altar-content { width: 100%; display: none; }
        .altar-content.active { display: block; }

        .gold-action-btn {
            background: linear-gradient(135deg, #9a7432, #f3e1b9); color: #17110a;
            border: none; width: 100%; padding: 13px; font-size: 15px; font-weight: bold;
            border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .gold-action-btn:active { transform: scale(0.99); }
        
        .wish-input {
            width: 100%; padding: 11px; background: rgba(10, 8, 7, 0.9);
            border: 1px solid #4a3b2c; color: #fff; text-align: center;
            font-size: 14px; border-radius: 4px; margin-bottom: 10px; outline: none;
        }

        /* 功德文字上浮样式 */
        .merit-float {
            position: absolute; color: #f3e1b9; font-size: 15px; font-weight: bold;
            pointer-events: none; left: 50%; bottom: 42%;
            animation: meritRise 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 2px 5px #000; z-index: 20;
        }
        @keyframes meritRise {
            0% { transform: translate(-50%, 0); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(-50%, -80px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="temple-bg"></div>

    <canvas id="dust-canvas"></canvas>

    <div class="main-container">
        <div class="temple-tablet">
            <h1>三清大殿 · 乾坤灵境</h1>
            <p>☯ 叩击混元法盘 · 听磬荡涤内耗 ☯</p>
        </div>

        <div class="taichi-wrap">
            <div class="taichi-disc" id="taichi-node">
                <div class="dot-white"></div>
                <div class="dot-black"></div>
            </div>
        </div>

        <div class="bottom-zone">
            <canvas id="smoke-canvas"></canvas>

            <div class="altar-panel">
                <div class="altar-tabs">
                    <button class="tab-item active" onclick="switchTab('pane-incense', 0)">敬奉心香</button>
                    <button class="tab-item" onclick="switchTab('pane-breath', 1)">功态吐纳</button>
                    <button class="tab-item" onclick="switchTab('pane-wish', 2)">文疏祈愿</button>
                </div>

                <div id="pane-incense" class="altar-content active">
                    <button class="gold-action-btn" onclick="actionBurnIncense()">敬奉清香 · 鸣磬静心</button>
                </div>
                <div id="pane-breath" class="altar-content">
                    <button class="gold-action-btn" id="breath-toggle-btn" onclick="toggleBreathMode()">随大殿磁场引导开始吐纳</button>
                </div>
                <div id="pane-wish" class="altar-content">
                    <input type="text" id="wish-box" class="wish-input" placeholder="案前静心写下所求疏文（如：断绝内耗）" maxlength="16">
                    <button class="gold-action-btn" onclick="submitWishAltar()">化疏文归于烟霞</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dustCanvas = document.getElementById('dust-canvas');
        const dustCtx = dustCanvas.getContext('2d');
        const smokeCanvas = document.getElementById('smoke-canvas');
        const smokeCtx = smokeCanvas.getContext('2d');
        const taichiNode = document.getElementById('taichi-node');

        let breathMode = false;
        let breathTicker = 0;
        let isIncenseActive = false;
        let globalTimer = 0;
        let smokeParticles = [];
        let dustParticles = [];

        // 初始化全屏微尘画布
        function initDust() {
            dustCanvas.width = window.innerWidth;
            dustCanvas.height = window.innerHeight;
            dustParticles = [];
            for(let i=0; i<30; i++) {
                dustParticles.push({
                    x: Math.random() * dustCanvas.width,
                    y: Math.random() * dustCanvas.height,
                    r: Math.random() * 1.2 + 0.4,
                    alpha: Math.random() * 0.3 + 0.1,
                    speedY: Math.random() * 0.06 + 0.02
                });
            }
        }

        // 定死局部香炉画布的尺寸
        smokeCanvas.width = 200;
        smokeCanvas.height = 120;

        // ==================== 🔊 纯音频 Web Audio 铜磬 ====================
        let audioCtx = null;
        function playGongSound(freq) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let time = audioCtx.currentTime;
                let components = [freq, freq * 1.53, freq * 1.98];
                let gains = [0.2, 0.1, 0.03];
                components.forEach((f, i) => {
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, time);
                    gain.gain.setValueAtTime(gains[i], time); gain.gain.exponentialRampToValueAtTime(0.0001, time + 4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(time); osc.stop(time + 4);
                });
            } catch(e) {}
        }

        // 精确绘制处于局部画布正中央的独立香炉
        function drawStaticBurner() {
            const cx = 100; // 画布横向中心
            const cy = 95;  // 画布底部位置

            if (isIncenseActive) {
                // 三柱香
                smokeCtx.fillStyle = '#7a4235';
                smokeCtx.fillRect(cx - 5, cy - 25, 2, 25);
                smokeCtx.fillRect(cx, cy - 30, 2, 30);
                smokeCtx.fillRect(cx + 5, cy - 25, 2, 25);
                // 香头微芒
                smokeCtx.fillStyle = '#ff5500';
                smokeCtx.fillRect(cx - 5, cy - 26, 2, 2);
                smokeCtx.fillRect(cx, cy - 31, 2, 2);
                smokeCtx.fillRect(cx + 5, cy - 26, 2, 2);
            }

            // 香炉本体
            smokeCtx.save();
            smokeCtx.fillStyle = '#1a1310';
            smokeCtx.strokeStyle = '#cca462';
            smokeCtx.lineWidth = 1.5;
            smokeCtx.beginPath();
            smokeCtx.arc(cx, cy, 24, 0, Math.PI, false);
            smokeCtx.lineTo(cx - 24, cy - 10);
            smokeCtx.lineTo(cx + 24, cy - 10);
            smokeCtx.closePath(); smokeCtx.fill(); smokeCtx.stroke();

            // 双炉耳
            smokeCtx.beginPath(); smokeCtx.arc(cx - 24, cy - 4, 5, 0, Math.PI*2); smokeCtx.stroke();
            smokeCtx.beginPath(); smokeCtx.arc(cx + 24, cy - 4, 5, 0, Math.PI*2); smokeCtx.stroke();
            smokeCtx.restore();
        }

        function actionBurnIncense() {
            playGongSound(210);
            isIncenseActive = true;
            spawnFloatText("心香三柱 · 供奉神明 ☯️");
            
            for(let i=0; i<35; i++) {
                smokeParticles.push({
                    x: 100 + (Math.random() - 0.5) * 8,
                    y: 65,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: -Math.random() * 0.5 - 0.3,
                    alpha: 0.8,
                    size: Math.random() * 4 + 3
                });
            }
        }

        function submitWishAltar() {
            let field = document.getElementById('wish-box');
            let txt = field.value.trim();
            if (!txt) return;
            playGongSound(285);
            spawnFloatText(`疏文焚化：${txt} 🏮`);
            field.value = '';
        }

        function toggleBreathMode() {
            breathMode = !breathMode;
            const btn = document.getElementById('breath-toggle-btn');
            if (!breathMode) {
                btn.innerText = "随大殿磁场引导开始吐纳";
            }
        }

        function spawnFloatText(txt) {
            let el = document.createElement('div');
            el.className = 'merit-float'; el.innerText = txt;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function switchTab(id, idx) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.altar-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item')[idx].classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        // ==================== ✨ 核心动力学循环 ====================
        function loop() {
            globalTimer += 1;

            // 1. 太极转动
            taichiNode.style.transform = `rotate(${globalTimer * 0.3}deg)`;

            // 2. 环境微尘渲染
            dustCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
            for(let i=0; i<dustParticles.length; i++) {
                let d = dustParticles[i];
                d.y -= d.speedY;
                if(d.y < 0) d.y = dustCanvas.height;
                dustCtx.fillStyle = `rgba(243, 225, 185, ${d.alpha})`;
                dustCtx.beginPath(); dustCtx.arc(d.x, d.y, d.r, 0, Math.PI*2); dustCtx.fill();
            }

            // 3. 吐纳引导
            if (breathMode) {
                breathTicker += 0.03;
                document.getElementById('breath-toggle-btn').innerText = 
                    Math.sin(breathTicker) > 0 ? "✨ 吸气... 汲取天地乾坤灵气" : "💨 呼气... 吐出心头尘埃杂念";
            }

            // 4. 香炉与烟雾渲染（全部锁在烟雾画布内）
            smokeCtx.clearRect(0, 0, smokeCanvas.width, smokeCanvas.height);
            drawStaticBurner();

            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                let p = smokeParticles[i];
                p.x += p.vx + Math.sin(p.y * 0.05) * 0.12;
                p.y += p.vy;
                p.alpha -= 0.0035;

                if(p.alpha <= 0 || p.y < 0) {
                    smokeParticles.splice(i, 1);
                    continue;
                }

                smokeCtx.save();
                smokeCtx.globalAlpha = p.alpha;
                let g = smokeCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                g.addColorStop(0, 'rgba(243, 225, 185, 0.2)');
                g.addColorStop(1, 'rgba(197, 160, 89, 0)');
                smokeCtx.fillStyle = g;
                smokeCtx.beginPath(); smokeCtx.arc(p.x, p.y, p.size * 2, 0, Math.PI*2); smokeCtx.fill();
                smokeCtx.restore();
            }

            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', initDust);
        initDust();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
