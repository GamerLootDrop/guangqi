<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECHOES 星河 · MVP演示</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #030106; font-family: 'Noto Serif SC', serif; color: #fff; user-select: none; }

        /* =========================================
           视觉层：真实视频挂载 + 星雾滤镜
           ========================================= */
        /* 实际项目中，这里替换为 4K 暗红星云循环视频 */
        .video-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; opacity: 0.6; mix-blend-mode: screen;
        }
        
        /* 兜底星云渐变（在视频加载前或无视频时提供高级感底色） */
        .nebula-fallback {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #080311 50%, #030106 100%);
        }

        /* 3D 第一视角星辰穿梭画布 */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0.8; }

        /* =========================================
           UI 层：完美复刻截图的高级质感
           ========================================= */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
        
        /* 顶部栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        
        /* 左上角：个人铭牌 */
        .user-badge {
            background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(10px); border-radius: 8px; border-left: 3px solid #d4af37; padding: 12px 18px; display: flex; flex-direction: column; gap: 4px;
        }
        .user-badge .title { font-size: 0.65rem; color: #888; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif; }
        .user-badge .name { font-size: 0.9rem; color: #ddd; letter-spacing: 1px; }

        /* 右上角：资产与充值 */
        .asset-box { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .coin-display { font-size: 1rem; color: #d4af37; font-family: sans-serif; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .recharge-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #ccc; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }
        .recharge-btn:active { background: rgba(255,255,255,0.1); }

        /* 中央文案 */
        .center-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%;
        }
        .center-text h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .center-text p { font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

        /* 底部操作栏 */
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        
        .report-btn {
            background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px 24px; border-radius: 6px; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .report-btn:active { background: rgba(212, 175, 55, 0.1); }

        .cast-btn {
            background: linear-gradient(135deg, #7b1fa2, #4a148c); border: none; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 15px rgba(123, 31, 162, 0.4); transition: 0.3s;
        }
        .cast-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="nebula-fallback"></div>
    
    <canvas id="starfield"></canvas>

    <div class="ui-layer">
        <div class="top-bar">
            <div class="user-badge">
                <span class="title">Soul Tracking</span>
                <span class="name">天鹅座 · 暗物质</span>
            </div>
            <div class="asset-box">
                <div class="coin-display">💰 270</div>
                <button class="recharge-btn" onclick="alert('唤起充值面板')">测试充值</button>
            </div>
        </div>

        <div class="center-text">
            <h1>你已经很棒了，不必步步紧逼。</h1>
            <p>星河不渡杂音 · 唯有灵魂共鸣</p>
        </div>

        <div class="bottom-bar">
            <button class="report-btn" onclick="alert('生成并保存专属灵魂轨迹海报')">生成灵魂报告</button>
            <button class="cast-btn" onclick="playChimeAndCast()">把执念散作星辰</button>
        </div>
    </div>

    <audio id="spaceDrone" loop src="https://actions.google.com/sounds/v1/ambiences/space_room_hum.ogg"></audio>

    <script>
        // ==========================================
        // 核心一：第一视角 3D 星空引擎 (优雅、失重感)
        // ==========================================
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, cx, cy;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2; cy = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        const stars = [];
        const STAR_COUNT = 400; // 星星数量
        const WARP_SPEED = 0.5; // 极慢的飞行速度，营造静谧感

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * 2000;
                this.y = (Math.random() - 0.5) * 2000;
                this.z = Math.random() * 2000;
                this.pz = this.z;
                // 模拟蓝矮星和红巨星的色温
                this.color = Math.random() > 0.8 ? 'rgba(213, 175, 255, ' : 'rgba(255, 255, 255, ';
            }
            update() {
                this.z -= WARP_SPEED;
                if (this.z < 1) { this.z = 2000; this.x = (Math.random() - 0.5) * 2000; this.y = (Math.random() - 0.5) * 2000; this.pz = this.z; }
            }
            draw() {
                const fov = 300;
                const scale = fov / (fov + this.z);
                const x2d = this.x * scale + cx;
                const y2d = this.y * scale + cy;
                const size = Math.max(0.1, (1 - this.z / 2000) * 2.5);
                const alpha = 1 - (this.z / 2000);

                ctx.beginPath();
                ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + alpha + ')';
                
                // 柔和发光效果
                ctx.shadowBlur = size * 4;
                ctx.shadowColor = this.color.replace(', ', ', 0.8)');
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for(let i=0; i<STAR_COUNT; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // ==========================================
        // 核心二：灵魂交互与声音 (MVP 临时音效方案)
        // ==========================================
        let audioInit = false;
        const bgm = document.getElementById('spaceDrone');

        function initAudio() {
            if(audioInit) return;
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("等待用户交互以播放背景音"));
            audioInit = true;
        }

        // 监听全局第一次点击，唤醒宇宙底噪
        document.body.addEventListener('touchstart', initAudio, {once:true});
        document.body.addEventListener('click', initAudio, {once:true});

        function playChimeAndCast() {
            initAudio();
            // 真实商业环境：这里应该直接 new Audio('大教堂混响颂钵.mp3').play();
            // 这里用代码模拟一声带有物理回响的清脆敲击
            alert("[MVP演示]：此处播放一声极具混响的“空灵颂钵音”，并弹出文字输入框，引导用户写下执念。");
        }
    </script>
</body>
</html>
