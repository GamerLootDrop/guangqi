<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 3D坠入感测试</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010205; }
        canvas { display: block; }
        /* 临时的氛围提示词 */
        #hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(200, 190, 170, 0.6); font-family: "Noto Serif SC", serif; 
            letter-spacing: 4px; font-weight: 300; pointer-events: none; 
            animation: pulseFade 6s forwards; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        @keyframes pulseFade {
            0% { opacity: 0; filter: blur(4px); }
            30% { opacity: 1; filter: blur(0px); }
            80% { opacity: 1; filter: blur(0px); }
            100% { opacity: 0; filter: blur(4px); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hint">滑动鼠标 · 感受宇宙的深渊</div>
    
    <script>
        // 1. 初始化 3D 宇宙场景
        const scene = new THREE.Scene();
        // 🌟 核心技巧：加入“宇宙深空雾化”，远处的星星会自然隐去，而不是生硬地出现
        scene.fog = new THREE.FogExp2(0x010205, 0.0008);

        // 2. 架设摄像机（也就是用户的眼睛）
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.z = 1000;

        // 3. 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 让手机端也极度清晰
        document.body.appendChild(renderer.domElement);

        // 4. 创造 8000 颗星辰（2D时代这会导致手机死机，但在 3D 引擎下轻轻松松）
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 8000; 
        const posArray = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i++) {
            // 把星星随机散布在一个极其广阔的 3D 立体空间里
            posArray[i] = (Math.random() - 0.5) * 4000;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // 调制星星的质感：微微发光的粒子
        const starsMaterial = new THREE.PointsMaterial({
            size: 1.5,
            color: 0xebdcc1, // 偏暖的恒星光芒
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending // 叠加发光特效
        });

        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        // 5. 监听用户的灵魂轨迹（鼠标/手指）
        let mouseX = 0; let mouseY = 0;
        let targetX = 0; let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });
        document.addEventListener('touchmove', (event) => {
            mouseX = (event.touches[0].clientX - windowHalfX);
            mouseY = (event.touches[0].clientY - windowHalfY);
        }, { passive: true });

        // 6. 宇宙运转引擎（动画循环）
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            // 🌟 核心突破 1：坠入感。让整个星团在 Z 轴上不断向你扑面而来
            starMesh.position.z += 1.5; 
            if(starMesh.position.z > 2000) {
                starMesh.position.z = 0; // 无缝循环坠入
            }

            // 🌟 核心突破 2：悬浮呼吸。给星空加上极慢的自转
            starMesh.rotation.y += 0.0003;
            starMesh.rotation.x += 0.0001;

            // 🌟 核心突破 3：带有物理惯性的丝滑视角跟随（不再生硬）
            targetX = mouseX * 0.0005;
            targetY = mouseY * 0.0005;
            camera.rotation.y += 0.05 * (targetX - camera.rotation.y);
            camera.rotation.x += 0.05 * (targetY - camera.rotation.x);

            renderer.render(scene, camera);
        }
        animate();

        // 7. 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
