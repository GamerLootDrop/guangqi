<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        /* ==================== 🪐 全局视口防溢出 ==================== */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0c0806;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            user-select: none;
            /* 激活三维空间感知 */
            perspective: 1000px;
        }

        /* 🌌 视差容器：这是让画面动起来的关键 */
        .parallax-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 1;
        }

        /* 🖼️ 优化后的超清大殿背景层 */
        .temple-photo-bg {
            position: absolute; 
            /* 故意让背景图比视口大一圈（四周各多出10%），防止鼠标晃动时边缘露白 */
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            /* 图像平滑渲染，解决你提到的模糊问题 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            /* 暗调烘托与对比度优化 */
            filter: brightness(0.8) contrast(1.1) saturate(0.95);
            /* 极其平滑的动态跟随过渡 */
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
            z-index: 1;
        }

        /* 🌫️ 真实环境微动烟雾层 */
        .incense-smoke-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 60%, rgba(255,255,255,0.05), transparent 60%);
            mix-blend-mode: screen; pointer-events: none; z-index: 2;
            animation: smokeDrift 12s ease-in-out infinite alternate;
        }
        @keyframes smokeDrift {
            0% { transform: scale(1) translate(0, 0); opacity: 0.4; filter: blur(2px); }
            100% { transform: scale(1.1) translate(-20px, -30px); opacity: 0.7; filter: blur(5px); }
        }

        /* ==================== ☯️ 完美融入环境的中央法盘 ==================== */
        .floating-taichi-aura {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 160px; z-index: 10; pointer-events: none;
            /* 让法盘也带有淡淡的立体悬浮阴影 */
            filter: drop-shadow(0 0 30px rgba(254, 235, 191, 0.45));
            transition: transform 0.1s linear;
        }
        .taichi-disk-svg {
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 80%), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="none" stroke="%23bda16a" stroke-width="1.5"/><path d="M50 2A48 48 0 0 1 50 98A24 24 0 0 1 50 50A24 24 0 0 0 50 2" fill="%23140e0b"/><path d="M50 2A48 48 0 0 0 50 98A24 24 0 0 0 50 50A24 24 0 0 1 50 2" fill="%23fdfaf4"/><circle cx="50" cy="26" r="5" fill="%23fdfaf4"/><circle cx="50" cy="74" r="5" fill="%23140e0b"/></svg>') no-repeat center center;
            background-size: contain; border-radius: 50%;
            animation: slowSpin 30s linear infinite;
        }
        @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ==================== 🎛️ 悬浮高档磨砂中控台 ==================== */
        .glass-console-panel {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            width: 88vw; max-width: 420px; z-index: 20;
            background: rgba(15, 11, 9, 0.78);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(189, 161, 106, 0.3); border-top: 3px solid #bda16a;
            border-radius: 8px; padding: 18px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .panel-header { text-align: center; margin-bottom: 14px; }
        .panel-header h2 { margin: 0; font-size: 20px; color: #f3e1b9; letter-spacing: 6px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .panel-header p { margin: 4px 0 0 0; font-size: 11px; color: #a69580; letter-spacing: 2px; opacity: 0.7; }

        .tab-menu-row { width: 100%; display: flex; gap: 6px; margin-bottom: 14px; }
        .tab-item-btn {
            flex: 1; background: rgba(5, 4, 3, 0.5); border: 1px solid rgba(189, 161, 106, 0.2);
            color: #bfae9c; padding: 9px 0; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 3px; transition: all 0.2s; font-family: inherit;
        }
        .tab-item-btn.active {
            background: linear-gradient(135deg, #7c1f17, #a62d22); color: #fff; border-color: #bda16a;
        }
        
        .tab-content-pane { width: 100%; display: none; }
        .tab-content-pane.active { display: block; }

        .gold-action-btn {
            background: linear-gradient(135deg, #a67f3c, #f7e4be); color: #1c130e;
            border: none; width: 100%; padding: 13px; font-size: 13px; font-weight: bold;
            border-radius: 3px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            letter-spacing: 3px; font-family: inherit; transition: all 0.1s;
        }
        .gold-action-btn:active { transform: scale(0.97); filter: brightness(0.9); }
        
        .wish-input-element {
            width: 100%; padding: 10px; background: rgba(5, 4, 3, 0.85);
            border: 1px solid #4a3b2c; color: #fff; text-align: center;
            font-size: 12px; border-radius: 3px; margin-bottom: 12px; outline: none; font-family: inherit;
        }

        .ethereal-toast {
            position: absolute; color: #f7e4be; font-size: 15px; font-weight: bold;
            pointer-events: none; left: 50%; top: 25%; transform: translateX(-50%);
            animation: riseAndFade 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 2px 10px #000, 0 0 15px rgba(254, 235, 191, 0.7); z-index: 100;
        }
        @keyframes riseAndFade {
            0% { transform: translate(-50%, 40px); opacity: 0; }
            12% { opacity: 1; }
            100% { transform: translate(-50%, -50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="parallax-container">
        <div class="temple-photo-bg" id="dynamic-bg"></div>
        <div class="incense-smoke-layer"></div>
    </div>

    <div class="floating-taichi-aura" id="dynamic-taichi">
        <div class="taichi-disk-svg"></div>
    </div>

    <div class="glass-console-panel">
        <div class="panel-header">
            <h2>三清大殿 · 乾坤灵境</h2>
            <p>☯ 虔诚敬奉 · 鸣磬修心 ☯</p>
        </div>

        <div class="tab-menu-row">
            <button class="tab-item-btn active" onclick="switchConsoleTab('p-incense', 0)">敬奉心香</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-breath', 1)">功态吐纳</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-wish', 2)">文疏祈愿</button>
        </div>

        <div id="p-incense" class="tab-content-pane active">
            <button class="gold-action-btn" onclick="ringTempleBell()">叩击混元法盘 · 鸣磬静心</button>
        </div>
        <div id="p-breath" class="tab-content-pane">
            <button class="gold-action-btn" id="breath-btn" onclick="triggerBreathExercise()">开始跟随法盘磁场吐纳</button>
        </div>
        <div id="p-wish" class="tab-content-pane">
            <input type="text" id="wish-box" class="wish-input-element" placeholder="在案前至诚书写心中所求（如：远离内耗）" maxlength="16">
            <button class="gold-action-btn" onclick="sendWish疏文()">化文疏归于烟霞</button>
        </div>
    </div>

    <script>
        const bg = document.getElementById('dynamic-bg');
        const taichi = document.getElementById('dynamic-taichi');

        // 🏎️ 核心交互：监听鼠标或触控轨迹，计算3D视差位移
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            const moveY = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            
            // 背景图反向轻微移动并带有微弱旋转，拉深空间感
            bg.style.transform = `translate(${moveX * -25}px, ${moveY * -25}px) scale(1.02) rotateX(${moveY * -1}deg) rotateY(${moveX * 1}deg)`;
            
            // 太极法盘作为前景，正向稍微移动，形成前后错落的 3D 立体视觉
            taichi.style.transform = `translate(calc(-50% + ${moveX * 15}px), calc(-50% + ${moveY * 15}px))`;
        });

        // 以下为基础互动逻辑
        let breathTimer = null;
        let breathState = 0; 
        let audioCtx = null;

        function playBellSound(frequency) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let now = audioCtx.currentTime;
                let components = [frequency, frequency * 1.52, frequency * 1.95];
                let volumes = [0.25, 0.08, 0.03];
                
                components.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    gainNode.gain.setValueAtTime(volumes[i], now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 5);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 5);
                });
            } catch(e) {}
        }

        function ringTempleBell() {
            playBellSound(215);
            showEtherealToast("鸣磬一下 · 内耗消散 ☯️");
        }

        function sendWish疏文() {
            let input = document.getElementById('wish-box');
            let text = input.value.trim();
            if(!text) return;
            playBellSound(270);
            showEtherealToast(`文疏已化，随风化煞：${text} 🏮`);
            input.value = '';
        }

        function triggerBreathExercise() {
            const btn = document.getElementById('breath-btn');
            if (breathTimer) {
                clearInterval(breathTimer); breathTimer = null;
                btn.innerText = "开始跟随法盘磁场吐纳"; return;
            }
            breathState = 0;
            btn.innerText = "✨ 吸气... 汲取大殿纯阳之气";
            breathTimer = setInterval(() => {
                breathState = 1 - breathState;
                btn.innerText = breathState === 0 ? "✨ 吸气... 汲取大殿纯阳之气" : "💨 呼气... 排出体内焦虑烦杂";
            }, 4000);
        }

        function showEtherealToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'ethereal-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        document.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        function switchConsoleTab(paneId, index) {
            document.querySelectorAll('.tab-item-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item-btn')[index].classList.add('active');
            document.getElementById(paneId).classList.add('active');
        }
    </script>
</body>
</html>
