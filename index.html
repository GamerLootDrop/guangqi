<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        /* ==================== 🪐 核心标准盒模型与重置 ==================== */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0a0604; color: #f7ede2;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            overflow: hidden; user-select: none;
        }

        /* 纯CSS古典渐变背景，全设备100%渲染 */
        .temple-space {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 35%, #1f140e 0%, #050302 85%);
            z-index: 1;
        }

        /* 主弹性布局视口，强制组件各就各位 */
        .app-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 6vh 0 5vh 0;
            z-index: 10;
        }

        /* ==================== 匾额区 ==================== */
        .tablet-header { text-align: center; pointer-events: none; }
        .tablet-header h1 { margin: 0; font-size: 26px; color: #f3e1b9; letter-spacing: 10px; font-weight: bold; text-shadow: 0 4px 10px #000; }
        .tablet-header p { margin: 8px 0 0 0; font-size: 13px; color: #a69580; letter-spacing: 2px; opacity: 0.8; }

        /* ==================== ☯️ 中央自转太极法盘区 ==================== */
        .stage-center {
            flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .taichi-halo {
            position: relative; width: 140px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(243, 225, 185, 0.2) 0%, rgba(0,0,0,0) 70%);
        }
        .taichi-core {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(to right, #14100e 50%, #f7f4eb 50%);
            border: 2px solid #d4b26f; box-shadow: 0 0 25px rgba(212, 178, 111, 0.3);
            position: relative;
            animation: taichiSpin 20s linear infinite; /* 原生CSS自转 */
        }
        .taichi-core::before, .taichi-core::after {
            content: ''; position: absolute; width: 45px; height: 45px; border-radius: 50%; left: 50%; transform: translateX(-50%);
        }
        .taichi-core::before { top: 0; background: #14100e; }
        .taichi-core::after { bottom: 0; background: #f7f4eb; }
        .dot-w, .dot-b { position: absolute; width: 12px; height: 12px; border-radius: 50%; left: 50%; transform: translateX(-50%); }
        .dot-w { top: 16.5px; background: #f7f4eb; }
        .dot-b { bottom: 16.5px; background: #14100e; }

        @keyframes taichiSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ==================== 🪵 底部功能区（一体化无缝嵌套） ==================== */
        .bottom-workspace {
            width: 90%; max-width: 440px; display: flex; flex-direction: column; align-items: center;
        }

        /* 🔮 纯 CSS 绘图：绝对不移位、不遮挡的立体香炉组件 */
        .burner-component {
            width: 120px; height: 65px; position: relative; margin-bottom: -4px;
            display: flex; justify-content: center; align-items: flex-end; pointer-events: none;
        }
        /* 独立控制的三柱青香 */
        .joss-sticks {
            position: absolute; bottom: 35px; width: 30px; height: 40px;
            display: flex; justify-content: space-between; visibility: hidden;
        }
        .joss-sticks.active { visibility: visible; }
        .stick { width: 2px; height: 100%; background: #7a4235; position: relative; }
        .stick::after {
            content: ''; position: absolute; top: -2px; left: -1px; width: 4px; height: 4px;
            background: #ff6600; border-radius: 50%; box-shadow: 0 0 6px #ff6600;
        }
        /* 香炉双耳及主体 */
        .burner-body {
            width: 70px; height: 36px; background: linear-gradient(to bottom, #2b1f1a, #140f0d);
            border: 1.5px solid #cca462; border-radius: 0 0 35px 35px; position: relative;
        }
        .burner-body::before, .burner-body::after {
            content: ''; position: absolute; top: 4px; width: 10px; height: 12px;
            border: 1.5px solid #cca462; border-radius: 50%;
        }
        .burner-body::before { left: -11px; } .burner-body::after { right: -11px; }

        /* 沉浸式红木案台面板 */
        .altar-console {
            width: 100%; background: linear-gradient(to top, #110a08 0%, #241913 100%);
            border: 1px solid rgba(84,57,19,0.6); border-top: 3px solid #d4b26f;
            border-radius: 6px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .altar-tabs { width: 100%; display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; background: rgba(10, 8, 6, 0.7); border: 1px solid #4a3b2c;
            color: #9c8c7a; padding: 11px 0; font-size: 13px; font-weight: bold;
            cursor: pointer; border-radius: 4px; transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #7c221a, #a83128); color: #fcf9f2; border-color: #f3e1b9;
        }
        
        .tab-pane { width: 100%; display: none; }
        .tab-pane.active { display: block; }

        .action-gold-btn {
            background: linear-gradient(135deg, #9a7432, #f3e1b9); color: #17110a;
            border: none; width: 100%; padding: 13px; font-size: 14px; font-weight: bold;
            border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .action-gold-btn:active { transform: scale(0.99); }
        
        .wish-box-input {
            width: 100%; padding: 11px; background: rgba(12, 9, 8, 0.95);
            border: 1px solid #4a3b2c; color: #fff; text-align: center;
            font-size: 14px; border-radius: 4px; margin-bottom: 12px; outline: none;
        }

        /* 飘落/上浮文字样式 */
        .toast-float {
            position: absolute; color: #f3e1b9; font-size: 15px; font-weight: bold;
            pointer-events: none; left: 50%; top: 22%; transform: translateX(-50%);
            animation: textFadeUp 2s ease-out forwards;
            text-shadow: 0 2px 6px #000; z-index: 100;
        }
        @keyframes textFadeUp {
            0% { transform: translate(-50%, 20px); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(-50%, -40px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="temple-space"></div>

    <div class="app-viewport">
        <div class="tablet-header">
            <h1>三清大殿 · 乾坤灵境</h1>
            <p>☯ 纯正本心 · 鸣磬清幽 ☯</p>
        </div>

        <div class="stage-center">
            <div class="taichi-halo">
                <div class="taichi-core">
                    <div class="dot-w"></div>
                    <div class="dot-b"></div>
                </div>
            </div>
        </div>

        <div class="bottom-workspace">
            <div class="burner-component">
                <div class="joss-sticks" id="js-node">
                    <div class="stick"></div>
                    <div class="stick" style="height: 115%;"></div>
                    <div class="stick"></div>
                </div>
                <div class="burner-body"></div>
            </div>

            <div class="altar-console">
                <div class="altar-tabs">
                    <button class="tab-btn active" onclick="switchTab('p-incense', 0)">敬奉心香</button>
                    <button class="tab-btn" onclick="switchTab('p-breath', 1)">功态吐纳</button>
                    <button class="tab-btn" onclick="switchTab('p-wish', 2)">文疏祈愿</button>
                </div>

                <div id="p-incense" class="tab-pane active">
                    <button class="action-gold-btn" onclick="triggerBurnIncense()">敬奉清香 · 鸣磬静心</button>
                </div>
                <div id="p-breath" class="tab-pane">
                    <button class="action-gold-btn" id="breath-btn" onclick="triggerBreath()">随大殿磁场引导开始吐纳</button>
                </div>
                <div id="p-wish" class="tab-pane">
                    <input type="text" id="wish-input-node" class="wish-box-input" placeholder="案前静心写下所求疏文（如：断绝内耗）" maxlength="16">
                    <button class="action-gold-btn" onclick="triggerWish()">化疏文归于烟霞</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let breathInterval = null;
        let breathState = 0; 
        let audioCtx = null;

        // ==================== 🔊 纯音频 Web Audio 铜磬 ====================
        function playGong(freq) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let time = audioCtx.currentTime;
                let components = [freq, freq * 1.53, freq * 1.98];
                let gains = [0.2, 0.08, 0.02];
                components.forEach((f, i) => {
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, time);
                    gain.gain.setValueAtTime(gains[i], time); gain.gain.exponentialRampToValueAtTime(0.0001, time + 4);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(time); osc.stop(time + 4);
                });
            } catch(e) {}
        }

        // ==================== 业务逻辑控制 ====================
        function triggerBurnIncense() {
            playGong(210);
            document.getElementById('js-node').classList.add('active');
            createToast("心香三柱 · 供奉神明 ☯️");
        }

        function triggerWish() {
            let input = document.getElementById('wish-input-node');
            let val = input.value.trim();
            if(!val) return;
            playGong(285);
            createToast(`疏文焚化：${val} 🏮`);
            input.value = '';
        }

        function triggerBreath() {
            const btn = document.getElementById('breath-btn');
            if (breathInterval) {
                clearInterval(breathInterval);
                breathInterval = null;
                btn.innerText = "随大殿磁场引导开始吐纳";
                return;
            }
            
            breathState = 0;
            btn.innerText = "✨ 吸气... 汲取天地乾坤灵气";
            breathInterval = setInterval(() => {
                breathState = 1 - breathState;
                btn.innerText = breathState === 0 ? "✨ 吸气... 汲取天地乾坤灵气" : "💨 呼气... 吐出心头尘埃杂念";
            }, 4000);
        }

        function createToast(text) {
            let t = document.createElement('div');
            t.className = 'toast-float'; t.innerText = text;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function switchTab(paneId, idx) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[idx].classList.add('active');
            document.getElementById(paneId).classList.add('active');
        }
    </script>
</body>
</html>
