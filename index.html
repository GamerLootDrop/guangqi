<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 灵魂悬浮测试</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #080c16 0%, #010205 100%); }
        canvas { display: block; }
        #hint {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            color: rgba(166, 152, 122, 0.5); font-family: "Noto Serif SC", serif; 
            letter-spacing: 4px; font-size: 13px; pointer-events: none; text-align: center;
            line-height: 2;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hint">手不动时星河缓转<br>轻轻滑动 拨动群星</div>
    
    <script>
        // 1. 创建星空舞台
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010205, 0.0006);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.z = 500; // 调整眼睛到星系中心的距离

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 🌟 核心升级：动态用代码画一个“发光的霓虹小圆点”作为星星贴图，告别死白硬点
        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            // 渐变发光
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(200, 230, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(100, 150, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        // 2. 建造带有色彩梯度的星云球体
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000; // 降低数量，提升单颗星的质感
        const positions = new Float32Array(starsCount * 3);
        const colors = new Float32Array(starsCount * 3);

        // 预设三种高级疗愈色调：淡暖金、极光蓝、深邃紫
        const palette = [
            new THREE.Color(0xfef08a), // 温暖星光
            new THREE.Color(0xa5f3fc), // 极光幽蓝
            new THREE.Color(0xe9d5ff)  // 疗愈淡紫
        ];

        for(let i = 0; i < starsCount; i++) {
            // 🌟 改变散布逻辑：不再是方块，而是把星星塞进一个半径 600 的大球体里，形成包裹感
            const u = Math.random(); const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = 250 + Math.random() * 350; // 让中心空出来，人仿佛悬浮在正中央

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            // 随机分配颜色
            const pickedColor = palette[Math.floor(Math.random() * palette.length)];
            colors[i * 3] = pickedColor.r;
            colors[i * 3 + 1] = pickedColor.g;
            colors[i * 3 + 2] = pickedColor.b;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // 星星材质材质
        const starsMaterial = new THREE.PointsMaterial({
            size: 4.5, // 放大星星，使其能被看清和点击
            map: createStarTexture(),
            vertexColors: true, // 启用随机色彩
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        // 将群星打包放入宇宙
        const starGroup = new THREE.Group();
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        starGroup.add(starMesh);
        scene.add(starGroup);

        // 3. 丝滑的手指拨动与阻尼算法
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationVelocity = { x: 0.0008, y: 0.001 }; // 初始极慢的自转速度

        function onPointerDown(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            previousMousePosition = { x: clientX, y: clientY };
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - previousMousePosition.x;
            const deltaY = clientY - previousMousePosition.y;

            // 手指带动的旋转速度
            rotationVelocity.y = deltaX * 0.003;
            rotationVelocity.x = deltaY * 0.003;

            previousMousePosition = { x: clientX, y: clientY };
        }

        function onPointerUp() { isDragging = false; }

        // 监听鼠标与手机触屏
        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchstart', onPointerDown, { passive: true });
        window.addEventListener('touchmove', onPointerMove, { passive: true });
        window.addEventListener('touchend', onPointerUp);

        // 4. 渲染循环
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            // 🌟 核心修正：应用自转。如果不去用手划，它会永远以极其温柔的底速自己旋转
            if (!isDragging) {
                // 阻尼回弹：用手松开后，速度慢慢减弱，最后恢复到微弱的自动旋转状态
                rotationVelocity.x += (0.0002 - rotationVelocity.x) * 0.02;
                rotationVelocity.y += (0.0005 - rotationVelocity.y) * 0.02;
            }

            starGroup.rotation.y += rotationVelocity.y;
            starGroup.rotation.x += rotationVelocity.x;

            // 星星微微的呼吸闪烁感（随时间轻微变动大小）
            const time = clock.getElapsedTime();
            starsMaterial.size = 4.0 + Math.sin(time * 2) * 1.0;

            renderer.render(scene, camera);
        }
        animate();

        // 5. 自适应屏幕
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
