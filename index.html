<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乾坤心流 · 赛博道观</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0A0807; color: #E6E1D4;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            overflow: hidden; user-select: none;
        }

        /* 核心沉浸式画布 */
        #temple-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            cursor: grab;
        }
        #temple-canvas:active { cursor: grabbing; }

        /* 全息 HUD 控制中枢 */
        .hud-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 460px; z-index: 10;
            background: rgba(37, 31, 26, 0.75);
            border: 1px solid rgba(214, 175, 55, 0.3);
            border-radius: 20px; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 15px rgba(214, 175, 55, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        /* 殿宇切换Tab */
        .hud-nav { display: flex; gap: 8px; margin-bottom: 12px; }
        .hud-btn {
            flex: 1; background: rgba(26, 21, 18, 0.6); border: 1px solid #4A3E35;
            color: #A09586; padding: 10px 5px; border-radius: 12px; cursor: pointer;
            font-size: 13px; font-weight: bold; transition: all 0.2s;
        }
        .hud-btn.active {
            background: linear-gradient(135deg, #8C251E, #B3362D);
            color: #FFF; border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(140, 37, 30, 0.5);
        }

        /* 交互内容区 */
        .hud-content { min-height: 140px; display: none; }
        .hud-content.active { display: block; }
        .hud-title { font-size: 15px; color: #D4AF37; text-align: center; margin: 0 0 10px 0; letter-spacing: 1px; }

        /* 按钮与输入框 */
        .action-btn {
            background: linear-gradient(135deg, #A17E36, #D4AF37); color: #1A1613;
            border: none; padding: 10px 20px; border-radius: 20px; width: 100%;
            font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(214, 175, 55, 0.2);
        }
        .action-btn:active { transform: scale(0.98); }
        .hud-input {
            width: 100%; padding: 10px; background: rgba(15, 12, 10, 0.8);
            border: 1px solid #4A3E35; border-radius: 10px; color: #FFF;
            font-size: 13px; margin-bottom: 10px; text-align: center;
        }

        /* 飘字功德特效 */
        .merit-text {
            position: absolute; color: #D4AF37; font-weight: bold; font-size: 18px;
            pointer-events: none; animation: floatUp 1.2s ease-out forwards;
            text-shadow: 0 0 8px rgba(214, 175, 55, 0.6); z-index: 5;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
        }

        /* 顶部法坛公告 */
        .top-banner {
            position: absolute; top: 20px; text-align: center; width: 100%; z-index: 10;
            pointer-events: none;
        }
        .top-banner h1 { margin: 0; font-size: 22px; color: #D4AF37; letter-spacing: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .top-banner p { margin: 5px 0 0 0; font-size: 12px; color: #8A7B66; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-banner">
        <h1>三清大殿 · 赛博灵境</h1>
        <p>🔮 拖动屏幕旋转法坛 · 点击浮空太极手敲颂钵 🔮</p>
    </div>

    <canvas id="temple-canvas"></canvas>

    <div class="hud-container">
        <div class="hud-nav">
            <button class="hud-btn active" onclick="switchHall('sub-temple', 0)">赛博香火</button>
            <button class="hud-btn" onclick="switchHall('sub-breath', 1)">灵魂吐纳</button>
            <button class="hud-btn" onclick="switchHall('sub-wall', 2)">功德祈福</button>
        </div>

        <div id="sub-temple" class="hud-content active">
            <p style="font-size: 12px; color: #A09586; text-align: center; margin-top: 5px; line-height: 1.6;">
                点击屏幕中央的浮空法球或下方按钮，可敲响道医铜磬。静听音声共振，清除内心贪、嗔、痴、慢、疑。
            </p>
            <button class="action-btn" onclick="triggerIncenseClick()">供奉心香 · 鸣磬一下</button>
        </div>

        <div id="sub-breath" class="hud-content">
            <div class="hud-title" id="breath-status">🧘 准备开启声波吸心调理</div>
            <p style="font-size: 11px; color: #A09586; text-align: center; margin-bottom: 12px;" id="breath-desc">
                跟随太极法球的规律扩缩（4秒一周期）调整呼吸。
            </p>
            <button class="action-btn" id="breath-ctrl-btn" onclick="toggleBreathSession()">开启深度声波洗心</button>
        </div>

        <div id="sub-wall" class="hud-content">
            <input type="text" id="wish-input" class="hud-input" placeholder="输入您的祈福愿望（如：2026顺利上岸）" maxlength="15">
            <button class="action-btn" onclick="submitWish()">将愿望化为金色粒子挂壁</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('temple-canvas');
        const ctx = canvas.getContext('2d');

        // 核心运行状态
        let width, height;
        let angleX = 0; // 左右视角旋转偏角
        let isDragging = false;
        let startX = 0;
        let taijiScale = 1.0; // 太极球基础放大系数
        let breathMode = false; // 是否开启呼吸吐纳
        let breathTime = 0;

        // 模拟粒子系统（全息弹幕、祈福粒子、香火烟雾）
        let particles = [];

        // 初始化画布尺寸
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ==================== 🛠️ 核心3D视效渲染引擎 ====================
        function drawFrame() {
            ctx.clearRect(0, 0, width, height);

            // 1. 绘制宇宙深邃背景与浩瀚星光
            ctx.fillStyle = '#0D0A08';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制远景大殿神台柱子（利用数学公式计算3D透视）
            ctx.save();
            ctx.translate(width / 2, height / 2);
            
            // 绘制远景神龛光晕
            let gradient = ctx.createRadialGradient(angleX * 0.3, -50, 10, angleX * 0.3, -50, 300);
            gradient.addColorStop(0, 'rgba(214, 175, 55, 0.15)');
            gradient.addColorStop(0.5, 'rgba(140, 37, 30, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(-width, -height, width * 2, height * 2);

            // 绘制3D质感石柱（随拖拽产生平移，营造身临其境的空间错觉）
            drawColumn(-220 + angleX * 0.6, -250, 40, 500);
            drawColumn(180 + angleX * 0.6, -250, 40, 500);
            
            ctx.restore();

            // 2. 核心：动态渲染正中央的 3D 浮空太极法球
            if (breathMode) {
                breathTime += 0.03;
                // 呼吸状态下，法球伴随正弦曲线平滑扩缩
                taijiScale = 1.0 + Math.sin(breathTime) * 0.18;
                // 实时更新文字指引
                const statusTxt = document.getElementById('breath-status');
                if (Math.sin(breathTime) > 0) {
                    statusTxt.innerText = "✨ 深深吸气... 聆听频率上升";
                    statusTxt.style.color = "#D4AF37";
                } else {
                    statusTxt.innerText = "💨 缓缓呼气... 排出负面磁场";
                    statusTxt.style.color = "#4169E1";
                }
            } else {
                taijiScale = 1.0;
            }
            
            drawTaijiSphere(width / 2 + angleX * 0.2, height / 2 - 60, 85 * taijiScale);

            // 3. 渲染粒子群（包含香火粒子、功德流动粒子）
            updateAndDrawParticles();

            requestAnimationFrame(drawFrame);
        }

        // 绘制大殿神柱函数
        function drawColumn(x, y, w, h) {
            ctx.fillStyle = '#1A130E';
            ctx.fillRect(x, y, w, h);
            // 柱子暗金镶边
            ctx.fillStyle = 'rgba(214, 175, 55, 0.2)';
            ctx.fillRect(x, y, 3, h);
            ctx.fillRect(x + w - 3, y, 3, h);
        }

        // 纯Canvas实时计算绘制 3D 呼吸太极球
        function drawTaijiSphere(cX, cY, r) {
            ctx.save();
            ctx.translate(cX, cY);
            
            // 法球外层光圈全息特效
            ctx.beginPath();
            ctx.arc(0, 0, r + 15, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(214, 175, 55, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 自动慢旋转
            let timeRotation = (Date.now() / 6000) % (Math.PI * 2);
            ctx.rotate(timeRotation);

            // 绘制太极双鱼大盘
            // 阴鱼（黑）
            ctx.beginPath();
            ctx.arc(0, 0, r, -Math.PI/2, Math.PI/2, false);
            ctx.fillStyle = '#1E1815';
            ctx.fill();
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 阳鱼（白）
            ctx.beginPath();
            ctx.arc(0, 0, r, Math.PI/2, -Math.PI/2, false);
            ctx.fillStyle = '#E6E1D4';
            ctx.fill();
            ctx.stroke();

            // 鱼眼弧度细化
            ctx.beginPath();
            ctx.arc(0, r/2, r/2, 0, Math.PI*2);
            ctx.fillStyle = '#1E1815';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, -r/2, r/2, 0, Math.PI*2);
            ctx.fillStyle = '#E6E1D4';
            ctx.fill();

            // 鱼眼点
            ctx.beginPath();
            ctx.arc(0, r/2, r/6, 0, Math.PI*2);
            ctx.fillStyle = '#E6E1D4';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, -r/2, r/6, 0, Math.PI*2);
            ctx.fillStyle = '#1E1815';
            ctx.fill();

            ctx.restore();
        }

        // 粒子动力学控制
        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                if (p.type === 'text') {
                    ctx.fillStyle = '#D4AF37';
                    ctx.font = '12px "PingFang SC"';
                    ctx.fillText(p.text, p.x, p.y);
                } else {
                    ctx.fillStyle = p.color || '#D4AF37';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 生成金烟粒子
        function createSmoke(x, y, count = 5) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: -Math.random() * 2 - 1,
                    size: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.01,
                    type: 'dot',
                    color: '#D4AF37'
                });
            }
        }

        // ==================== 🔊 WEB AUDIO 声学合成引擎 ====================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playBowlSound(freq = 220, duration = 3.0) {
            initAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.99, audioCtx.currentTime + duration);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // ==================== 🎮 殿宇控制与交互逻辑 ====================
        
        // 拖拽旋转视角逻辑（身临其境的核心）
        canvas.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let dx = e.clientX - startX;
            angleX += dx * 0.5; // 控制旋转灵敏度
            if(angleX > 180) angleX = 180;
            if(angleX < -180) angleX = -180;
            startX = e.clientX;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        // 适配手机端触控
        canvas.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let dx = e.touches[0].clientX - startX;
            angleX += dx * 0.6;
            if(angleX > 180) angleX = 180;
            if(angleX < -180) angleX = -180;
            startX = e.touches[0].clientX;
        });
        canvas.addEventListener('touchend', () => isDragging = false);

        // 点击太极球手敲击大磬
        canvas.addEventListener('click', (e) => {
            let cX = width / 2 + angleX * 0.2;
            let cY = height / 2 - 60;
            let distance = Math.sqrt((e.clientX - cX)**2 + (e.clientY - cY)**2);
            if (distance < 90 * taijiScale) {
                triggerIncenseClick();
            }
        });

        // 统一敲击入口
        function triggerIncenseClick() {
            playBowlSound(280, 2.5); // 沉浸式法磬音效
            createSmoke(width / 2 + angleX * 0.2, height / 2 - 60, 15); // 生成烟雾粒子
            popMeritText("功德 +1" );
        }

        // 弹出功德文字动效
        function popMeritText(text) {
            let div = document.createElement('div');
            div.className = 'merit-text';
            div.innerText = text;
            div.style.left = (width / 2 + (Math.random() - 0.5) * 60) + 'px';
            div.style.top = (height / 2 - 120) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        // 控制面板大殿切换
        function switchHall(hallId, index) {
            document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.hud-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.hud-btn')[index].classList.add('active');
            document.getElementById(hallId).classList.add('active');
            playBowlSound(350, 0.4); // 切换音效
        }

        // 开启/关闭呼吸调理
        function toggleBreathSession() {
            const btn = document.getElementById('breath-ctrl-btn');
            breathMode = !breathMode;
            if (breathMode) {
                btn.innerText = "结束气场调理";
                btn.style.background = "linear-gradient(135deg, #4169E1, #1E90FF)";
                breathTime = 0;
            } else {
                btn.innerText = "开启深度声波洗心";
                btn.style.background = "linear-gradient(135deg, #A17E36, #D4AF37)";
                document.getElementById('breath-status').innerText = "🧘 准备开启声波吸心调理";
                document.getElementById('breath-status').style.color = "#D4AF37";
            }
        }

        // 祈福墙挂牌提交
        function submitWish() {
            let input = document.getElementById('wish-input');
            let val = input.value.trim();
            if (!val) { alert("请写下您的心中所求"); return; }

            playBowlSound(440, 1.2); // 清脆挂上音效
            popMeritText("祈福成功 ✨");

            // 将愿望化为漂浮在空中的金色弹幕粒子
            for (let i = 0; i < 1; i++) {
                particles.push({
                    x: Math.random() * (width - 100) + 50,
                    y: height / 2 - 180 + (Math.random() - 0.5) * 60,
                    vx: -0.4 - Math.random() * 0.4,
                    vy: -0.1 - Math.random() * 0.2,
                    alpha: 1,
                    decay: 0.003,
                    type: 'text',
                    text: `🏮 缘主祈愿：${val}`
                });
            }
            input.value = '';
        }

        // 启动主循环渲染
        requestAnimationFrame(drawFrame);
    </script>
</body>
</html>
