<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css" />
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050302;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            user-select: none;
        }

        /* 🚪 入场过渡幕布 */
        #entry-curtain {
            position: fixed; inset: 0;
            background-color: #050302;
            z-index: 9999;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            color: #bda16a; font-size: 16px; letter-spacing: 6px;
            text-shadow: 0 0 10px rgba(189, 161, 106, 0.5);
        }

        /* 🌌 3D 虚拟现实渲染视口 */
        #viewer-3d-stage {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* 🌫️ 空间中叠加的流动香烟薄雾 */
        .ambient-smoke-env {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 70%);
            mix-blend-mode: screen; pointer-events: none; z-index: 2;
            animation: smokeDrift 14s ease-in-out infinite alternate;
        }
        @keyframes smokeDrift {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; filter: blur(3px); }
            100% { transform: scale(1.1) translate(-20px, -15px); opacity: 0.6; filter: blur(6px); }
        }

        /* ==================== 🎛️ 悬浮磨砂中控台 ==================== */
        .glass-console-panel {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            width: 88vw; max-width: 420px; z-index: 20;
            background: rgba(15, 11, 9, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(189, 161, 106, 0.3); border-top: 3px solid #bda16a;
            border-radius: 8px; padding: 18px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: opacity 0.5s ease; /* 加入透明度过渡动画，用于拖拽时隐藏 */
        }

        .panel-header { text-align: center; margin-bottom: 14px; }
        .panel-header h2 { margin: 0; font-size: 20px; color: #f3e1b9; letter-spacing: 6px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .panel-header p { margin: 4px 0 0 0; font-size: 11px; color: #a69580; letter-spacing: 2px; opacity: 0.7; }

        .tab-menu-row { width: 100%; display: flex; gap: 6px; margin-bottom: 14px; }
        .tab-item-btn {
            flex: 1; background: rgba(5, 4, 3, 0.5); border: 1px solid rgba(189, 161, 106, 0.2);
            color: #bfae9c; padding: 9px 0; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 3px; transition: all 0.2s; font-family: inherit;
        }
        .tab-item-btn.active {
            background: linear-gradient(135deg, #7c1f17, #a62d22); color: #fff; border-color: #bda16a;
        }
        
        .tab-content-pane { width: 100%; display: none; }
        .tab-content-pane.active { display: block; }

        .gold-action-btn {
            background: linear-gradient(135deg, #a67f3c, #f7e4be); color: #1c130e;
            border: none; width: 100%; padding: 13px; font-size: 13px; font-weight: bold;
            border-radius: 3px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            letter-spacing: 3px; font-family: inherit; transition: all 0.1s;
        }
        .gold-action-btn:active { transform: scale(0.97); filter: brightness(0.9); }
        
        .wish-input-element {
            width: 100%; padding: 10px; background: rgba(5, 4, 3, 0.85);
            border: 1px solid #4a3b2c; color: #fff; text-align: center;
            font-size: 12px; border-radius: 3px; margin-bottom: 12px; outline: none; font-family: inherit;
        }

        .ethereal-toast {
            position: absolute; color: #f7e4be; font-size: 15px; font-weight: bold;
            pointer-events: none; left: 50%; top: 25%; transform: translateX(-50%);
            animation: riseAndFade 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 2px 10px #000, 0 0 15px rgba(254, 235, 191, 0.7); z-index: 100;
        }
        @keyframes riseAndFade {
            0% { transform: translate(-50%, 40px); opacity: 0; }
            12% { opacity: 1; }
            100% { transform: translate(-50%, -50px); opacity: 0; }
        }

        /* 💡 引导提示 */
        .vr-guide-tips {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; color: #bda16a;
            border: 1px solid rgba(189,161,106,0.3); z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="entry-curtain">心生万物 · 境由心转</div>

    <audio id="ambient-audio" loop preload="auto">
        <source src="ambient.mp3" type="audio/mpeg">
    </audio>
    <audio id="bell-audio" preload="auto">
        <source src="bell.mp3" type="audio/mpeg">
    </audio>

    <div class="vr-guide-tips">🖱️ 按住鼠标左键并拖拽，可360°环顾神殿</div>

    <div id="viewer-3d-stage"></div>
    <div class="ambient-smoke-env"></div>

    <div class="glass-console-panel">
        <div class="panel-header">
            <h2>三清大殿 · 乾坤灵境</h2>
            <p>☯ 🔧 VR 3D 沉浸交互版 ☯</p>
        </div>

        <div class="tab-menu-row">
            <button class="tab-item-btn active" onclick="switchConsoleTab('p-incense', 0)">敬奉心香</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-breath', 1)">功态吐纳</button>
            <button class="tab-item-btn" onclick="switchConsoleTab('p-wish', 2)">文疏祈愿</button>
        </div>

        <div id="p-incense" class="tab-content-pane active">
            <button class="gold-action-btn" onclick="ringTempleBell()">叩击混元法盘 · 鸣磬静心</button>
        </div>
        <div id="p-breath" class="tab-content-pane">
            <button class="gold-action-btn" id="breath-btn" onclick="triggerBreathExercise()">开始跟随法盘磁场吐纳</button>
        </div>
        <div id="p-wish" class="tab-content-pane">
            <input type="text" id="wish-box" class="wish-input-element" placeholder="在案前至诚书写心中所求（如：远离内耗）" maxlength="16">
            <button class="gold-action-btn" onclick="sendWish疏文()">化文疏归于烟霞</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.js"></script>

    <script>
        // 🚪 页面加载完成后，幕布缓缓消散
        window.addEventListener('load', () => {
            setTimeout(() => {
                const curtain = document.getElementById('entry-curtain');
                curtain.style.opacity = '0';
                setTimeout(() => curtain.remove(), 3000); // 彻底移除DOM
            }, 1000); // 留出1秒的静心时间
        });

        // 🔮 初始化 WebGL 3D 空间
        const viewer = new PhotoSphereViewer.Viewer({
            container: 'viewer-3d-stage',
            panorama: 'bg.jpg', // 自动加载同级目录下的超清原图
            caption: '三清大殿',
            mousewheel: true,  
            moveSpeed: 1.2,    
            defaultYaw: 0,
            defaultPitch: 0,
            zoomRange: [10, 100],
            defaultZoomLvl: 30, 
            navbar: false      
        });

        // 🎛️ 人动则 UI 隐：拖拽视角时隐藏中控台
        let uiTimeout = null;
        const consolePanel = document.querySelector('.glass-console-panel');
        viewer.addEventListener('position-updated', () => {
            consolePanel.style.opacity = '0.15'; // 转动视角时，UI 变半透明
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                consolePanel.style.opacity = '1'; // 停止转动 1.5 秒后，UI 恢复
            }, 1500);
        });

        // 🔊 原生代码生成的铜磬声（作为没有音频文件时的备用方案）
        let audioCtx = null;
        function playFallbackBellSound(frequency) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let now = audioCtx.currentTime;
                let components = [frequency, frequency * 1.52, frequency * 1.95];
                let volumes = [0.25, 0.08, 0.03];
                
                components.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now);
                    gainNode.gain.setValueAtTime(volumes[i], now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 5);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 5);
                });
            } catch(e) {}
        }

        // 🔊 鸣磬主逻辑
        function ringTempleBell() {
            let bell = document.getElementById('bell-audio');
            let ambient = document.getElementById('ambient-audio');

            // 尝试播放真实的铜磬录音
            if (bell.readyState >= 2) {
                bell.currentTime = 0;
                bell.play().catch(() => playFallbackBellSound(215)); // 播放失败则用代码生成声音兜底
            } else {
                playFallbackBellSound(215); // 没有文件则直接用代码生成声音
            }

            // 顺便唤醒背景白噪音（因为浏览器要求有用户交互才能播放音频）
            if(ambient.paused && ambient.readyState >= 2) {
                ambient.volume = 0.15; // 背景音设置得极其轻微
                ambient.play().catch(e => console.log("等待用户交互以播放背景音"));
            }

            showEtherealToast("鸣磬一下 · 内耗消散 ☯️");
        }

        function sendWish疏文() {
            let input = document.getElementById('wish-box');
            let text = input.value.trim();
            if(!text) return;
            
            ringTempleBell(); // 提交祈愿时也触发一声铜磬
            showEtherealToast(`文疏已化，随风化煞：${text} 🏮`);
            input.value = '';
        }

        // 💨 吐纳逻辑保持不变
        let breathTimer = null;
        let breathState = 0; 
        function triggerBreathExercise() {
            const btn = document.getElementById('breath-btn');
            if (breathTimer) {
                clearInterval(breathTimer); breathTimer = null;
                btn.innerText = "开始跟随法盘磁场吐纳"; return;
            }
            breathState = 0;
            btn.innerText = "✨ 吸气... 汲取大殿纯阳之气";
            breathTimer = setInterval(() => {
                breathState = 1 - breathState;
                btn.innerText = breathState === 0 ? "✨ 吸气... 汲取大殿纯阳之气" : "💨 呼气... 排出体内焦虑烦杂";
            }, 4000);
        }

        function showEtherealToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'ethereal-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        // 恢复音频上下文
        document.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        // 切换面板
        function switchConsoleTab(paneId, index) {
            document.querySelectorAll('.tab-item-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item-btn')[index].classList.add('active');
            document.getElementById(paneId).classList.add('active');
        }
    </script>
</body>
</html>
