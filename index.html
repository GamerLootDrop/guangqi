<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 礁湖星云终极治愈版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #030509;
            font-family: \"Noto Serif SC\", \"SimSun\", serif;
            user-select: none; -webkit-user-select: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 顶部商业化看板 */
        .commercial-header {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; padding: 10px 15px;
            background: rgba(6, 10, 18, 0.65); border: 1px solid rgba(166, 152, 122, 0.2);
            border-radius: 8px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: #e6dedf; font-size: 0.85rem; letter-spacing: 1px;
        }
        .wallet-zone { display: flex; align-items: center; gap: 10px; }
        .coin-num { color: #ffd700; font-weight: bold; text-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
        .charge-btn {
            background: linear-gradient(135deg, #ffd700, #b8860b); border: none;
            color: #000; padding: 3px 12px; font-size: 0.75rem; font-weight: bold;
            border-radius: 12px; cursor: pointer; transition: all 0.3s;
        }
        .charge-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(255,215,0,0.4); }

        .ambient-container {
            position: absolute; top: 32%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 500px; text-align: center; z-index: 2; pointer-events: none;
        }
        .breathing-text {
            font-size: 1.15rem; color: rgba(230, 220, 200, 0.9); line-height: 2.4;
            letter-spacing: 4px; font-weight: 300;
            animation: spacePulse 15s infinite ease-in-out;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
        }
        @keyframes spacePulse {
            0%, 100% { opacity: 0; transform: translateY(5px); filter: blur(1px); }
            8%, 92% { opacity: 0.9; transform: translateY(0); filter: blur(0); }
        }

        .guide-hint {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            font-size: 0.78rem; color: rgba(180, 170, 150, 0.5); letter-spacing: 2px; z-index: 2;
            pointer-events: none; text-align: center; width: 90%; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .bottom-bar {
            position: absolute; bottom: 35px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; z-index: 3;
        }
        .action-btn {
            background: rgba(10, 16, 26, 0.6); border: 1px solid rgba(143, 133, 112, 0.3);
            color: rgba(224, 215, 195, 0.85); padding: 9px 20px; font-size: 0.82rem; border-radius: 20px;
            cursor: pointer; letter-spacing: 2px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s ease; font-family: inherit;
        }
        .action-btn:hover { border-color: rgba(217, 201, 165, 0.6); color: rgba(242, 233, 213, 0.95); }

        /* 弹出共鸣框 */
        .resonance-box {
            position: absolute; z-index: 10; padding: 24px;
            background: rgba(7, 11, 20, 0.95); border: 1px solid rgba(166, 152, 122, 0.4);
            border-radius: 8px; color: rgba(224, 215, 195, 0.95);
            font-size: 0.92rem; line-height: 1.8; letter-spacing: 1.5px;
            width: 340px; max-width: 90vw; pointer-events: auto;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.85), inset 0 0 15px rgba(166,152,122,0.15);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: none;
        }
        .resonance-box.active { opacity: 1; transform: scale(1); display: block; }
        
        .resonance-box.vip-style {
            background: rgba(25, 10, 35, 0.95); border: 2px solid #da70d6;
            box-shadow: 0 0 25px rgba(218, 112, 214, 0.4), inset 0 0 15px rgba(218, 112, 214, 0.2);
        }
        .vip-tag { color: #ffd700; font-weight: bold; font-size: 0.75rem; border: 1px solid #ffd700; padding: 0px 4px; border-radius: 3px; margin-right: 5px; }
        .vip-text { color: #fffbc8 !important; font-weight: bold; text-shadow: 0 0 6px rgba(255, 251, 200, 0.5); }
        .resonance-box .author-sign { display: block; text-align: right; margin-top: 12px; font-size: 0.75rem; color: rgba(166, 152, 122, 0.65); border-bottom: 1px dashed rgba(166, 152, 122, 0.2); padding-bottom: 8px; }

        .social-reply-zone { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .reply-input-mini { width: 100%; background: rgba(5, 8, 15, 0.6); border: 1px solid rgba(166, 152, 122, 0.3); border-radius: 4px; padding: 6px 10px; color: #e6dedf; font-size: 0.8rem; outline: none; font-family: inherit; resize: none; }
        .reply-btn-bar { display: flex; justify-content: space-between; align-items: center; }
        .reply-action-btn { background: rgba(143, 133, 112, 0.2); border: 1px solid rgba(143, 133, 112, 0.4); color: rgba(224, 215, 195, 0.85); padding: 3px 10px; font-size: 0.75rem; border-radius: 3px; cursor: pointer; transition: all 0.3s; }
        .reply-action-btn:hover { background: rgba(143, 133, 112, 0.4); color: #fff; }
        .reply-list-container { max-height: 100px; overflow-y: auto; font-size: 0.78rem; color: rgba(224, 215, 195, 0.7); margin-top: 6px; padding-top: 4px; border-top: 1px solid rgba(166,152,122,0.1); }
        .single-reply-item { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.03); word-break: break-all; }

        /* 发射执念面板 */
        .overlay-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 10, 0.85); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .panel-content { position: relative; width: 88%; max-width: 460px; background: rgba(12, 17, 28, 0.95); border: 1px solid rgba(153, 140, 115, 0.3); border-radius: 12px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .panel-hint { font-size: 0.8rem; color: rgba(153, 140, 115, 0.6); margin-bottom: 12px; letter-spacing: 1px; }
        .whisper-area { width: 100%; height: 110px; background: rgba(5, 8, 15, 0.7); border: 1px solid rgba(153, 140, 115, 0.2); border-radius: 6px; padding: 14px; color: rgba(230, 222, 207, 0.95); font-size: 0.92rem; line-height: 1.7; resize: none; outline: none; font-family: inherit; margin-bottom: 12px; }
        .vip-checkbox-zone { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: rgba(224, 215, 195, 0.85); font-size: 0.82rem; cursor: pointer; }
        .panel-buttons { display: flex; justify-content: flex-end; gap: 14px; }
        .panel-btn { padding: 8px 22px; font-size: 0.82rem; border-radius: 4px; cursor: pointer; border: 1px solid transparent; letter-spacing: 2px; font-family: inherit; transition: all 0.3s; }
        .panel-btn.cancel { background: transparent; border-color: rgba(153, 140, 115, 0.3); color: rgba(153, 140, 115, 0.7); }
        .panel-btn.confirm { background: rgba(143, 133, 112, 0.25); border-color: rgba(143, 133, 112, 0.4); color: rgba(230, 222, 207, 0.9); }
        .panel-btn.confirm:hover { background: rgba(143, 133, 112, 0.4); color: #fff; }

        @media (max-width: 768px) {
            .bottom-bar { padding: 0 24px; bottom: 30px; }
            .action-btn { padding: 8px 16px; font-size: 0.78rem; }
            .resonance-box.mobile-center { position: absolute !important; width: 85% !important; left: 50% !important; top: 50% !important; transform: translate(-50%, -50%) scale(1) !important; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="commercial-header">
        <div id="userSignDisplay">宇宙代号：加载中...</div>
        <div class="wallet-zone">
            <span>💰 星币: <span class="coin-num" id="userCoins">0</span></span>
            <button class="charge-btn" onclick="chargeCoins(event)">测试充值</button>
        </div>
    </div>

    <div class="guide-hint" id="guideHint">轻触或拖拽星河 · 唤醒尘封的远方执念</div>
    
    <div class="ambient-container">
        <div class="breathing-text" id="breathingText">
            闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。
        </div>
    </div>

    <div class="resonance-box" id="resonanceBox" onclick="event.stopPropagation()"></div>

    <div class="bottom-bar">
        <button class="action-btn" id="audioBtn" onclick="toggleSpaceAudio(event)">轻触 · 听泉</button>
        <button class="action-btn" onclick="openInputPanel(event)">把执念散作星辰</button>
    </div>

    <div class="overlay-panel" id="inputPanel" onclick="closeInputPanel()">
        <div class="panel-content" onclick="event.stopPropagation()">
            <button class="reply-action-btn" style="position: absolute; right: 15px; top: 15px; padding: 2px 6px;" onclick="closeInputPanel()">✕</button>
            <div class="panel-hint" id="userSignHint">你的宇宙代号：【计算中...】</div>
            <textarea class="whisper-area" id="whisperInput" placeholder="写下一句话，打碎揉进星河里。此地无人知晓你，亦无人能评判你..."></textarea>
            <label class="vip-checkbox-zone">
                <input type="checkbox" id="vipPublishCheck">
                <span>开启【炫彩流星发言特效】（消耗 10 星币，高亮且带极光外框）</span>
            </label>
            <div class="panel-buttons">
                <button class="panel-btn cancel" onclick="closeInputPanel()">收回思绪</button>
                <button class="panel-btn confirm" onclick="submitWhisper(event)">发射执念</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 基础钱包与代号初始化 ---
        let starCoins = parseInt(localStorage.getItem('star_coins_balance') || '0');
        document.getElementById('userCoins').innerText = starCoins;

        function chargeCoins(e) {
            if(e) e.stopPropagation();
            starCoins += 100;
            localStorage.setItem('star_coins_balance', starCoins.toString());
            document.getElementById('userCoins').innerText = starCoins;
            alert("💳 模拟测试充值成功：+100 星币！快去发射炫彩特效皮肤吧！");
        }

        const localRepliesStorage = {};
        function getOrCreateUniverseSign() {
            let sign = localStorage.getItem('universe_soul_sign');
            if (!sign) {
                const prefix = ["仙女座", "猎户座", "英仙座", "天鹅座", "飞马座", "巨蟹座", "天琴座", "大熊座", "半人马", "麒麟座"];
                const suffix = ["慢中子", "虚粒子", "坍缩态", "偏振光", "白矮星", "红移线", "微波背景", "暗物质", "静止质量", "星流"];
                sign = `${prefix[Math.floor(Math.random() * prefix.length)]} · ${suffix[Math.floor(Math.random() * suffix.length)]}`;
                localStorage.setItem('universe_soul_sign', sign);
            }
            return sign;
        }
        const myUniverseSign = getOrCreateUniverseSign();
        document.getElementById('userSignDisplay').innerText = `🌌 代号：${myUniverseSign}`;

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if(!isMobile) document.getElementById('guideHint').innerText = "拖拽可360°转动视角 · 鼠标点击璀璨星辰唤醒宇宙共鸣";

        // --- 2. Three.js 3D 礁湖星云渲染引擎 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030509, 0.0006);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.z = 700;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const universeGroup = new THREE.Group();
        scene.add(universeGroup);

        // 🌟 动态画出高斯柔和模糊的气体烟雾粒子贴图
        function createGasTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            gradient.addColorStop(0.2, 'rgba(240, 240, 255, 0.5)');
            gradient.addColorStop(0.5, 'rgba(180, 180, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }
        const gasTexture = createGasTexture();

        // 🌟 动态画出带光芒的星星贴图
        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.15, 'rgba(235, 245, 255, 0.9)');
            gradient.addColorStop(0.4, 'rgba(130, 180, 255, 0.25)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        const starTexture = createStarTexture();

        // 🌟 重塑算法：按照礁湖星云（Lagoon Nebula）的色彩架构渲染气态云层
        const nebulaCount = 600; 
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPositions = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);

        for(let i = 0; i < nebulaCount; i++) {
            // 构筑一个有核心、向两翼延伸的扭曲星云盘
            const u = Math.random();
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.pow(u, 1.8) * 800; 

            const x = Math.cos(angle) * radius + (Math.random() - 0.5) * 100;
            const y = Math.sin(angle) * radius * 0.5 + (Math.random() - 0.5) * 100; // 扁平化气流
            const z = (Math.random() - 0.5) * 300 - (radius * 0.2);

            nebulaPositions[i * 3] = x;
            nebulaPositions[i * 3 + 1] = y;
            nebulaPositions[i * 3 + 2] = z;

            // 完全模拟截图：中间炽白破裂、右上方冷冽幽蓝紫、左下方炽热暗金
            let r = 0, g = 0, b = 0;
            if (radius < 120) {
                // 核心区：高亮炽白、淡青色（截图中心的撕裂白光）
                r = 0.9; g = 0.95; b = 1.0;
            } else if (x > 0 && y > -100) {
                // 右上翼：冷烈幽蓝、璀璨紫红（截图右上角的色彩）
                r = 0.6 + Math.random() * 0.3; 
                g = 0.2 + Math.random() * 0.2; 
                b = 0.9 + Math.random() * 0.1;
            } else {
                // 左下翼：暗金、 Terracotta  terracotta 炽热 Terracotta  Terracotta 橙红（截图左下角）
                r = 0.9 + Math.random() * 0.1;
                g = 0.45 + Math.random() * 0.2;
                b = 0.1 + Math.random() * 0.1;
            }

            nebulaColors[i * 3] = r;
            nebulaColors[i * 3 + 1] = g;
            nebulaColors[i * 3 + 2] = b;
        }

        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));

        const nebulaMaterial = new THREE.PointsMaterial({
            size: isMobile ? 180 : 260, // 庞大的粒子层层重叠，在加色法下就会融合成丝滑的烟雾气态
            map: gasTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.35,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const nebulaPoints = new THREE.Points(nebulaGeom, nebulaMaterial);
        universeGroup.add(nebulaPoints);

        // --- 3. 互动执念星辰容器群 ---
        const interactiveStars = [];
        const starContainer = new THREE.Group();
        universeGroup.add(starContainer);

        // 结构化代入原本的文本故事种子
        const localSeeds = [
            ["今年31岁被裁员了，瞒着父母每天在图书馆假装上班，好累。", "天琴座 · 虚粒子", false],
            ["喜欢了他整整四年，今天看到他在朋友圈发了和别人的婚纱照，祝你幸福。", "巨蟹座 · 坍缩态", false],
            ["努力了三年还是考研失败，感觉自己是个废物，对不起爸妈。", "飞马座 · 慢中子", false],
            ["大城市房租又涨了，每天加班到深夜，不知道坚持的意义是什么。", "英仙座 · 偏振光", false],
            ["这是一条极具商业尊贵排面的VIP炫彩流星特权回响示例！", "仙王座 · 氪金大佬", true]
        ];

        function createWhisperStarMesh(id, text, sign, isUser = false, isVip = false) {
            // 将星星打散在星云包裹之中
            const angle = Math.random() * Math.PI * 2;
            const radius = 150 + Math.random() * 400;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius * 0.6 + (Math.random() - 0.5) * 50;
            const z = (Math.random() - 0.5) * 200;

            // 动效参数
            const pulseSpeed = 1 + Math.random() * 2;
            const phase = Math.random() * Math.PI;

            // VIP星更大、呈粉紫色，普通星呈暖金色或淡蓝色
            let colorStr = isVip ? 0xda70d6 : (isUser ? 0xf2e2a1 : 0xb8ad96);
            let size = isVip ? 22 : (isUser ? 15 : (8 + Math.random() * 6));

            const mat = new THREE.SpriteMaterial({
                map: starTexture,
                color: colorStr,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, y, z);
            sprite.scale.set(size, size, 1);

            // 绑定完整的业务数据
            sprite.userData = { id, text, sign, isVip, isUser, pulseSpeed, phase, baseSize: size };
            starContainer.add(sprite);
            interactiveStars.push(sprite);
        }

        // 铺设 120 颗灵魂执念故事星辰
        for(let i = 0; i < 120; i++) {
            const seed = localSeeds[i % localSeeds.length];
            createWhisperStarMesh(3000 + i, seed[0], seed[1], false, seed[2]);
        }

        // --- 4. 强大的闭环交互算法（同步原功能） ---
        let isDragging = false;
        let totalMoveDist = 0;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationVelocity = { x: 0.0001, y: 0.0003 }; // 安详静止慢转速度

        function onPointerDown(e) {
            isDragging = true; totalMoveDist = 0;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            previousMousePosition = { x: clientX, y: clientY };
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - previousMousePosition.x;
            const deltaY = clientY - previousMousePosition.y;

            rotationVelocity.y = deltaX * (isMobile ? 0.004 : 0.0025);
            rotationVelocity.x = deltaY * (isMobile ? 0.004 : 0.0025);

            previousMousePosition = { x: clientX, y: clientY };
            totalMoveDist += Math.hypot(deltaX, deltaY);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onPointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            // 判断是滑动视角还是轻触点击
            if (totalMoveDist < (isMobile ? 8 : 5)) {
                const clientX = previousMousePosition.x;
                const clientY = previousMousePosition.y;
                
                // 将屏幕坐标映射为 3D 射线
                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                
                // 增加点击判定体积，手机端体验极其丝滑
                raycaster.params.Sprite = { threshold: 18 };
                const intersects = raycaster.intersectObjects(interactiveStars);

                if (intersects.length > 0) {
                    const targetStar = intersects[0].object;
                    triggerStarInteraction(targetStar, clientX, clientY);
                } else {
                    // 点击空白处收起弹窗
                    document.getElementById('resonanceBox').classList.remove('active', 'mobile-center', 'vip-style');
                }
            }
        }

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchstart', onPointerDown, { passive: true });
        window.addEventListener('touchmove', onPointerMove, { passive: true });
        window.addEventListener('touchend', onPointerUp);

        // --- 5. 共鸣弹窗和回响机制 ---
        const resBox = document.getElementById('resonanceBox');
        
        function triggerStarInteraction(star, mx, my) {
            const data = star.userData;
            const containerId = `replies_${data.id}`;
            const inputId = `reply_in_${data.id}`;

            if(data.isVip) resBox.classList.add('vip-style');
            else resBox.classList.remove('vip-style');

            resBox.innerHTML = `
                <button class="reply-action-btn" style="position: absolute; right: 12px; top: 12px; padding: 2px 6px; border-color: rgba(166, 152, 122, 0.4); background: rgba(0,0,0,0.4);"
                    onclick="event.stopPropagation(); document.getElementById('resonanceBox').classList.remove('active', 'mobile-center', 'vip-style');">✕</button>
                
                <div style="font-style: italic; margin-top: 10px; padding-right: 15px; word-break: break-all;" class="${data.isVip ? 'vip-text' : ''}">
                    ${data.isVip ? '<span class="vip-tag">流星特效</span>' : ''}"${data.text}"
                </div>
                <span class="author-sign">—— 来自【${data.sign}】</span>
                <div class="social-reply-zone">
                    <div class="reply-list-container" id="${containerId}">正在同步恒星轨道回响...</div>
                    <textarea class="reply-input-mini" id="${inputId}" placeholder="写下你的共鸣（支持本地测试）..." rows="1"></textarea>
                    <div class="reply-btn-bar">
                        <span style="font-size:0.65rem; color:rgba(166,152,122,0.4); max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">代号:${myUniverseSign}</span>
                        <button class="reply-action-btn" onclick="sendReplyToServer(${data.id}, '${inputId}', '${containerId}')">发送共鸣</button>
                    </div>
                </div>
            `;

            if (isMobile) {
                resBox.style.left = "50%"; resBox.style.top = "50%"; resBox.classList.add('mobile-center');
            } else {
                resBox.classList.remove('mobile-center');
                // 边界防护防止弹窗溢出屏幕
                resBox.style.left = `${Math.min(mx, window.innerWidth - 360)}px`;
                resBox.style.top = `${Math.min(my, window.innerHeight - 300)}px`;
            }
            resBox.classList.add('active');

            // 触发高亮放大
            star.material.opacity = 1.0;
            star.scale.set(data.baseSize * 1.5, data.baseSize * 1.5, 1);

            fetchRepliesForStar(data.id, containerId);
        }

        function fetchRepliesForStar(whisperId, replyContainerId) {
            const container = document.getElementById(replyContainerId);
            if(!container) return;
            let htmlContent = "";
            if (localRepliesStorage[whisperId]) {
                localRepliesStorage[whisperId].forEach(r => {
                    htmlContent += `<div class="single-reply-item"><strong>${r.author_sign}:</strong> ${r.content}</div>`;
                });
            }
            container.innerHTML = htmlContent || "<span style='color:rgba(166,152,122,0.4)'>尚无恒星回应，写下第一道回响...</span>";
            container.scrollTop = container.scrollHeight;
        }

        function sendReplyToServer(whisperId, inputId, replyContainerId) {
            const inputElement = document.getElementById(inputId);
            const content = inputElement.value.trim();
            if(!content) return;

            if (!localRepliesStorage[whisperId]) localRepliesStorage[whisperId] = [];
            localRepliesStorage[whisperId].push({ whisper_id: whisperId, content: content, author_sign: myUniverseSign });

            inputElement.value = "";
            if(audioCtx) playValleyChime();
            fetchRepliesForStar(whisperId, replyContainerId);
        }

        // --- 6. 发射执念核心拦截与生成机制 ---
        function openInputPanel(e) { if(e) e.stopPropagation(); document.getElementById('userSignHint').innerText = `你的宇宙代号：【${myUniverseSign}】`; document.getElementById('inputPanel').style.display = 'flex'; document.getElementById('whisperInput').focus(); }
        function closeInputPanel() { document.getElementById('inputPanel').style.display = 'none'; }

        function submitWhisper(event) {
            if(event) event.stopPropagation();
            const input = document.getElementById('whisperInput'); 
            const text = input.value.trim();
            if(!text) return;

            if (text.includes("赌博") || text.includes("加微信") || text.includes("上门") || text.includes("兼职")) {
                alert("⚠️ 星河不渡杂音：内容包含敏感词，发射失败！");
                return;
            }

            const wantVip = document.getElementById('vipPublishCheck').checked;
            if(wantVip && starCoins < 10) {
                alert("❌ 余额不足！请点击顶部“测试充值”获取星币解锁炫彩特效！");
                return;
            }

            if(wantVip) {
                starCoins -= 10;
                localStorage.setItem('star_coins_balance', starCoins.toString());
                document.getElementById('userCoins').innerText = starCoins;
            }

            let mockId = Math.floor(Math.random() * 100000);
            // 实时向 3D 礁湖星云阵列中注入新生成的互动流星！
            createWhisperStarMesh(mockId, text, myUniverseSign, true, wantVip);
            
            closeInputPanel(); 
            if(audioCtx) playValleyChime(); 
            input.value = '';
            document.getElementById('vipPublishCheck').checked = false;
            alert("✨ 执念发射成功！你的故事已化作浩瀚礁湖星云中的一颗恒星。");
        }

        // --- 7. 文案循环呼吸转换 ---
        const texts = [
            "万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。",
            "闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。",
            "红尘滚滚，总有来路。<br>停下歇歇，本就无需向任何人交代。"
        ];
        let textIndex = 0; 
        setInterval(() => { textIndex = (textIndex + 1) % texts.length; document.getElementById('breathingText').innerHTML = texts[textIndex]; }, 15000);

        // --- 8. 全景双通道疗愈声学系统 ---
        let audioCtx = null; let bellInterval = null;
        function toggleSpaceAudio(e) {
            if(e) e.stopPropagation();
            const btn = document.getElementById('audioBtn');
            if (audioCtx) { audioCtx.close(); audioCtx = null; clearInterval(bellInterval); btn.innerText = "轻触 · 听泉"; return; }
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            btn.innerText = "断开俗世";
            
            // 构筑立体声白噪音滤镜（大雨声）
            const bufferSize = 2 * audioCtx.sampleRate; 
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
            
            const filter = audioCtx.createBiquadFilter(); 
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            
            const rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            
            whiteNoise.connect(filter); filter.connect(rainGain); rainGain.connect(audioCtx.destination); 
            whiteNoise.start();

            // 自动空间回荡梵音钟鸣
            bellInterval = setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator(); let bellGain = audioCtx.createGain(); 
                osc.type = 'sine'; osc.frequency.setValueAtTime(700 + Math.random() * 200, audioCtx.currentTime);
                bellGain.gain.setValueAtTime(0, audioCtx.currentTime); 
                bellGain.gain.linearRampToValueAtTime(0.012, audioCtx.currentTime + 0.1); 
                bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5.0);
                osc.connect(bellGain); bellGain.connect(audioCtx.destination); 
                osc.start(); osc.stop(audioCtx.currentTime + 5.0);
            }, 7000);
        }

        function playValleyChime() {
            if (!audioCtx) return;
            const frequencies = [293.66, 440.00, 587.33, 734.16]; const now = audioCtx.currentTime;
            frequencies.forEach((freq, index) => {
                let osc = audioCtx.createOscillator(); let gainNode = audioCtx.createGain(); 
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now); gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.022 / (index + 1), now + 0.06); 
                const duration = 5.0 - (index * 0.7); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination); 
                osc.start(now); osc.stop(now + duration);
            });
        }

        // --- 9. 全景动态渲染主循环 ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 应用慢转与滑动阻尼
            if (!isDragging) {
                rotationVelocity.x += (0.00003 - rotationVelocity.x) * 0.02;
                rotationVelocity.y += (0.00012 - rotationVelocity.y) * 0.02;
            }
            universeGroup.rotation.y += rotationVelocity.y;
            universeGroup.rotation.x += rotationVelocity.x;

            // 🌟 呼吸动效：让每一个故事星辰按照独有的相位异步闪烁，灵动至极
            interactiveStars.forEach(star => {
                const data = star.userData;
                const pulse = 0.6 + Math.sin(time * data.pulseSpeed + data.phase) * 0.4;
                star.material.opacity = pulse;
                // 如果没有处于点击高亮，则维持正常呼吸尺寸
                if (resBox.classList.contains('active') === false) {
                    star.scale.set(data.baseSize * (0.85 + pulse * 0.15), data.baseSize * (0.85 + pulse * 0.15), 1);
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // 完美弹性自适应适配屏幕
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
