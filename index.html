<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星海微茫 · 沉浸视频版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #000; /* 纯黑兜底，防止视频加载慢时白屏 */
            font-family: "Noto Serif SC", "SimSun", serif;
            user-select: none; -webkit-user-select: none;
        }
        
        /* =========================================
           核心升级 1：真实视频背景样式
           ========================================= */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证视频填满整个屏幕，不会变形 */
            z-index: 0; /* 放在最底层 */
            opacity: 0.8; /* 稍微调暗一点，让文字和交互的星星更清晰 */
        }

        /* 覆盖在视频上的一层极淡的暗紫遮罩，增加神秘感 */
        .video-tint {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: rgba(15, 5, 25, 0.3); pointer-events: none;
        }

        /* 交互的画布，放在视频之上 */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        /* =========================================
           以下完全保留你原本的高级 UI 样式
           ========================================= */
        .commercial-header {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; padding: 10px 15px;
            background: rgba(10, 15, 26, 0.5); border: 1px solid rgba(166, 152, 122, 0.2);
            border-radius: 8px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            color: #e6dedf; font-size: 0.85rem; letter-spacing: 1px;
        }
        .wallet-zone { display: flex; align-items: center; gap: 10px; }
        .coin-num { color: #ffd700; font-weight: bold; text-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
        .charge-btn {
            background: linear-gradient(135deg, #ffd700, #b8860b); border: none;
            color: #000; padding: 3px 12px; font-size: 0.75rem; font-weight: bold;
            border-radius: 12px; cursor: pointer; transition: all 0.3s;
        }

        .ambient-container {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 500px; text-align: center; z-index: 3; pointer-events: none;
        }
        .breathing-text {
            font-size: 1.15rem; color: rgba(255, 255, 255, 0.9); line-height: 2.2;
            letter-spacing: 4px; font-weight: 300;
            animation: spacePulse 10s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        @keyframes spacePulse {
            0%, 100% { opacity: 0; transform: translateY(5px); filter: blur(1px); }
            10%, 90% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .guide-hint {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            font-size: 0.78rem; color: rgba(255, 255, 255, 0.5); letter-spacing: 2px; z-index: 3;
            pointer-events: none; text-align: center; width: 90%;
        }

        .bottom-bar {
            position: absolute; bottom: 35px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px; z-index: 10;
        }
        .action-btn {
            background: rgba(15, 22, 35, 0.6); border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85); padding: 9px 20px; font-size: 0.82rem; border-radius: 20px;
            cursor: pointer; letter-spacing: 2px; backdrop-filter: blur(8px);
            transition: all 0.4s ease; font-family: inherit;
        }

        /* 弹出共鸣框 */
        .resonance-box {
            position: absolute; z-index: 20; padding: 24px 24px 20px 24px;
            background: rgba(10, 15, 26, 0.85); border: 1px solid rgba(166, 152, 122, 0.4);
            border-radius: 8px; color: rgba(224, 215, 195, 0.95);
            font-size: 0.92rem; line-height: 1.8; letter-spacing: 1.5px;
            width: 340px; max-width: 90vw; pointer-events: auto;
            opacity: 0; transform: translate(-50%, -120%) scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); backdrop-filter: blur(12px);
        }
        .resonance-box.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        
        .resonance-box.vip-style { border: 2px solid #da70d6; box-shadow: 0 0 25px rgba(218, 112, 214, 0.4); }
        .vip-tag { color: #ffd700; font-weight: bold; font-size: 0.75rem; border: 1px solid #ffd700; padding: 0px 4px; border-radius: 3px; margin-right: 5px; }
        .vip-text { color: #fffbc8 !important; font-weight: bold; }
        .resonance-box .author-sign { display: block; text-align: right; margin-top: 12px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.5); border-bottom: 1px dashed rgba(255, 255, 255, 0.2); padding-bottom: 8px; }

        /* 评论区 */
        .social-reply-zone { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .reply-input-mini { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 6px 10px; color: #fff; font-size: 0.8rem; outline: none; font-family: inherit; resize: none; }
        .reply-btn-bar { display: flex; justify-content: space-between; align-items: center; }
        .reply-action-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 3px 10px; font-size: 0.75rem; border-radius: 3px; cursor: pointer; }
        .reply-list-container { max-height: 100px; overflow-y: auto; font-size: 0.78rem; color: rgba(255,255,255,0.7); margin-top: 6px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.1); }
        .single-reply-item { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* 发射面板 */
        .overlay-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .panel-content { position: relative; width: 88%; max-width: 460px; background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .panel-hint { font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 12px; }
        .whisper-area { width: 100%; height: 110px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; padding: 14px; color: #fff; font-size: 0.92rem; resize: none; outline: none; margin-bottom: 12px; }
        .vip-checkbox-zone { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: rgba(255, 255, 255, 0.7); font-size: 0.82rem; cursor: pointer; }
        .panel-buttons { display: flex; justify-content: flex-end; gap: 14px; }
        .panel-btn { padding: 8px 22px; font-size: 0.82rem; border-radius: 4px; cursor: pointer; border: 1px solid transparent; letter-spacing: 2px; }
        .panel-btn.cancel { background: transparent; border-color: rgba(255,255,255,0.3); color: #ccc; }
        .panel-btn.confirm { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }

        @media (max-width: 768px) {
            .bottom-bar { padding: 0 24px; bottom: 30px; }
            .action-btn { padding: 8px 16px; font-size: 0.78rem; }
            .resonance-box.mobile-center { position: absolute !important; width: 85% !important; left: 50% !important; top: 50% !important; transform: translate(-50%, -50%) scale(1) !important; }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline src="bg-video.mp4"></video>
    
    <div class="video-tint"></div>

    <div class="commercial-header">
        <div id="userSignDisplay">宇宙代号：加载中...</div>
        <div class="wallet-zone">
            <span>💰 星币: <span class="coin-num" id="userCoins">0</span></span>
            <button class="charge-btn" onclick="chargeCoins(event)">测试充值</button>
        </div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <div class="guide-hint" id="guideHint">轻触或拖拽星空 · 唤醒尘封的远方执念</div>
    <div class="ambient-container">
        <div class="breathing-text" id="breathingText">
            闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。
        </div>
    </div>

    <div class="resonance-box" id="resonanceBox" onclick="event.stopPropagation()"></div>

    <div class="bottom-bar">
        <button class="action-btn" id="audioBtn" onclick="toggleSpaceAudio(event)">开启环境音</button>
        <button class="action-btn whisper-trigger" onclick="openInputPanel(event)">把执念散作星辰</button>
    </div>

    <div class="overlay-panel" id="inputPanel" onclick="closeInputPanel()">
        <div class="panel-content" onclick="event.stopPropagation()">
            <button class="reply-action-btn" style="position: absolute; right: 15px; top: 15px; padding: 2px 6px;" onclick="closeInputPanel()">✕</button>
            <div class="panel-hint" id="userSignHint">你的宇宙代号：【计算中...】</div>
            <textarea class="whisper-area" id="whisperInput" placeholder="写下一句话，打碎揉进星河里。此地无人知晓你，亦无人能评判你..."></textarea>
            
            <label class="vip-checkbox-zone">
                <input type="checkbox" id="vipPublishCheck">
                <span>开启【炫彩流星发言特效】（消耗 10 星币）</span>
            </label>

            <div class="panel-buttons">
                <button class="panel-btn cancel" onclick="closeInputPanel()">收回思绪</button>
                <button class="panel-btn confirm" onclick="submitWhisper(event)">发射执念</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // 核心音频：深空风声 + 432Hz 颂钵治愈交互音
        // (保持上一版让你满意的空灵混响音)
        // =========================================
        let audioCtx = null;
        let convolver = null;
        let masterGain = null;
        let isAudioInit = false;

        function initAudio() {
            if (isAudioInit) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;
            masterGain.connect(audioCtx.destination);

            const reverbTime = 4.0; 
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * reverbTime;
            const impulse = audioCtx.createBuffer(2, length, sampleRate);
            for (let i = 0; i < length; i++) {
                const decay = Math.exp(-i / (sampleRate * 0.8)); 
                impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
                impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
            }
            convolver = audioCtx.createConvolver();
            convolver.buffer = impulse;
            convolver.connect(masterGain);

            startStellarWind();
            isAudioInit = true;
            document.getElementById('audioBtn').innerText = "断开俗世 (沉浸中)";
        }

        // 第一次点击屏幕解锁音频
        window.addEventListener('mousedown', () => { if(!isAudioInit) initAudio(); }, {once: true});
        window.addEventListener('touchstart', () => { if(!isAudioInit) initAudio(); }, {once: true, passive: true});

        function startStellarWind() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 150; // 沉闷的宇宙风声
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.03; 

            noise.connect(filter); filter.connect(convolver); noise.start();
        }

        const pentatonicScale = [523.25, 587.33, 659.25, 783.99, 880.00];
        function playValleyChime() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const baseFreq = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)];
            const now = audioCtx.currentTime;

            function createPartial(freq, vol, attack, decay, type='sine') {
                const osc = audioCtx.createOscillator();
                osc.type = type; osc.frequency.setValueAtTime(freq, now);
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(vol, now + attack);
                gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
                osc.connect(gain); gain.connect(convolver); 
                osc.start(now); osc.stop(now + decay);
            }
            createPartial(baseFreq, 0.5, 0.05, 4.0);
            createPartial(baseFreq * 2.01, 0.15, 0.02, 3.0);
            createPartial(baseFreq * 2.99, 0.05, 0.01, 2.0, 'triangle');
        }

        function toggleSpaceAudio(e) {
            if(e) e.stopPropagation();
            if (audioCtx && isAudioInit) {
                audioCtx.suspend(); isAudioInit = false;
                document.getElementById('audioBtn').innerText = "开启环境音";
            } else {
                initAudio(); if(audioCtx.state === 'suspended') audioCtx.resume();
                isAudioInit = true;
                document.getElementById('audioBtn').innerText = "断开俗世 (沉浸中)";
            }
        }

        // =========================================
        // 商业UI与逻辑 (原样保留)
        // =========================================
        let starCoins = parseInt(localStorage.getItem('star_coins_balance') || '0');
        document.getElementById('userCoins').innerText = starCoins;

        function chargeCoins(e) {
            if(e) e.stopPropagation();
            starCoins += 100;
            localStorage.setItem('star_coins_balance', starCoins.toString());
            document.getElementById('userCoins').innerText = starCoins;
            alert("💳 充值成功：+100 星币！快去发射炫彩特效皮肤吧！");
        }

        const localRepliesStorage = {};
        function getOrCreateUniverseSign() {
            let sign = localStorage.getItem('universe_soul_sign');
            if (!sign) {
                const prefix = ["仙女座", "猎户座", "英仙座", "天鹅座"];
                const suffix = ["慢中子", "虚粒子", "坍缩态", "暗物质"];
                sign = `${prefix[Math.floor(Math.random() * prefix.length)]} · ${suffix[Math.floor(Math.random() * suffix.length)]}`;
                localStorage.setItem('universe_soul_sign', sign);
            }
            return sign;
        }
        const myUniverseSign = getOrCreateUniverseSign();
        document.getElementById('userSignDisplay').innerText = `🌌 代号：${myUniverseSign}`;

        // =========================================
        // 悬浮交互星星 (Canvas 背景透明，露出视频)
        // =========================================
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        let rotationX = 0, rotationY = 0, targetRotationX = 0, targetRotationY = 0;
        let isDragging = false, startX = 0, startY = 0, prevMouseX = 0, prevMouseY = 0, totalMoveDist = 0;
        const starNodes = [];

        class StarNode {
            constructor(id, text, sign, isUserGenerated = false, isVip = false) {
                this.id = id || Math.floor(Math.random() * 1000000);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const baseDist = isMobile ? 240 : 320;
                const dist = isUserGenerated ? (baseDist * 0.4) : (baseDist + Math.random() * (baseDist * 1.2));

                this.x = dist * Math.sin(phi) * Math.cos(theta);
                this.y = dist * Math.sin(phi) * Math.sin(theta);
                this.z = dist * Math.cos(phi);
                this.text = text; this.sign = sign || "远方微尘";
                this.isUser = isUserGenerated; this.isVip = isVip;

                const sizeMultiplier = isMobile ? 1.5 : 1.2;
                this.size = isVip ? (6 * sizeMultiplier) : (isUserGenerated ? (4.5 * sizeMultiplier) : ((Math.random() * 1.5 + 0.8) * sizeMultiplier));
                this.baseAlpha = isUserGenerated ? 0.95 : (Math.random() * 0.6 + 0.3);
            }
            draw(rotX, rotY, pulse) {
                let cosX = Math.cos(rotX), sinX = Math.sin(rotX), cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                let x1 = this.x * cosY - this.z * sinY, z1 = this.x * sinY + this.z * cosY;
                let y2 = this.y * cosX - z1 * sinX, z2 = this.y * sinX + z1 * cosX;
                const fov = 500;
                if (z2 + fov > 0) {
                    this.currentScale = fov / (fov + z2);
                    this.screenX = width / 2 + x1 * this.currentScale; this.screenY = height / 2 + y2 * this.currentScale;
                    ctx.beginPath();
                    ctx.arc(this.screenX, this.screenY, this.size * this.currentScale, 0, Math.PI * 2);
                    
                    if(this.isVip) {
                        ctx.fillStyle = `rgba(238, 130, 238, ${this.baseAlpha * pulse})`;
                        ctx.shadowBlur = 20; ctx.shadowColor = "#da70d6"; 
                    } else if(this.isUser) {
                        ctx.fillStyle = `rgba(242, 226, 177, ${this.baseAlpha})`;
                        ctx.shadowBlur = 15; ctx.shadowColor = "#eddba4"; 
                    } else { 
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.baseAlpha * pulse})`;
                        ctx.shadowBlur = Math.random() > 0.8 ? 10 : 0; ctx.shadowColor = "#ffffff";
                    }
                    ctx.fill(); ctx.shadowBlur = 0;
                }
            }
        }

        function loadLocalSeeds() {
            const localSeeds = [
                ["今年31岁被裁员了，瞒着父母每天在图书馆假装上班，好累。", "天琴座 · 虚粒子", false],
                ["这是一条极具商业尊贵排面的VIP流星发言特效示例！", "仙王座 · 氪金大佬", true],
                ["努力了三年还是考研失败，感觉自己是个废物，对不起爸妈。", "飞马座 · 慢中子", false]
            ];
            for(let i=0; i<120; i++) {
                const seed = localSeeds[i % localSeeds.length];
                starNodes.push(new StarNode(2000+i, seed[0], seed[1], false, seed[2]));
            }
        }
        loadLocalSeeds();

        function submitWhisper(event) {
            if(event) event.stopPropagation();
            const input = document.getElementById('whisperInput'); 
            const text = input.value.trim();
            if(!text) return;

            const wantVip = document.getElementById('vipPublishCheck').checked;
            if(wantVip && starCoins < 10) { alert("❌ 余额不足，请充值！"); return; }
            if(wantVip) { starCoins -= 10; localStorage.setItem('star_coins_balance', starCoins.toString()); document.getElementById('userCoins').innerText = starCoins; }

            const newStar = new StarNode(Math.floor(Math.random() * 100000), text, myUniverseSign, true, wantVip);
            starNodes.push(newStar); 
            closeInputPanel(); 
            if(audioCtx) playValleyChime(); 
            input.value = ''; document.getElementById('vipPublishCheck').checked = false;
        }

        // 评论与渲染逻辑 (不变)
        function fetchRepliesForStar(whisperId, containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;
            let htmlContent = "";
            if (localRepliesStorage[whisperId]) {
                localRepliesStorage[whisperId].forEach(r => { htmlContent += `<div class="single-reply-item"><strong>${r.author_sign}:</strong> ${r.content}</div>`; });
            }
            container.innerHTML = htmlContent || "<span style='color:rgba(255,255,255,0.4)'>尚无回响，写下第一道回响...</span>";
            container.scrollTop = container.scrollHeight;
        }

        function sendReplyToServer(whisperId, inputId, containerId) {
            const inputElement = document.getElementById(inputId);
            const content = inputElement.value.trim();
            if(!content) return;
            if (!localRepliesStorage[whisperId]) localRepliesStorage[whisperId] = [];
            localRepliesStorage[whisperId].push({ whisper_id: whisperId, content: content, author_sign: myUniverseSign });
            inputElement.value = "";
            if(audioCtx) playValleyChime(); 
            fetchRepliesForStar(whisperId, containerId);
        }

        // 交互判定
        window.addEventListener('mousedown', (e) => { if(checkTargetInvalid(e.target)) return; isDragging = true; totalMoveDist = 0; prevMouseX = e.clientX; prevMouseY = e.clientY; });
        window.addEventListener('mousemove', (e) => { if (isDragging) { targetRotationY += (e.clientX - prevMouseX) * 0.002; targetRotationX += (e.clientY - prevMouseY) * 0.002; prevMouseX = e.clientX; prevMouseY = e.clientY; totalMoveDist += Math.hypot(e.clientX - prevMouseX, e.clientY - prevMouseY); } });
        window.addEventListener('mouseup', (e) => { if(!isDragging) return; isDragging = false; if(totalMoveDist < 5) checkStarInteraction(e.clientX, e.clientY); });
        
        window.addEventListener('touchstart', (e) => { if(checkTargetInvalid(e.target)) return; isDragging = true; totalMoveDist = 0; startX = prevMouseX = e.touches[0].clientX; startY = prevMouseY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (!isDragging) return; targetRotationY += (e.touches[0].clientX - prevMouseX) * 0.004; targetRotationX += (e.touches[0].clientY - prevMouseY) * 0.004; prevMouseX = e.touches[0].clientX; prevMouseY = e.touches[0].clientY; totalMoveDist += Math.hypot(e.touches[0].clientX - prevMouseX, e.touches[0].clientY - prevMouseY); }, { passive: true });
        window.addEventListener('touchend', (e) => { if(!isDragging) return; isDragging = false; if (totalMoveDist < 8) checkStarInteraction(startX, startY); });
        
        window.addEventListener('click', (e) => { const resBox = document.getElementById('resonanceBox'); if(!resBox.contains(e.target) && !checkTargetInvalid(e.target)) { resBox.classList.remove('active', 'mobile-center', 'vip-style'); } });

        function checkTargetInvalid(target) { return target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || target.tagName === 'INPUT' || target.classList.contains('whisper-trigger') || target.id === 'userSignHint' || target.classList.contains('social-reply-zone') || target.classList.contains('reply-list-container') || target.classList.contains('single-reply-item') || (target.closest && target.closest('.commercial-header')); }
        
        function checkStarInteraction(mx, my) {
            let hoveredStar = null;
            const activeRadius = isMobile ? 35 : 18;
            for(let star of starNodes) { if(star.currentScale > 0 && Math.hypot(star.screenX - mx, star.screenY - my) < activeRadius) { hoveredStar = star; break; } }
            if(hoveredStar) {
                if(audioCtx) playValleyChime();
                const containerId = `replies_${hoveredStar.id}`; const inputId = `reply_in_${hoveredStar.id}`;
                const resBox = document.getElementById('resonanceBox');
                if(hoveredStar.isVip) { resBox.classList.add('vip-style'); } else { resBox.classList.remove('vip-style'); }

                resBox.innerHTML = `
                    <button class="reply-action-btn" style="position: absolute; right: 12px; top: 12px; padding: 2px 6px; background: transparent; border: none;" onclick="event.stopPropagation(); document.getElementById('resonanceBox').classList.remove('active', 'mobile-center', 'vip-style');">✕</button>
                    <div style="font-style: italic; margin-top: 10px; word-break: break-all;" class="${hoveredStar.isVip ? 'vip-text' : ''}">
                        ${hoveredStar.isVip ? '<span class="vip-tag">流星特效</span>' : ''}"${hoveredStar.text}"
                    </div>
                    <span class="author-sign">—— 来自【${hoveredStar.sign}】</span>
                    <div class="social-reply-zone">
                        <div class="reply-list-container" id="${containerId}">正在同步回响...</div>
                        <textarea class="reply-input-mini" id="${inputId}" placeholder="写下你的共鸣..." rows="1"></textarea>
                        <div class="reply-btn-bar">
                            <span style="font-size:0.65rem; color:rgba(255,255,255,0.4);">代号:${myUniverseSign}</span>
                            <button class="reply-action-btn" onclick="sendReplyToServer(${hoveredStar.id}, '${inputId}', '${containerId}')">发送共鸣</button>
                        </div>
                    </div>
                `;
                if (isMobile) { resBox.style.left = "50%"; resBox.style.top = "50%"; resBox.classList.add('mobile-center'); } 
                else { resBox.classList.remove('mobile-center'); resBox.style.left = `${mx}px`; resBox.style.top = `${my}px`; }
                resBox.classList.add('active');
                fetchRepliesForStar(hoveredStar.id, containerId);
            }
        }

        let globalPulse = 1, pulseDir = 1;
        function render() {
            // 每次渲染清空画布（透明），这样就能露出底下的视频！
            ctx.clearRect(0, 0, width, height);

            rotationX += (targetRotationX - rotationX) * 0.05; rotationY += (targetRotationY - rotationY) * 0.05;
            if (!isDragging) { targetRotationY += 0.00025; targetRotationX += 0.00004; }
            globalPulse += 0.004 * pulseDir; if(globalPulse > 1.15 || globalPulse < 0.85) pulseDir *= -1;
            for (let star of starNodes) star.draw(rotationX, rotationY, globalPulse);
            requestAnimationFrame(render);
        }
        render();

        function openInputPanel(e) { if(e) e.stopPropagation(); document.getElementById('userSignHint').innerText = `你的宇宙代号：【${myUniverseSign}】`; document.getElementById('inputPanel').style.display = 'flex'; document.getElementById('whisperInput').focus(); }
        function closeInputPanel() { document.getElementById('inputPanel').style.display = 'none'; }
        
        const texts = ["万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。", "闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。"];
        let textIndex = 0; setInterval(() => { textIndex = (textIndex + 1) % texts.length; document.getElementById('breathingText').innerHTML = texts[textIndex]; }, 15000);

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
    </script>
</body>
</html>
