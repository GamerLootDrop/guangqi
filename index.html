<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #030202; color: #E3D9C6;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            overflow: hidden; user-select: none;
        }

        /* ==================== 🚪 红尘隔绝：厚重古刹木门 ==================== */
        #mountain-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; transition: all 2.2s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .gate-leaf {
            flex: 1; height: 100%; background: linear-gradient(135deg, #1f110a 0%, #0d0604 100%);
            position: relative; display: flex; align-items: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
        }
        .gate-left { border-right: 2px solid #3d2214; justify-content: flex-end; }
        .gate-right { border-left: 2px solid #3d2214; justify-content: flex-start; }
        
        .gate-ring {
            width: 80px; height: 80px; border: 4px solid #b38f4d; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #3d2316 0%, #120703 100%);
            cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.9);
            font-size: 28px; color: #b38f4d; transition: all 0.3s;
        }
        .gate-ring:hover { transform: scale(1.06); color: #e6c280; border-color: #e6c280; box-shadow: 0 0 20px rgba(230,194,128,0.4); }
        .gate-left .gate-ring { margin-right: -40px; z-index: 102; }
        .gate-right .gate-ring { margin-left: -40px; z-index: 102; }
        
        .gate-text {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            writing-mode: vertical-rl; letter-spacing: 16px; font-size: 28px;
            color: #947444; text-shadow: 0 4px 15px rgba(0,0,0,0.9); pointer-events: none;
        }

        /* ==================== 🏛️ 线上正统道观大殿 ==================== */
        #temple-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            /* 殿宇深邃、古建金碧交织的背景氛围 */
            background: radial-gradient(circle at 50% 40%, #1c110a 0%, #050302 85%);
            overflow: hidden; opacity: 0; transition: opacity 2.5s ease;
        }

        /* 古刹古建框架遮罩（古色木窗棂、明暗帷幔） */
        .temple-architecture {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid #140b07;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.95);
            z-index: 10; pointer-events: none;
        }

        /* 大殿金匾 */
        .temple-tablet {
            position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 12; pointer-events: none;
            background: rgba(13, 7, 4, 0.6); padding: 10px 30px;
            border: 2px solid #b38f4d; border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .temple-tablet h1 { margin: 0; font-size: 24px; color: #d4b26f; letter-spacing: 12px; }

        /* ==================== 🕉️ 庄严至尊：大殿金身神像 ==================== */
        .statue-container {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 380px; z-index: 2; text-align: center;
        }
        /* 拟真神像金身（采用纯CSS渐变绘制庄严圣洁的道家始祖法相轮廓） */
        .sacred-statue {
            width: 180px; height: 260px; margin: 0 auto;
            background: linear-gradient(to bottom, #f2d082 0%, #946d21 100%);
            clip-path: polygon(50% 0%, 75% 20%, 85% 45%, 75% 85%, 50% 100%, 25% 85%, 15% 45%, 25% 20%);
            box-shadow: 0 0 80px rgba(242, 208, 130, 0.45);
            position: relative; opacity: 0.88;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.9));
        }
        /* 神像脑后常明智慧神光 */
        .statue-halo {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(253,224,151,0.4) 0%, rgba(181,141,61,0.05) 70%);
            z-index: 1; animation: haloGlow 6s ease-in-out infinite;
        }
        @keyframes haloGlow { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.7; } 50% { transform: translateX(-50%) scale(1.12); opacity: 0.95; } }

        /* 隐隐环绕神像流转的混元太极盘 */
        .altar-taiji {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #b38f4d;
            background: linear-gradient(135deg, #dfd9cb 50%, #181310 50%);
            animation: taijiRotate 30s linear infinite; opacity: 0.65; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: pointer; z-index: 4;
        }
        @keyframes taijiRotate { 100% { transform: translateX(-50%) rotate(360deg); } }

        /* ==================== 🏮 殿前实景：供桌与青铜大香炉 ==================== */
        #incense-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .altar-table {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; height: 260px; z-index: 8;
            background: linear-gradient(to top, #0f0805 20%, #21130b 100%);
            border-top: 4px solid #b38f4d; border-radius: 12px 12px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.95);
            padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }

        /* 正统古刹青铜大香炉 */
        .bronze-burner {
            width: 130px; height: 75px; background: linear-gradient(135deg, #2e2117 0%, #140e0a 100%);
            border: 3px solid #8c6f3e; border-radius: 0 0 45px 45px;
            position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            cursor: pointer; transition: transform 0.2s; margin-bottom: 20px;
        }
        .bronze-burner::before { /* 香炉双耳 */
            content: ''; position: absolute; top: 5px; left: -15px; width: 15px; height: 30px;
            border: 3px solid #8c6f3e; border-right: none; border-radius: 10px 0 0 10px;
        }
        .bronze-burner::after {
            content: ''; position: absolute; top: 5px; right: -15px; width: 15px; height: 30px;
            border: 3px solid #8c6f3e; border-left: none; border-radius: 0 10px 10px 0;
        }
        .burner-rim {
            position: absolute; top: -8px; left: -5px; width: 134px; height: 10px;
            background: #8c6f3e; border-radius: 4px;
        }
        
        /* 真实燃香插香动画效果 */
        .joss-sticks-container { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .joss-stick {
            width: 3px; height: 35px; background: #612c18; position: relative;
            transform-origin: bottom center; opacity: 0; transition: opacity 0.5s;
        }
        .joss-stick.active { opacity: 1; }
        .joss-stick.active::after { /* 香头火光效果 */
            content: ''; position: absolute; top: 0; left: -1.5px; width: 6px; height: 6px;
            background: #ff6600; border-radius: 50%; box-shadow: 0 0 8px #ff3300;
            animation: sparkBurn 2s infinite alternate;
        }
        @keyframes sparkBurn { 0% { transform: scale(0.8); opacity: 0.7; } 100% { transform: scale(1.2); opacity: 1; } }

        /* ==================== 📜 供桌香案交互面板 ==================== */
        .incense-menu { width: 100%; display: flex; gap: 10px; margin-bottom: 15px; z-index: 11; }
        .menu-btn {
            flex: 1; background: rgba(15, 9, 6, 0.9); border: 1px solid #59422d;
            color: #a69076; padding: 12px 5px; font-size: 13px; font-weight: bold;
            cursor: pointer; border-radius: 4px; transition: all 0.25s;
        }
        .menu-btn.active {
            background: linear-gradient(135deg, #7a1d1d, #4a0f0f);
            color: #fff; border-color: #b38f4d; box-shadow: 0 0 10px rgba(122,29,29,0.6);
        }
        
        .action-container { width: 100%; height: 65px; }
        .action-pane { display: none; width: 100%; text-align: center; }
        .action-pane.active { display: block; }

        .gold-pray-btn {
            background: linear-gradient(135deg, #a68146, #d4b26f); color: #140b07;
            border: none; width: 100%; padding: 12px; font-size: 14px; font-weight: bold;
            border-radius: 4px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .gold-pray-btn:active { transform: scale(0.98); }
        
        .wish-input-box {
            width: 100%; padding: 10px; background: #080504; border: 1px solid #4a3828;
            color: #fff; text-align: center; font-size: 13px; border-radius: 4px; margin-bottom: 8px;
        }

        /* 袅袅功德音符浮空 */
        .merit-text-spirit {
            position: absolute; color: #d4b26f; font-size: 20px; font-weight: bold;
            pointer-events: none; animation: textRise 1.8s ease-out forwards;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 10px rgba(212,178,111,0.6); z-index: 15;
        }
        @keyframes textRise {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-140px) scale(1.1); opacity: 0; filter: blur(1px); }
        }
    </style>
</head>
<body>

    <div id="mountain-gate">
        <div class="gate-leaf gate-left">
            <div class="gate-text">红尘喧嚣皆抛却</div>
            <div class="gate-ring" onclick="triggerOpenGate()">☯</div>
        </div>
        <div class="gate-leaf gate-right">
            <div class="gate-ring" onclick="triggerOpenGate()">☯</div>
            <div class="gate-text">灵境清幽自此入</div>
        </div>
    </div>

    <div id="temple-viewport">
        <div class="temple-architecture"></div>
        
        <div class="temple-tablet">
            <h1>三清大殿</h1>
        </div>

        <div class="statue-container">
            <div class="statue-halo"></div>
            <div class="sacred-statue"></div>
            <div class="altar-taiji" onclick="tapSacredGong()"></div>
        </div>

        <canvas id="incense-canvas"></canvas>

        <div class="altar-table">
            
            <div class="bronze-burner" onclick="tapSacredGong()">
                <div class="burner-rim"></div>
                <div class="joss-sticks-container">
                    <div class="joss-stick" id="stick1"></div>
                    <div class="joss-stick" id="stick2"></div>
                    <div class="joss-stick" id="stick3"></div>
                </div>
            </div>

            <div class="incense-menu">
                <button class="menu-btn active" onclick="changePane('pane-incense', 0)">敬奉心香</button>
                <button class="menu-btn" onclick="changePane('pane-breath', 1)">功态吐纳</button>
                <button class="menu-btn" onclick="changePane('pane-wish', 2)">疏文祈愿</button>
            </div>

            <div class="action-container">
                <div id="pane-incense" class="action-pane active">
                    <button class="gold-pray-btn" onclick="burnJossSticks()">虔诚上香 · 鸣磬定心</button>
                </div>
                <div id="pane-breath" class="action-pane">
                    <button class="gold-pray-btn" id="breath-toggle-btn" onclick="triggerBreathGong()">随大殿神光开始吐纳调理</button>
                </div>
                <div id="pane-wish" class="action-pane">
                    <input type="text" id="wish-input" class="wish-input-box" placeholder="在此虔诚输入心中所求疏文" maxlength="16">
                    <button class="gold-pray-btn" onclick="submitWishAltar()">化疏文归于烟霞</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const gate = document.getElementById('mountain-gate');
        const viewport = document.getElementById('temple-viewport');
        const canvas = document.getElementById('incense-canvas');
        const ctx = canvas.getContext('2d');

        let breathMode = false; let breathStep = 0;
        let smokeParticles = []; let backgroundEmbers = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            backgroundEmbers = [];
            // 在神像四周生成常明灯火微光，烘托古刹神秘幽深的环境心理感
            for(let i=0; i<40; i++) {
                backgroundEmbers.push({
                    x: Math.random() * canvas.width, y: Math.random() * (canvas.height * 0.6),
                    r: Math.random() * 1.6 + 0.5, alpha: Math.random() * 0.6 + 0.1,
                    speed: Math.random() * 0.15 + 0.04
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ==================== 🔊 WEB AUDIO 大殿环境共振定心声学引擎 ====================
        let audioCtx = null;
        function initAltarAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playTempleSound(freq, mode="gong") {
            initAltarAudio(); if (!audioCtx) return;
            let now = audioCtx.currentTime;
            
            if(mode === "gong") {
                // 正统道观大殿深处悠长铜磬
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.98, now + 4.5);
                gain.gain.setValueAtTime(0.28, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 4.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 4.5);

                // 殿堂木质建筑特有的微弱回音波幅
                let echoOsc = audioCtx.createOscillator(); let echoGain = audioCtx.createGain();
                echoOsc.type = 'sine'; echoOsc.frequency.setValueAtTime(freq * 1.498, now);
                echoGain.gain.setValueAtTime(0.07, now); echoGain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                echoOsc.connect(echoGain); echoGain.connect(audioCtx.destination);
                echoOsc.start(now); echoOsc.stop(now + 2.5);
            } else if (mode === "gate") {
                // 古刹大木门摩擦沉重开门声
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(70, now);
                osc.frequency.linearRampToValueAtTime(55, now + 2.0);
                gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 2.0);
            } else {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(320, now);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.25);
            }
        }

        // ==================== 门扉交互仪式 ====================
        function triggerOpenGate() {
            playTempleSound(0, "gate");
            gate.children[0].style.transform = "translateX(-100%)";
            gate.children[1].style.transform = "translateX(100%)";
            viewport.style.opacity = "1";
            setTimeout(() => gate.remove(), 2200);
        }

        // ==================== 供桌与香火的核心动作 ====================
        function tapSacredGong() {
            playTempleSound(215, "gong"); // 215Hz 铜鸣定心频率
            spawnSpiritText("清静无为 🕉️");
            triggerSmokeBlast();
        }

        function burnJossSticks() {
            playTempleSound(215, "gong");
            // 三支燃香逐渐在炉中显现火光
            document.getElementById('stick1').classList.add('active');
            document.getElementById('stick2').classList.add('active');
            document.getElementById('stick3').classList.add('active');
            spawnSpiritText("香火氤氲 荡涤内耗");
            triggerSmokeBlast();
        }

        function triggerSmokeBlast() {
            let bRect = document.querySelector('.bronze-burner').getBoundingClientRect();
            // 在香炉正上方喷涌出浓郁的袅袅香烟粒子
            generateSmokes(bRect.left + bRect.width/2, bRect.top + 10, 25, 'templeSmoke');
        }

        function spawnSpiritText(msg) {
            let el = document.createElement('div');
            el.className = 'merit-text-spirit'; el.innerText = msg;
            el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 80) + 'px';
            el.style.top = (window.innerHeight * 0.4) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
        }

        function changePane(paneId, idx) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.action-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn')[idx].classList.add('active');
            document.getElementById(paneId).classList.add('active');
            playTempleSound(0, "click");
        }

        function triggerBreathGong() {
            const btn = document.getElementById('breath-toggle-btn');
            const halo = document.querySelector('.statue-halo');
            breathMode = !breathMode;
            if (breathMode) {
                btn.innerText = "平复心舍 · 吐纳结束";
                btn.style.background = "linear-gradient(135deg, #1f4287, #278ea5)";
                btn.style.color = "#fff";
                breathStep = 0;
            } else {
                btn.innerText = "随大殿神光开始吐纳调理";
                btn.style.background = "linear-gradient(135deg, #a68146, #d4b26f)";
                btn.style.color = "#140b07";
                halo.style.animation = "haloGlow 6s ease-in-out infinite";
            }
        }

        function submitWishAltar() {
            let input = document.getElementById('wish-input');
            let txt = input.value.trim();
            if (!txt) { alert("请于缘主案前写下所求疏文"); return; }
            playTempleSound(350, "gong");
            spawnSpiritText("疏文已达 🏮");
            
            // 疏文文字横向在空中飘过，逐渐淡入神像前的迷雾中
            generateSmokes(canvas.width + 10, canvas.innerHeight * 0.28 + Math.random()*60, 1, 'wishScroll', txt);
            input.value = '';
        }

        // ==================== ✨ 香火动力学粒子循环 ====================
        function generateSmokes(x, y, total, mode, content="") {
            for(let i=0; i<total; i++) {
                smokeParticles.push({
                    x: x, y: y,
                    vx: mode === 'wishScroll' ? -0.75 : (Math.random() - 0.5) * 2,
                    vy: mode === 'wishScroll' ? 0 : -Math.random() * 1.4 - 0.4,
                    alpha: 1,
                    decay: mode === 'wishScroll' ? 0.0025 : Math.random() * 0.012 + 0.008,
                    size: Math.random() * 3 + 1.5,
                    mode: mode,
                    content: `🏮 疏文挂壁：${content}`
                });
            }
        }

        function dynamicRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 常明灯火渲染
            for(let i=0; i<backgroundEmbers.length; i++) {
                let emb = backgroundEmbers[i];
                emb.y -= emb.speed;
                if(emb.y < -10) emb.y = canvas.height * 0.6;
                ctx.save();
                ctx.globalAlpha = emb.alpha;
                ctx.fillStyle = '#d4b26f';
                ctx.beginPath(); ctx.arc(emb.x, emb.y, emb.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // 2. 吐纳引导与神像光晕控制
            if (breathMode) {
                breathStep += 0.025;
                const btn = document.getElementById('breath-toggle-btn');
                const halo = document.querySelector('.statue-halo');
                let scaleVal = 1 + Math.sin(breathStep) * 0.15;
                halo.style.transform = `translateX(-50%) scale(${scaleVal})`;
                
                if (Math.sin(breathStep) > 0) {
                    btn.innerText = "✨ 纳新：深深吸气... 汲取大殿正气";
                    btn.style.boxShadow = "0 0 15px rgba(39,142,165,0.6)";
                } else {
                    btn.innerText = "💨 吐故：缓缓呼气... 卸下凡尘焦虑";
                    btn.style.boxShadow = "0 0 5px rgba(0,0,0,0.5)";
                }
            }

            // 3. 香炉袅袅轻烟和疏文浮动
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                let p = smokeParticles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if(p.alpha <= 0) { smokeParticles.splice(i, 1); continue; }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                if(p.mode === 'wishScroll') {
                    ctx.fillStyle = '#d4b26f';
                    ctx.font = '600 14px "Noto Serif CJK SC"';
                    ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
                    ctx.fillText(p.content, p.x, p.y);
                } else {
                    // 香火烟雾微粒
                    ctx.fillStyle = 'rgba(212,178,111,0.6)';
                    ctx.shadowColor = '#d4b26f'; ctx.shadowBlur = 6;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
            requestAnimationFrame(dynamicRenderLoop);
        }
        
        requestAnimationFrame(dynamicRenderLoop);
    </script>
</body>
</html>
