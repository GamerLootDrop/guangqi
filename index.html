<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三清大殿 · 乾坤灵境</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0c0604; color: #f7ede2;
            font-family: "Noto Serif CJK SC", "SimSun", serif;
            overflow: hidden; user-select: none;
        }

        /* ==================== 🚪 第一步：厚重山门（拉开即见灵境） ==================== */
        #mountain-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; transition: all 2s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .gate-leaf {
            flex: 1; height: 100%; background: linear-gradient(135deg, #1f120a 0%, #060302 100%);
            position: relative; display: flex; align-items: center;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.95);
        }
        .gate-left { border-right: 2px solid #362014; justify-content: flex-end; }
        .gate-right { border-left: 2px solid #362014; justify-content: flex-start; }
        
        .gate-ring {
            width: 72px; height: 72px; border: 3px solid #cc9952; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #381f13 0%, #120804 100%);
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            font-size: 26px; color: #cc9952; transition: all 0.3s;
        }
        .gate-left .gate-ring { margin-right: -36px; z-index: 102; }
        .gate-right .gate-ring { margin-left: -36px; z-index: 102; }
        
        .gate-text {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            writing-mode: vertical-rl; letter-spacing: 14px; font-size: 20px;
            color: #8c6a3e; text-shadow: 0 4px 10px rgba(0,0,0,0.9); font-weight: bold;
        }

        /* ==================== 🌌 第二步：紫气东来 · 纯CSS意境大殿 ==================== */
        #temple-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            /* 绝杀黑屏：多层径向渐变，交织出大殿神像后的深邃神圣紫气与金光核心磁场 */
            background: 
                radial-gradient(circle at 50% 38%, rgba(221, 168, 109, 0.12) 0%, transparent 55%),
                radial-gradient(circle at 50% 40%, #291207 0%, #140803 40%, #050201 85%);
            opacity: 0; transition: opacity 1.5s ease;
        }

        /* 正统道门匾额 */
        .temple-tablet {
            position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 10; pointer-events: none;
            background: rgba(12, 6, 4, 0.92); padding: 8px 32px; border: 1px solid #bc8f5a;
            box-shadow: 0 4px 25px rgba(0,0,0,0.85); border-radius: 4px;
        }
        .temple-tablet h1 { margin: 0; font-size: 19px; color: #dda86d; letter-spacing: 8px; font-weight: bold; }
        .temple-tablet p { margin: 5px 0 0 0; font-size: 11px; color: #8c7664; letter-spacing: 1px; }

        /* 特效画布（浮空常明福报光点、香火青烟） */
        #incense-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }

        /* ==================== ☯️ 第三步：正统大比例混元太极盘 ==================== */
        .taichi-universe-zone {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            width: 190px; height: 190px; z-index: 3; display: flex; align-items: center; justify-content: center;
        }
        /* 缓缓自转的混元太极盘 */
        .taichi-plate {
            width: 140px; height: 140px; border-radius: 50%;
            background: linear-gradient(to bottom, #fcfaf2 50%, #171615 50%);
            position: relative; box-shadow: 0 0 40px rgba(221, 168, 109, 0.35), inset 0 0 10px rgba(0,0,0,0.6);
            animation: taichiRotate 28s linear infinite;
            cursor: pointer;
        }
        .taichi-plate::before {
            content: ''; position: absolute; top: 25%; left: 0; width: 70px; height: 70px;
            background-color: #fcfaf2; border-radius: 50%;
            background-image: radial-gradient(circle, #171615 18%, transparent 18%);
        }
        .taichi-plate::after {
            content: ''; position: absolute; top: 25%; right: 0; width: 70px; height: 70px;
            background-color: #171615; border-radius: 50%;
            background-image: radial-gradient(circle, #fcfaf2 18%, transparent 18%);
        }
        @keyframes taichiRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 外围八卦金光环 */
        .gold-halo {
            position: absolute; width: 160px; height: 160px;
            border: 1.5px solid rgba(221, 168, 109, 0.45); border-radius: 50%;
            box-shadow: 0 0 20px rgba(221, 168, 109, 0.2);
            animation: haloPulse 2.5s infinite alternate; pointer-events: none;
        }
        @keyframes haloPulse { 0% { transform: scale(0.96); opacity: 0.4; } 100% { transform: scale(1.04); opacity: 0.85; } }

        /* ==================== 🏮 第四步：一体化香案站组件（彻底解决挡住香炉问题） ==================== */
        .altar-station-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 410px; z-index: 8;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 纯 CSS 经典双耳宣德炉（彻底移出黑盒子外，高居正上方） */
        .css-incense-burner {
            width: 78px; height: 40px; background: linear-gradient(to bottom, #3b2316 0%, #140803 100%);
            border: 1.5px solid #735135; border-radius: 0 0 35px 35px;
            position: relative; margin-bottom: -4px; cursor: pointer; z-index: 10;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6), 0 6px 15px rgba(0,0,0,0.8);
        }
        .css-incense-burner::before {
            content: ''; position: absolute; top: -4px; left: -2px; width: 82px; height: 4px;
            background: #bc8f5a; border-radius: 2px;
        }
        
        /* 虔诚线香 */
        .burner-sticks-holder {
            position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 11px; pointer-events: none;
        }
        .sacred-stick {
            width: 3px; height: 34px; background: #5c2b18; opacity: 0; transition: opacity 0.5s ease;
            position: relative; transform-origin: bottom center;
        }
        .sacred-stick.active { opacity: 1; }
        .sacred-stick.active::after {
            content: ''; position: absolute; top: 0; left: -1.5px; width: 6px; height: 6px;
            background: #ff6600; border-radius: 50%; box-shadow: 0 0 8px #ff2200;
            animation: stickGlow 1s infinite alternate;
        }
        @keyframes stickGlow { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 1; } }

        /* 极简内敛控制台外壳（大幅度压缩高度，退居下方做好绿叶） */
        .altar-interactive-desk {
            width: 100%; height: 145px;
            background: linear-gradient(to top, rgba(10,5,3,0.98) 0%, rgba(18,10,6,0.96) 100%);
            border: 1px solid rgba(188, 143, 90, 0.3); border-top: 2px solid #bc8f5a;
            border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.95);
            padding: 12px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ==================== 📜 选项卡与古朴交互按钮 ==================== */
        .altar-tabs { width: 100%; display: flex; gap: 6px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; background: rgba(5, 3, 2, 0.85); border: 1px solid #3d2719;
            color: #8c7769; padding: 8px 0; font-size: 12px; font-weight: bold;
            cursor: pointer; border-radius: 4px; transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #7a1d15, #470c08);
            color: #fff; border-color: #bc8f5a; box-shadow: 0 0 10px rgba(122,29,21,0.45);
        }
        
        .panel-container { width: 100%; height: 48px; }
        .action-pane { display: none; width: 100%; text-align: center; }
        .action-pane.active { display: block; }

        .pray-gold-btn {
            background: linear-gradient(135deg, #ba9259, #e0ba82); color: #170b06;
            border: none; width: 100%; padding: 10px; font-size: 13px; font-weight: bold;
            border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pray-gold-btn:active { transform: scale(0.98); }
        
        .shuwen-input-box {
            width: 100%; padding: 8px; background: rgba(0,0,0,0.6); border: 1px solid #4a321f;
            color: #fff; text-align: center; font-size: 12px; border-radius: 4px; margin-bottom: 6px;
        }

        /* 功德福报浮空文字 */
        .spirit-float-text {
            position: absolute; color: #e0ba82; font-size: 16px; font-weight: bold;
            pointer-events: none; animation: textRiseUp 1.8s ease-out forwards;
            text-shadow: 0 2px 5px rgba(0,0,0,0.95), 0 0 8px rgba(224,186,130,0.4); z-index: 15;
        }
        @keyframes textRiseUp {
            0% { transform: translateY(0) scale(0.9); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-110px) scale(1.05); opacity: 0; filter: blur(1px); }
        }
    </style>
</head>
<body>

    <div id="mountain-gate">
        <div class="gate-leaf gate-left">
            <div class="gate-text">红尘喧嚣皆抛却</div>
            <div class="gate-ring" onclick="openAltarGate()">☯</div>
        </div>
        <div class="gate-leaf gate-right">
            <div class="gate-ring" onclick="openAltarGate()">☯</div>
            <div class="gate-text">灵境清幽自此入</div>
        </div>
    </div>

    <div id="temple-viewport">
        
        <div class="temple-tablet">
            <h1>三清大殿 · 乾坤灵境</h1>
            <p>☯ 点拨混元太极盘 · 鸣磬清心荡尘劳 ☯</p>
        </div>

        <div class="taichi-universe-zone" onclick="tapAltarTaichi()">
            <div class="gold-halo"></div>
            <div class="taichi-plate"></div>
        </div>

        <canvas id="incense-canvas"></canvas>

        <div class="altar-station-container">
            
            <div class="css-incense-burner" onclick="tapAltarTaichi()">
                <div class="burner-sticks-holder">
                    <div class="sacred-stick" id="stick1"></div>
                    <div class="sacred-stick" id="stick2"></div>
                    <div class="sacred-stick" id="stick3"></div>
                </div>
            </div>

            <div class="altar-interactive-desk">
                <div class="altar-tabs">
                    <button class="tab-btn active" onclick="switchAltarTab('pane-incense', 0)">敬奉心香</button>
                    <button class="tab-btn" onclick="switchAltarTab('pane-breath', 1)">功态吐纳</button>
                    <button class="tab-btn" onclick="switchAltarTab('pane-wish', 2)">疏文祈愿</button>
                </div>

                <div class="panel-container">
                    <div id="pane-incense" class="action-pane active">
                        <button class="pray-gold-btn" onclick="burnAltarSticks()">虔诚上香 · 鸣磬定心</button>
                    </div>
                    <div id="pane-breath" class="action-pane">
                        <button class="pray-gold-btn" id="breath-action-btn" onclick="toggleAltarBreath()">随大殿气场引导开始吐纳</button>
                    </div>
                    <div id="pane-wish" class="action-pane">
                        <input type="text" id="wish-field" class="shuwen-input-box" placeholder="在此静心写下所求疏文（如：断绝内耗）" maxlength="16">
                        <button class="pray-gold-btn" onclick="commitAltarShuwen()">化疏文归于烟霞</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const gate = document.getElementById('mountain-gate');
        const viewport = document.getElementById('temple-viewport');
        const canvas = document.getElementById('incense-canvas');
        const ctx = canvas.getContext('2d');

        let breathActive = false; let breathTicker = 0;
        let smokeParticles = []; let ambientGlows = [];

        function initCanvasSize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ambientGlows = [];
            // 用纯代码在夜空背景中绘制点点飘流的金色福报常明粒子
            for(let i=0; i<32; i++) {
                ambientGlows.push({
                    x: Math.random() * canvas.width, y: Math.random() * (canvas.height * 0.6),
                    r: Math.random() * 1.4 + 0.5, alpha: Math.random() * 0.5 + 0.1,
                    speed: Math.random() * 0.04 + 0.02
                });
            }
        }
        window.addEventListener('resize', initCanvasSize);
        initCanvasSize();

        // 正统古刹 Web Audio 低频定心磬声学引擎
        let audioCtx = null;
        function setupAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSoundEffect(freq, mode="gong") {
            setupAudio(); if (!audioCtx) return;
            let time = audioCtx.currentTime;
            
            if(mode === "gong") {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, time);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.98, time + 3.5);
                gain.gain.setValueAtTime(0.25, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 3.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 3.5);
            } else if (mode === "gate") {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(55, time);
                gain.gain.setValueAtTime(0.12, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 1.2);
            }
        }

        function openAltarGate() {
            playSoundEffect(0, "gate");
            gate.children[0].style.transform = "translateX(-100%)";
            gate.children[1].style.transform = "translateX(100%)";
            viewport.style.opacity = "1";
            setTimeout(() => gate.remove(), 1800);
        }

        function tapAltarTaichi() {
            playSoundEffect(215, "gong");
            createFloatingText("清静无为 ☯️");
            triggerSmokeEffect();
        }

        function burnAltarSticks() {
            playSoundEffect(215, "gong");
            document.getElementById('stick1').classList.add('active');
            document.getElementById('stick2').classList.add('active');
            document.getElementById('stick3').classList.add('active');
            createFloatingText("心香三炷 荡涤浮躁");
            triggerSmokeEffect();
        }

        function triggerSmokeEffect() {
            let burner = document.querySelector('.css-incense-burner');
            let bRect = burner.getBoundingClientRect();
            // 烟雾微粒极其顺畅精确地从香炉口升空
            spawnParticles(bRect.left + bRect.width/2, bRect.top - 8, 22, 'smoke');
        }

        function createFloatingText(msg) {
            let el = document.createElement('div');
            el.className = 'spirit-float-text'; el.innerText = msg;
            el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
            el.style.top = (window.innerHeight * 0.4) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
        }

        function switchAltarTab(paneId, idx) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.action-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[idx].classList.add('active');
            document.getElementById(paneId).classList.add('active');
        }

        function toggleAltarBreath() {
            const btn = document.getElementById('breath-action-btn');
            breathActive = !breathActive;
            if (breathActive) {
                btn.style.background = "linear-gradient(135deg, #1c3d5a, #234e70)";
                btn.style.color = "#fff";
                breathTicker = 0;
            } else {
                btn.innerText = "随大殿气场引导开始吐纳";
                btn.style.background = "linear-gradient(135deg, #ba9259, #e0ba82)";
                btn.style.color = "#170b06";
                btn.style.boxShadow = "none";
            }
        }

        function commitAltarShuwen() {
            let field = document.getElementById('wish-field');
            let text = field.value.trim();
            if (!text) { alert("请于案前写下心中所求疏文"); return; }
            playSoundEffect(320, "gong");
            createFloatingText("疏文呈递 🏮");
            spawnParticles(canvas.width + 10, canvas.innerHeight * 0.35 + Math.random()*25, 1, 'textScroll', text);
            field.value = '';
        }

        function spawnParticles(x, y, count, type, content="") {
            for(let i=0; i<count; i++) {
                smokeParticles.push({
                    x: x, y: y,
                    vx: type === 'textScroll' ? -0.8 : (Math.random() - 0.5) * 1.3,
                    vy: type === 'textScroll' ? 0 : -Math.random() * 0.8 - 0.4,
                    alpha: 1,
                    decay: type === 'textScroll' ? 0.003 : Math.random() * 0.01 + 0.007,
                    size: Math.random() * 1.8 + 1,
                    type: type,
                    content: `🏮 疏文：${content}`
                });
            }
        }

        function mainRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 背景常明福报微粒
            for(let i=0; i<ambientGlows.length; i++) {
                let star = ambientGlows[i];
                star.y -= star.speed;
                if(star.y < -10) star.y = canvas.height * 0.6;
                ctx.save();
                ctx.globalAlpha = star.alpha;
                ctx.fillStyle = '#dda86d';
                ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // 2. 吐纳节奏与大殿光晕耦合
            if (breathActive) {
                breathTicker += 0.03;
                const btn = document.getElementById('breath-action-btn');
                const halo = document.querySelector('.gold-halo');
                let wave = Math.sin(breathTicker);
                if (wave > 0) {
                    btn.innerText = "✨ 缓缓吸气... 吸纳乾坤纯阳正气";
                    if(halo) halo.style.transform = `scale(${1 + wave * 0.05})`;
                } else {
                    btn.innerText = "💨 悠长呼气... 排解胸中积压内耗";
                    if(halo) halo.style.transform = `scale(${1 + wave * 0.02})`;
                }
            }

            // 3. 香火烟霞粒子与横流疏文文字
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                let p = smokeParticles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if(p.alpha <= 0) { smokeParticles.splice(i, 1); continue; }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                if(p.type === 'textScroll') {
                    ctx.fillStyle = '#e0ba82';
                    ctx.font = '12px "Noto Serif CJK SC"';
                    ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
                    ctx.fillText(p.content, p.x, p.y);
                } else {
                    ctx.fillStyle = 'rgba(221, 168, 109, 0.55)';
                    ctx.shadowColor = '#ba9259'; ctx.shadowBlur = 3;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
            requestAnimationFrame(mainRenderLoop);
        }
        requestAnimationFrame(mainRenderLoop);
    </script>
</body>
</html>
