<script>
        // --- 1. 基础配置：锁定反向代理域名与通行证 ---
        const PROXY_URL = 'https://cool-feather-5d35.guangqi6662.workers.dev'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cWN3dnl1YnVnY2VuZGJkaG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDI5NzEsImV4cCI6MjA5NTAxODk3MX0.Sl2AxvDKZ7OSWT-uDCxGagGmIWWqWd_zQC_QiWbC7VI';

        // --- 2. 核心算法：生成随机的宇宙浪漫代号 ---
        function getOrCreateUniverseSign() {
            let sign = localStorage.getItem('universe_soul_sign');
            if (!sign) {
                const prefix = ["仙女座", "猎户座", "英仙座", "天鹅座", "飞马座", "巨蟹座", "天琴座", "大熊座", "半人马", "麒麟座"];
                const suffix = ["慢中子", "虚粒子", "坍缩态", "偏振光", "白矮星", "红移线", "微波背景", "暗物质", "静止质量", "星流"];
                sign = `${prefix[Math.floor(Math.random() * prefix.length)]} · ${suffix[Math.floor(Math.random() * suffix.length)]}`;
                localStorage.setItem('universe_soul_sign', sign);
            }
            return sign;
        }
        const myUniverseSign = getOrCreateUniverseSign();

        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if(!isMobile) document.getElementById('guideHint').innerText = "拖拽可360°转动视角 · 鼠标悬停寻找发光的灵魂";

        let rotationX = 0, rotationY = 0; let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false; let startX = 0, startY = 0; let prevMouseX = 0, prevMouseY = 0; let totalMoveDist = 0;
        const starNodes = [];

        class StarNode {
            constructor(text, sign, isUserGenerated = false) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const baseDist = isMobile ? 280 : 350;
                const dist = isUserGenerated ? (baseDist * 0.7) : (baseDist + Math.random() * baseDist);

                this.x = dist * Math.sin(phi) * Math.cos(theta);
                this.y = dist * Math.sin(phi) * Math.sin(theta);
                this.z = dist * Math.cos(phi);
                this.text = text; this.sign = sign || "远方微尘"; this.isUser = isUserGenerated;
                const sizeMultiplier = isMobile ? 1.4 : 1.0;
                this.size = isUserGenerated ? (3.2 * sizeMultiplier) : ((Math.random() * 1.3 + 0.7) * sizeMultiplier);
                this.baseAlpha = isUserGenerated ? 0.95 : (Math.random() * 0.4 + 0.2);
                this.screenX = 0; this.screenY = 0; this.currentScale = 0;
            }
            draw(rotX, rotY, pulse) {
                let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                let x1 = this.x * cosY - this.z * sinY; let z1 = this.x * sinY + this.z * cosY;
                let y2 = this.y * cosX - z1 * sinX; let z2 = this.y * sinX + z1 * cosX;
                const fov = 500;
                if (z2 + fov > 0) {
                    this.currentScale = fov / (fov + z2);
                    this.screenX = width / 2 + x1 * this.currentScale; this.screenY = height / 2 + y2 * this.currentScale;
                    ctx.beginPath(); ctx.arc(this.screenX, this.screenY, this.size * this.currentScale, 0, Math.PI * 2);
                    if(this.isUser) { ctx.fillStyle = `rgba(242, 226, 177, ${this.baseAlpha})`; ctx.shadowBlur = 15; ctx.shadowColor = "#eddba4"; }
                    else { ctx.fillStyle = `rgba(184, 173, 150, ${this.baseAlpha * pulse})`; ctx.shadowBlur = 0; }
                    ctx.fill(); ctx.shadowBlur = 0;
                }
            }
        }

        // --- ✨ 终极修正一：纯原生 fetch 干净拉取，绕过官方库的代理判定 Bug ✨ ---
        async loadStarsFromCloud() {
            try {
                // 精准组装经过 Worker 代理的直通 RESTful 接口
                const response = await fetch(`${PROXY_URL}/rest/v1/whispers?select=content,author_sign&order=id.desc&limit=100`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error(`HTTP 状态码异常: ${response.status}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    data.forEach(item => { starNodes.push(new StarNode(item.content, item.author_sign)); });
                    const currentCount = starNodes.length;
                    // 如果真实数据不够 120 条，用浪漫填充补齐
                    for(let i=0; i < (120 - currentCount); i++) starNodes.push(new StarNode("漫步在虚空中的一段无声频率。", "寂静深空"));
                } else {
                    // 若数据库彻底为空，加载本地种子
                    loadLocalSeeds();
                }
            } catch (error) {
                console.error('连通星海受阻：', error);
                for(let i=0; i<80; i++) starNodes.push(new StarNode("信号微弱，星辰正在离线闪烁。", "本地孤岛"));
            }
        }

        function loadLocalSeeds() {
            const localSeeds = [
                ["今年31岁被裁员了，瞒着父母每天在图书馆假装上班，好累。", "天琴座 · 虚粒子"],
                ["努力了三年还是考研失败，感觉自己是个废物，对不起爸妈。", "飞马座 · 慢中子"],
                ["大城市房租又涨了，每天加班到深夜，不知道坚持的意义是什么。", "英仙座 · 偏振光"]
            ];
            for(let i=0; i<100; i++) {
                const seed = localSeeds[i % localSeeds.length];
                starNodes.push(new StarNode(seed[0], seed[1]));
            }
        }
        loadStarsFromCloud();

        // --- ✨ 终极修正二：纯原生 fetch 干净发送，确保手机不挂梯子也能完美存入 ✨ ---
        async function submitWhisper() {
            const input = document.getElementById('whisperInput'); const text = input.value.trim();
            if(!text) return;

            const newStar = new StarNode(text, myUniverseSign, true);
            starNodes.push(newStar); closeInputPanel(); playValleyChime(); input.value = '';

            try {
                const response = await fetch(`${PROXY_URL}/rest/v1/whispers`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ content: text, author_sign: myUniverseSign })
                });
                if (!response.ok) throw new Error(`写入失败: ${response.status}`);
            } catch (error) {
                console.error('发射执念失败：', error);
            }
        }

        // --- 3D 渲染与交互控制模块 ---
        window.addEventListener('mousedown', (e) => { if(checkTargetInvalid(e.target)) return; isDragging = true; totalMoveDist = 0; prevMouseX = e.clientX; prevMouseY = e.clientY; });
        window.addEventListener('mousemove', (e) => { if (isDragging) { const deltaX = e.clientX - prevMouseX; const deltaY = e.clientY - prevMouseY; targetRotationY += deltaX * 0.002; targetRotationX += deltaY * 0.002; prevMouseX = e.clientX; prevMouseY = e.clientY; totalMoveDist += Math.hypot(deltaX, deltaY); } else if (!isMobile) { checkStarInteraction(e.clientX, e.clientY, false); } });
        window.addEventListener('mouseup', (e) => { if(!isDragging) return; isDragging = false; if(totalMoveDist < 5 && !isMobile) checkStarInteraction(e.clientX, e.clientY, true); });
        window.addEventListener('touchstart', (e) => { if(checkTargetInvalid(e.target)) return; isDragging = true; totalMoveDist = 0; startX = prevMouseX = e.touches[0].clientX; startY = prevMouseY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (!isDragging) return; const deltaX = e.touches[0].clientX - prevMouseX; const deltaY = e.touches[0].clientY - prevMouseY; targetRotationY += deltaX * 0.004; targetRotationX += deltaY * 0.004; prevMouseX = e.touches[0].clientX; prevMouseY = e.touches[0].clientY; totalMoveDist += Math.hypot(deltaX, deltaY); }, { passive: true });
        window.addEventListener('touchend', (e) => { if(!isDragging) return; isDragging = false; if (totalMoveDist < 8) checkStarInteraction(startX, startY, true); else if(isMobile) document.getElementById('resonanceBox').classList.remove('active'); });

        function checkTargetInvalid(target) { return target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || target.classList.contains('whisper-trigger') || target.id === 'userSignHint'; }
        const resBox = document.getElementById('resonanceBox');
        function checkStarInteraction(mx, my, isClickOrTouch) {
            let hoveredStar = null; const activeRadius = isMobile ? 35 : 16;
            for(let star of starNodes) { if(star.currentScale > 0) { const dist = Math.hypot(star.screenX - mx, star.screenY - my); if(dist < activeRadius) { hoveredStar = star; break; } } }
            if(hoveredStar) {
                resBox.innerHTML = `${hoveredStar.text}<span class="author-sign">—— 来自【${hoveredStar.sign}】</span>`;
                if (isMobile) { resBox.style.left = "50%"; resBox.style.top = "50%"; resBox.classList.add('mobile-center'); } 
                else { resBox.classList.remove('mobile-center'); resBox.style.left = `${mx}px`; resBox.style.top = `${my}px`; }
                resBox.classList.add('active'); hoveredStar.baseAlpha = 1; hoveredStar.size = isMobile ? 4.0 : 2.5;
            } else {
                if (isClickOrTouch || !isMobile) { resBox.classList.remove('active'); resBox.classList.remove('mobile-center'); }
                starNodes.forEach(s => { if(!s.isUser) { s.baseAlpha = Math.random() * 0.4 + 0.2; s.size = (Math.random() * 1.3 + 0.7) * (isMobile ? 1.4 : 1.0); } });
            }
        }

        let globalPulse = 1; let pulseDir = 1;
        function render() {
            ctx.fillStyle = 'rgba(2, 5, 10, 0.18)'; ctx.fillRect(0, 0, width, height);
            rotationX += (targetRotationX - rotationX) * 0.05; rotationY += (targetRotationY - rotationY) * 0.05; targetRotationY += 0.00008;
            globalPulse += 0.004 * pulseDir; if(globalPulse > 1.15 || globalPulse < 0.85) pulseDir *= -1;
            for (let star of starNodes) star.draw(rotationX, rotationY, globalPulse);
            requestAnimationFrame(render);
        }
        render();

        function openInputPanel(e) { e.stopPropagation(); document.getElementById('userSignHint').innerText = `你的宇宙代号：【${myUniverseSign}】`; document.getElementById('inputPanel').style.display = 'flex'; document.getElementById('whisperInput').focus(); }
        function closeInputPanel() { document.getElementById('inputPanel').style.display = 'none'; }
        
        const texts = ["万物自有其时。<br>你已经做得很好了，不必对自己步步紧逼。", "闭眼，听雨。<br>这一刻，世界不属于任何人，只属于你自己。", "红尘滚滚，总有来路。<br>停下歇歇，本就无需向任何人交代。"];
        let textIndex = 0; setInterval(() => { textIndex = (textIndex + 1) % texts.length; document.getElementById('breathingText').innerHTML = texts[textIndex]; }, 15000);

        let audioCtx = null; let bellInterval = null;
        function toggleSpaceAudio(e) {
            e.stopPropagation(); const btn = document.getElementById('audioBtn');
            if (audioCtx) { audioCtx.close(); audioCtx = null; clearInterval(bellInterval); btn.innerText = "轻触 · 听泉"; return; }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); btn.innerText = "断开俗世";
            const bufferSize = 2 * audioCtx.sampleRate; const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const whiteNoise = audioCtx.createBufferSource(); whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(850, audioCtx.currentTime);
            const rainGain = audioCtx.createGain(); rainGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            whiteNoise.connect(filter); filter.connect(rainGain); rainGain.connect(audioCtx.destination); whiteNoise.start();
            bellInterval = setInterval(() => {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator(); let bellGain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(800 + Math.random() * 200, audioCtx.currentTime);
                bellGain.gain.setValueAtTime(0, audioCtx.currentTime); bellGain.gain.linearRampToValueAtTime(0.012, audioCtx.currentTime + 0.1); bellGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5.0);
                osc.connect(bellGain); bellGain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 5.0);
            }, 8000);
        }

        function playValleyChime() {
            if (!audioCtx) return; const frequencies = [293.66, 440.00, 587.33, 734.16]; const now = audioCtx.currentTime;
            frequencies.forEach((freq, index) => {
                let osc = audioCtx.createOscillator(); let gainNode = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now); gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.025 / (index + 1), now + 0.06); const duration = 6.0 - (index * 0.8); gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(now); osc.stop(now + duration);
            });
        }
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
    </script>
