<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星河宿命 · 真正商业版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #020105; font-family: "Noto Serif SC", serif; color: #fff;
        }

        /* 核心：直接使用你截图质感的超高清、带有静谧呼吸感的星云背景 */
        /* 实际开发中，这里是一段 4K 的暗红/深紫星云循环视频(Video)或者高精贴图 */
        .universe-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at 50% 30%, #1d0a2b 0%, #09030d 60%, #000000 100%);
            background-size: cover;
            opacity: 0.9;
        }

        /* 极细腻的柔光滤镜，制造灵魂失重感 */
        .nebula-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: radial-gradient(ellipse at 80% 20%, rgba(139, 0, 0, 0.2) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(75, 0, 130, 0.15) 0%, transparent 60%);
            mix-blend-mode: screen; pointer-events: none;
        }

        /* --- 顶栏：高级感、去工具化 --- */
        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 24px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-size: 0.9rem; font-weight: 200; letter-spacing: 4px; color: rgba(255,255,255,0.7); }
        
        /* 治愈音乐开关 */
        .music-toggle {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; color: #eee;
            backdrop-filter: blur(10px); cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .music-toggle.playing { border-color: #ff4081; color: #ff4081; box-shadow: 0 0 10px rgba(255,64,129,0.2); }

        /* --- 中央文案：直击痛点，引导留存 --- */
        .center-container {
            position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5; width: 85%; pointer-events: none;
        }
        .center-container h1 { font-size: 1.4rem; font-weight: 200; letter-spacing: 6px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .center-container p { font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; line-height: 1.8; }

        /* --- 底部商业化操作区 --- */
        .bottom-area {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10;
            padding: 0 24px calc(env(safe-area-inset-bottom, 20px) + 20px);
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 100%);
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 主行动点：极其克制的高级感按钮 */
        .action-btn {
            background: #fff; color: #000; width: 100%; max-width: 300px;
            padding: 15px; border-radius: 30px; font-size: 0.9rem; font-weight: bold;
            border: none; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(255,255,255,0.15);
            margin-bottom: 25px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .action-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* 真正的商业化多入口导航（观测、共鸣、声音商店、个人中心） */
        .tab-menu { display: flex; justify-content: space-around; width: 100%; max-width: 360px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; color: rgba(255,255,255,0.4); gap: 6px; cursor: pointer; }
        .tab-item.active { color: #fff; font-weight: bold; }

        /* --- 弹出层：商业化充值与付费 --- */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; padding: 24px; }
        .premium-card { background: #0f0b14; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; max-width: 340px; padding: 25px 20px; text-align: center;}
        .card-title { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 10px; font-weight: 400; }
        .card-subtitle { font-size: 0.75rem; color: #888; margin-bottom: 20px; }
        
        .sku-list { margin-bottom: 25px; }
        .sku-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; margin-bottom: 12px; cursor: pointer; }
        .sku-item:hover { border-color: #ff4081; background: rgba(255,64,129,0.05); }
        .sku-name { text-align: left; font-size: 0.85rem; font-weight: bold; }
        .sku-desc { font-size: 0.65rem; color: #666; margin-top: 3px; }
        .sku-price { color: #ff4081; font-weight: bold; font-size: 0.9rem; }

        .close-text { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 15px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

    <div class="universe-background"></div>
    <div class="nebula-glow"></div>

    <div class="app-header">
        <div class="brand">ECHOES · 星河</div>
        <button class="music-toggle" id="musicBtn" onclick="toggleHealingMusic()">
            <span id="musicIcon">🔇</span> <span id="musicText">静音观测</span>
        </button>
    </div>

    <div class="center-container">
        <h1>允许一切发生。</h1>
        <p>已有 1,429 位迷茫的灵魂在这里留下了执念<br>带上耳机，听听他们划过夜空的声音</p>
    </div>

    <div class="bottom-area">
        <button class="action-btn" onclick="triggerCast()">将无处安放的心事投递出去</button>
        
        <div class="tab-menu">
            <div class="tab-item active"><span>🌌</span><span>冥想深空</span></div>
            <div class="tab-item" onclick="openStore()"><span>💎</span><span>声音补给站</span></div>
            <div class="tab-item"><span>📜</span><span>共鸣报告</span></div>
            <div class="tab-item"><span>👤</span><span>我的星域</span></div>
        </div>
    </div>

    <div class="overlay" id="storeOverlay">
        <div class="premium-card">
            <div class="card-title">声音与灵魂补给站</div>
            <div class="card-subtitle">付费解锁大师级实地采样的治愈频段</div>
            
            <div class="sku-list">
                <div class="sku-item" onclick="handlePay(6)">
                    <div>
                        <div class="sku-name">喜马拉雅颂钵音频包</div>
                        <div class="sku-desc">432Hz 真实颂钵敲击敲击回响(包含5首)</div>
                    </div>
                    <div class="sku-price">¥6.00</div>
                </div>
                <div class="sku-item" onclick="handlePay(12)">
                    <div>
                        <div class="sku-name">冰岛极光静谧风声</div>
                        <div class="sku-desc">实地超高清环境录音，深度助眠专用</div>
                    </div>
                    <div class="sku-price">¥12.00</div>
                </div>
                <div class="sku-item" onclick="handlePay(30)">
                    <div>
                        <div class="sku-name">无限共鸣·终身VIP</div>
                        <div class="sku-desc">解锁全部声音资产 + 专属超新星全服广播</div>
                    </div>
                    <div class="sku-price">¥30.00</div>
                </div>
            </div>

            <span class="close-text" onclick="closeStore()">回到星空</span>
        </div>
    </div>

    <audio id="bgmAsset" loop src="https://actions.google.com/sounds/v1/ambiences/deep_space.ogg"></audio>
    <audio id="clickAsset" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" style="display:none;"></audio>

    <script>
        const bgm = document.getElementById('bgmAsset');
        let isPlaying = false;

        // 彻底抛弃代码拼凑，用“真实高清音频资产”来治愈
        function toggleHealingMusic() {
            const btn = document.getElementById('musicBtn');
            const icon = document.getElementById('musicIcon');
            const text = document.getElementById('musicText');

            if (isPlaying) {
                bgm.pause();
                isPlaying = false;
                btn.classList.remove('playing');
                icon.innerText = '🔇';
                text.innerText = '静音观测';
            } else {
                // 唤起真实音频
                bgm.play().then(() => {
                    isPlaying = true;
                    btn.classList.add('playing');
                    icon.innerText = '🎵';
                    text.innerText = '深空疗愈中';
                }).catch(err => {
                    alert("请点击屏幕任意地方激活宇宙音轨");
                });
            }
        }

        function triggerCast() {
            // 商业逻辑：点击发射时，播放一声清脆的水晶敲击声（加载高质音频文件）
            // 这里用提示代指
            alert("[商业提示] 正在唤起文字输入框... 输入完成后，扣除 10 星尘或提示看视频广告免费发射。");
        }

        function openStore() { document.getElementById('storeOverlay').style.display = 'flex'; }
        function closeStore() { document.getElementById('storeOverlay').style.display = 'none'; }

        function handlePay(price) {
            alert(`[商业转化] 正在唤起微信/苹果支付，金额：¥${price}\n支付成功后后端解锁对应音频包的下载/播放权限。`);
            closeStore();
        }

        // 监听屏幕点击，模拟点击星星时发出真正的清脆乐器声
        document.body.addEventListener('click', function(e) {
            // 排除UI按钮的点击
            if(e.target.tagName !== 'BUTTON' && e.target.className !== 'sku-item' && e.target.className !== 'close-text') {
                console.log("点击了星空，这里应该触发：AudioContext播放高质颂钵采样切片");
            }
        });
    </script>
</body>
</html>
